<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Create Gift Code</title>

<style>
body{
background:#0e0e0e;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.box{
background:#1b1b1b;
padding:25px;
border-radius:15px;
width:320px;
}
h2{text-align:center;margin-bottom:20px}
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
}
button{
width:100%;
padding:12px;
border:none;
margin-top:15px;
border-radius:10px;
background:#ff3b3b;
color:#fff;
font-size:16px;
cursor:pointer;
}
.code-item{
background:#2b2b2b;
padding:10px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}
.copy-btn{
background:#00c853;
padding:5px 10px;
border:none;
border-radius:5px;
color:#fff;
cursor:pointer;
}
.history{
background:#2b2b2b;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}
</style>

</head>

<body>

<div class="box">

<h2>🎁 Create Gift Code</h2>

<input id="code" placeholder="Enter Code">
<input id="amount" type="number" placeholder="Amount">
<input id="limit" type="number" placeholder="User Limit">
 <input id="depositReq" placeholder="Deposit Required (24h)">

<button id="createBtn">Create Code</button>

<div id="codeList"></div>

<hr style="margin-top:20px;border:1px solid #333;">

<h2>👤 Check User</h2>

<input id="userEmail" placeholder="Enter User Email">
<button id="checkBtn">Check User</button>

<div id="userData"></div>

<hr>

<h3>💰 Today Deposits</h3>

<div id="depositList" style="
background:#111;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
font-size:14px;">
Loading...
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs, query, where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
authDomain:"colourcash-ea60e.firebaseapp.com",
projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

/* ================= CREATE CODE ================= */
async function createCode(){

const code = codeInput.value.trim();
const amount = Number(amountInput.value);
const limit = Number(limitInput.value);

if(!code || !amount || !limit){
 alert("Fill all fields");
 return;
}

const depositReq = Number(document.getElementById("depositReq").value) || 0;

await addDoc(collection(db,"giftcodes"),{
 code,
 amount,
 usedCount:0,
 maxUse:limit,
 depositRequired: depositReq, // 🔥 NEW
 usedBy: []
});

addToList(code);

codeInput.value="";
amountInput.value="";
limitInput.value="";
}

/* SHOW CODE */
function addToList(code){

const div=document.createElement("div");
div.className="code-item";

div.innerHTML=`
<span>${code}</span>
<button class="copy-btn">Copy</button>
`;

div.querySelector("button").addEventListener("click",()=>{
 navigator.clipboard.writeText(code);
 alert("Copied");
});

codeList.prepend(div);
}

/* ================= CHECK USER ================= */
async function checkUser(){

const email = emailInput.value.trim();

if(!email){
 alert("Enter Email");
 return;
}

let totalDeposit=0,totalWithdraw=0;
let depositHTML="",withdrawHTML="";

/* DEPOSIT */
const depSnap = await getDocs(query(collection(db,"deposits"),where("email","==",email)));

depSnap.forEach(d=>{
 let data=d.data();
 depositHTML+=`<div class="history">₹${data.amount} - ${data.status}</div>`;
 if(data.status==="APPROVED") totalDeposit+=Number(data.amount);
});

/* WITHDRAW */
const wdSnap = await getDocs(query(collection(db,"withdraws"),where("email","==",email)));

wdSnap.forEach(d=>{
 let data=d.data();
 withdrawHTML+=`<div class="history">₹${data.amount} - ${data.status}</div>`;
 if(data.status==="APPROVED") totalWithdraw+=Number(data.amount);
});

/* SHOW */
userData.innerHTML=`
<h3>Total Deposit: ₹${totalDeposit}</h3>
<h3>Total Withdraw: ₹${totalWithdraw}</h3>
<h4>Deposit History</h4>
${depositHTML || "No Data"}
<h4>Withdraw History</h4>
${withdrawHTML || "No Data"}
`;
}

/* ================= TODAY DEPOSITS ================= */
async function loadDeposits(){

const snap = await getDocs(collection(db,"deposits"));
let today = new Date().toDateString();
let html="";

snap.forEach(d=>{
 let data=d.data();
 let date=new Date(data.time||Date.now());

 if(date.toDateString()===today){
   html+=`
   <div class="history">
   👤 ${data.email}<br>
   💰 ₹${data.amount}<br>
   ⏰ ${date.toLocaleTimeString()}
   </div>`;
 }
});

depositList.innerHTML = html || "No Deposits Today";
}

/* ================= INIT ================= */
const codeInput=document.getElementById("code");
const amountInput=document.getElementById("amount");
const limitInput=document.getElementById("limit");
const emailInput=document.getElementById("userEmail");

const codeList=document.getElementById("codeList");
const userData=document.getElementById("userData");
const depositList=document.getElementById("depositList");

/* BUTTON EVENTS */
document.getElementById("createBtn").addEventListener("click", createCode);
document.getElementById("checkBtn").addEventListener("click", checkUser);

/* AUTO LOAD */
loadDeposits();
setInterval(loadDeposits,5000);

</script>

</body>
</html>
