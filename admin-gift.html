<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gift Code Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:#fff;
text-align:center;
padding:30px;
}

.box{
background:#222;
padding:20px;
border-radius:12px;
max-width:400px;
margin:auto;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#ff3b3b;
color:#fff;
font-size:16px;
}

</style>
</head>

<body>

<div class="box">

<h2>🎁 Create Gift Code</h2>

<input type="text" id="giftCode" placeholder="Enter Gift Code">

<input type="number" id="giftAmount" placeholder="Enter Amount">

<button onclick="createCode()">Create Code</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
authDomain: "colourcash-ea60e.firebaseapp.com",
projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.createCode = async function(){

const code = document.getElementById("giftCode").value;
const amount = Number(document.getElementById("giftAmount").value);

if(!code || !amount){
alert("Enter Code and Amount");
return;
}

await addDoc(collection(db,"giftcodes"),{
code:code,
amount:amount,
used:false
});

alert("Gift Code Created ✅");

}

</script>

</body>
</html>
