<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Create Gift Code</title>

<style>

body{
background:#0e0e0e;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.box{
background:#1b1b1b;
padding:25px;
border-radius:15px;
width:320px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
margin-top:15px;
border-radius:10px;
background:#ff3b3b;
color:#fff;
font-size:16px;
cursor:pointer;
}

.code-list{
margin-top:20px;
}

.code-item{
background:#2b2b2b;
padding:10px;
border-radius:8px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.copy-btn{
background:#00c853;
padding:5px 10px;
border:none;
border-radius:5px;
color:#fff;
cursor:pointer;
}

.history{
background:#2b2b2b;
padding:10px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>🎁 Create Gift Code</h2>

<input id="code" placeholder="Enter Code">

<input id="amount" type="number" placeholder="Amount">

<input id="limit" type="number" placeholder="User Limit">

<button onclick="createCode()">Create Code</button>

<div class="code-list" id="codeList"></div>

<hr style="margin-top:20px;border:1px solid #333;">

<h2>👤 Check User</h2>

<input id="userEmail" placeholder="Enter User Email">

<button onclick="checkUser()">Check User</button>
<div id="userData"></div>
  <hr>

<h3>💰 Today Deposits</h3>

<div id="depositList" style="
background:#111;
padding:10px;
border-radius:10px;
max-height:200px;
overflow:auto;
font-size:14px;
">
Loading deposits...
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
authDomain: "colourcash-ea60e.firebaseapp.com",
projectId: "colourcash-ea60e",
storageBucket: "colourcash-ea60e.firebasestorage.app",
messagingSenderId: "403688058646",
appId: "1:403688058646:web:f1753360471528f275ea37"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* =========================
   CREATE CODE (FIXED)
========================= */
window.createCode = async function(){

const code = document.getElementById("code").value;
const amount = document.getElementById("amount").value;
const limit = document.getElementById("limit").value;

if(!code || !amount || !limit){
  alert("Fill all fields");
  return;
}

await addDoc(collection(db,"giftcodes"),{
code,
amount:Number(amount),
usedCount:0,
maxUse:Number(limit)
});

addToList(code);

document.getElementById("code").value="";
document.getElementById("amount").value="";
document.getElementById("limit").value="";
}

/* =========================
   SHOW CODE
========================= */
function addToList(code){

const list=document.getElementById("codeList");

const div=document.createElement("div");

div.className="code-item";

div.innerHTML=`
<span>${code}</span>
<button class="copy-btn">Copy</button>
`;

div.querySelector("button").onclick = ()=>copyCode(code);

list.prepend(div);
}

/* COPY */
function copyCode(code){
navigator.clipboard.writeText(code);
alert("Code Copied");
}

/* =========================
   CHECK USER (FIXED)
========================= */
window.checkUser = async function(){

const email = document.getElementById("userEmail").value;

if(!email){
  alert("Enter Email");
  return;
}

let totalDeposit = 0;
let totalWithdraw = 0;

let depositHistory="";
let withdrawHistory="";

/* DEPOSIT */
const depSnap = await getDocs(
query(collection(db,"deposits"), where("email","==",email))
);

depSnap.forEach(d=>{
const data = d.data();

depositHistory += `<div class="history">₹${data.amount} - ${data.status}</div>`;

if(data.status==="APPROVED"){
totalDeposit += Number(data.amount);
}
});

/* WITHDRAW */
const wdSnap = await getDocs(
query(collection(db,"withdraws"), where("email","==",email))
);

wdSnap.forEach(d=>{
const data = d.data();

withdrawHistory += `<div class="history">₹${data.amount} - ${data.status}</div>`;

if(data.status==="APPROVED"){
totalWithdraw += Number(data.amount);
}
});

/* SHOW */
document.getElementById("userData").innerHTML = `
<h3>Total Deposit: ₹${totalDeposit}</h3>
<h3>Total Withdraw: ₹${totalWithdraw}</h3>
<h4>Deposit History</h4>
${depositHistory}
<h4>Withdraw History</h4>
${withdrawHistory}
`;

}

/* =========================
   TODAY DEPOSITS
========================= */
async function loadTodayDeposits(){

const snap = await getDocs(collection(db,"deposits"));

let today = new Date().toDateString();
let html="";

snap.forEach(d=>{

let data = d.data();
let date = new Date(data.time || Date.now());

if(date.toDateString() === today){

html += `
<div class="history">
👤 ${data.email}<br>
💰 ₹${data.amount}<br>
⏰ ${date.toLocaleTimeString()}
</div>
`;

}

});

if(html==="") html="No Deposits Today";

document.getElementById("depositList").innerHTML = html;
}

/* LOAD */
loadTodayDeposits();
setInterval(loadTodayDeposits,5000);

</script>
  
</body>
</html>
