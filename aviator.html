<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💥 Stack Tower Crash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#050518;
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  background:#111;
  display:inline-block;
  padding:6px 16px;
  border-radius:20px;
}

/* GAME AREA */
.game{
  position:relative;
  height:400px;
  margin-top:20px;
  overflow:hidden;
}

.block{
  position:absolute;
  height:30px;
  background:#ff4fd8;
  border-radius:6px;
  transition:all 0.3s linear;
}

.base{
  width:200px;
  height:30px;
  background:#fff;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  position:absolute;
}

.mult{
  font-size:22px;
  margin-top:10px;
  color:#00ffcc;
}

button{
  width:80%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#ff4fd8;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}

input{
  width:80%;
  padding:12px;
  border-radius:20px;
  border:none;
  margin-top:10px;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup div{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:16px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">
💥 STACK TOWER  
<div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<div class="game" id="game">
  <div class="base"></div>
</div>

<div class="mult" id="mult">x1.00</div>

<input id="bet" type="number" value="100">
<button onclick="startGame()">START</button>
<button onclick="drop()">DROP</button>

<div class="popup" id="popup"><div id="popupText"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,collection,query,where,
  getDocs,doc,updateDoc,onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

const email = localStorage.getItem("userEmail");

/* STATE */
let wallet=0, uid="";
let bet=0, running=false;
let multiplier=1;

let currentBlock=null;
let lastLeft=0, lastWidth=200;
let pos=0, dir=1;

let interval=null;
let HOUSE_EDGE=0.7;

/* WALLET */
async function loadWallet(){
 const q=query(collection(db,"users"),where("email","==",email));
 const snap=await getDocs(q);
 snap.forEach(d=>{
   uid=d.id;
   wallet=d.data().balance||0;
 });
 updateWallet();
}

async function saveWallet(){
 if(uid) await updateDoc(doc(db,"users",uid),{balance:wallet});
}

/* LIVE EDGE */
onSnapshot(doc(db,"settings","houseEdge"), (snap)=>{
 if(snap.exists()){
   HOUSE_EDGE = snap.data().towerCrash ?? 0.7;
 }
});

/* UI */
function updateWallet(){
 document.getElementById("wallet").innerText=wallet;
}

function popup(msg){
 popupText.innerText=msg;
 popup.style.display="flex";
 setTimeout(()=>popup.style.display="none",1500);
}

/* START */
window.startGame=async ()=>{
 if(running) return;

 bet=+betInput.value;
 if(bet<=0 || bet>wallet){
   popup("Low Balance");
   return;
 }

 wallet-=bet;
 await saveWallet();
 updateWallet();

 document.getElementById("game").innerHTML='<div class="base"></div>';

 running=true;
 multiplier=1;
 lastLeft=window.innerWidth/2-100;
 lastWidth=200;

 createBlock();
};

/* CREATE BLOCK */
function createBlock(){
 const game=document.getElementById("game");

 currentBlock=document.createElement("div");
 currentBlock.className="block";

 currentBlock.style.width=lastWidth+"px";
 currentBlock.style.bottom=(30*(multiplier))+"px";
 currentBlock.style.left="0px";

 game.appendChild(currentBlock);

 pos=0; dir=1;

 interval=setInterval(()=>{
   pos+=dir*4;

   if(pos>window.innerWidth- lastWidth) dir=-1;
   if(pos<0) dir=1;

   currentBlock.style.left=pos+"px";
 },20);
}

/* DROP */
window.drop=async ()=>{
 if(!running) return;

 clearInterval(interval);

 let blockLeft=pos;
 let overlap=Math.min(blockLeft+lastWidth,lastLeft+lastWidth)-Math.max(blockLeft,lastLeft);

 /* FAIL */
 if(overlap<=0 || Math.random()>HOUSE_EDGE){
   currentBlock.style.background="red";
   popup("💥 CRASH");
   running=false;
   return;
 }

 /* CUT EFFECT */
 currentBlock.style.width=overlap+"px";
 currentBlock.style.left=Math.max(blockLeft,lastLeft)+"px";

 lastLeft=parseFloat(currentBlock.style.left);
 lastWidth=overlap;

 multiplier+=0.5;
 document.getElementById("mult").innerText="x"+multiplier.toFixed(2);

 popup("✅ SAFE");

 setTimeout(createBlock,400);
};

/* INIT */
await loadWallet();
</script>

</body>
</html>
