<!DOCTYPE html>
<html>
<head>
<title>2xWin Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e6f0fa;
}
.header{
  background:#ff6b6b;
  padding:15px;
  text-align:center;
  color:#fff;
  font-size:20px;
  font-weight:bold;
}
.container{
  padding:15px;
}
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.row{
  margin-bottom:14px;
}
.label{
  font-size:14px;
  margin-bottom:5px;
}
input[type=range]{
  width:100%;
}
.value{
  float:right;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🎮 House Edge Control </div>

<div class="container">
<div class="card" id="gameList"></div>
</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

const games = [
"WIN GO","MINES","AVIATOR","DRAGON TIGER","ROULETTE",
"AVIATOR REAL","COIN FLIP","TREASURE","CHICKEN ROAD",
"DICE ROLL","PLINKO","DRAX TURBO","SPIN STOP",
"HORSE RACE","GANESH SLOTS","KENO","FATE SHIFT",
"HILO","DRAGON TOWER","BALLOON CRASH","7 UP DOWN"
];

const gameKeys = {
  "WIN GO":"wingo",
  "MINES":"mines",
  "AVIATOR":"aviator",
  "DRAGON TIGER":"dragonTiger",
  "ROULETTE":"roulette",
  "AVIATOR REAL":"aviatorReal",
  "COIN FLIP":"coinFlip",
  "TREASURE":"treasure",
  "CHICKEN ROAD":"chickenRoad",
  "DICE ROLL":"dice",
  "PLINKO":"plinko",
  "DRAX TURBO":"draxTurbo",
  "SPIN STOP":"spinStop",
  "HORSE RACE":"horseRace",
  "GANESH SLOTS":"ganeshSlots",
  "KENO":"keno",
  "FATE SHIFT":"fateShift",
  "HILO":"hilo",
  "DRAGON TOWER":"dragonTower",
  "BALLOON CRASH":"balloonCrash",
  "7 UP DOWN":"sevenUpDown"
};

const container = document.getElementById("gameList");

/* 🔥 ONE TIME FIREBASE LOAD */
let houseData = {};

async function loadAll(){
  const snap = await getDoc(doc(db,"settings","houseEdge"));
  if(snap.exists()){
    houseData = snap.data();
  }
}

await loadAll();

/* 🔥 UI BUILD */
games.forEach(game => {

  let div = document.createElement("div");
  div.className = "row";

  div.innerHTML = `
    <div class="label">${game} <span class="value">50%</span></div>
    <input type="range" min="0" max="100" value="50">
  `;

  let slider = div.querySelector("input");
  let value = div.querySelector(".value");

  const key = gameKeys[game];

  // 🔥 SET SAVED VALUE (FIX)
  if(houseData[key] !== undefined){
    slider.value = houseData[key];
    value.innerText = houseData[key] + "%";
  }

  // 🔥 SAVE (no auto overwrite)
  slider.oninput = async () => {

    value.innerText = slider.value + "%";

    await setDoc(doc(db,"settings","houseEdge"),{
      [key]: Number(slider.value)
    },{ merge:true });

  };

  container.appendChild(div);

});

  </script>
  

</body>
</html>
