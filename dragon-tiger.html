<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  background:#111827;
  position:relative;
}

.wallet{
  position:absolute;
  right:10px;
  top:10px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.flip{
  width:80px;
  height:100px;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}

.flip.active .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  backface-visibility:hidden;
}

.front{background:#444;}
.back{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

/* HISTORY */
.history{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:5px;
}

.history div{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TIE */
.tie{
  background:#3cd070;
  text-align:center;
  padding:12px;
  margin:10px;
  border-radius:10px;
  font-size:16px;
}

/* BET BOX */
.bet{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.box{
  width:45%;
  height:160px;
  background:#1f2937;
  border-radius:14px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  font-size:16px;
  padding-bottom:10px;
}

.amount{
  position:absolute;
  top:6px;
  right:6px;
  background:#000;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
}

.chips div{
  background:#333;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

.chips .active{
  background:#ffd700;
  color:#000;
  font-weight:bold;
}

/* TIMER */
.timer{
  text-align:center;
  margin:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <b>PUBG & FREE FIRE</b>
    <div class="wallet">₹ <span id="wallet">1000</span></div>

    <div class="cards">
      <div class="flip" id="pFlip">
        <div class="inner">
          <div class="front">?</div>
          <div class="back" id="pCard">K</div>
        </div>
      </div>

      <div>VS</div>

      <div class="flip" id="fFlip">
        <div class="inner">
          <div class="front">?</div>
          <div class="back" id="fCard">A</div>
        </div>
      </div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <div class="tie">Tie (9x)</div>

  <div class="bet">
    <div class="box" onclick="betPlace('PUBG')">
      <div class="amount" id="pubgAmt">0</div>
      PUBG
    </div>

    <div class="box" onclick="betPlace('FREE')">
      <div class="amount" id="freeAmt">0</div>
      FREE FIRE
    </div>
  </div>

  <!-- CHIPS -->
  <div class="chips" id="chips">
    <div onclick="setAmt(10,this)">10</div>
    <div onclick="setAmt(50,this)">50</div>
    <div onclick="setAmt(100,this)">100</div>
    <div onclick="setAmt(500,this)">500</div>
    <div onclick="setAmt(1000,this)">1000</div>
  </div>

  <div class="timer">Time: <span id="time">20</span></div>

</div>

<script type="module">

let wallet = 2000;
let chip = 0;

let pubg = 0;
let free = 0;

let time = 20;

/* CHIP SELECT */
window.setAmt = (a, el) => {
  chip = a;
  document.querySelectorAll(".chips div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
};

/* BET */
window.betPlace = (type) => {

  if(time <= 3) return alert("Bet Closed");
  if(wallet < chip) return alert("Low Balance");

  wallet -= chip;
  document.getElementById("wallet").innerText = wallet;

  if(type=="PUBG"){
    pubg += chip;
    document.getElementById("pubgAmt").innerText = pubg;
  }

  if(type=="FREE"){
    free += chip;
    document.getElementById("freeAmt").innerText = free;
  }
};

/* RANDOM */
function rand(){
  const arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function result(p,f){
  const order=["A","K","Q","J","10","9"];
  if(order.indexOf(p) < order.indexOf(f)) return "PUBG";
  if(order.indexOf(p) > order.indexOf(f)) return "FREE";
  return "TIE";
}

/* MAIN LOOP */
function startRound(){

  time = 20;

  // RESET CARDS TO HIDDEN
  document.getElementById("pFlip").classList.remove("active");
  document.getElementById("fFlip").classList.remove("active");

  document.getElementById("pCard").innerText = "?";
  document.getElementById("fCard").innerText = "?";

  const timer = setInterval(()=>{

    document.getElementById("time").innerText = time;

    time--;

    if(time < 0){

      clearInterval(timer);

      // GENERATE RESULT
      const p = rand();
      const f = rand();

      document.getElementById("pCard").innerText = p;
      document.getElementById("fCard").innerText = f;

      // FLIP SHOW RESULT
      document.getElementById("pFlip").classList.add("active");
      document.getElementById("fFlip").classList.add("active");

      const r = result(p,f);

      // HISTORY
      const h = document.createElement("div");
      h.innerText = r[0];
      document.getElementById("history").prepend(h);

      // WIN
      if(r=="PUBG") wallet += pubg * 2;
      if(r=="FREE") wallet += free * 2;

      document.getElementById("wallet").innerText = wallet;

      // RESET BET
      pubg = 0;
      free = 0;

      document.getElementById("pubgAmt").innerText = 0;
      document.getElementById("freeAmt").innerText = 0;

      // SHOW RESULT 2 SEC → THEN HIDE + NEXT ROUND
      setTimeout(()=>{

        // FLIP BACK (HIDE)
        document.getElementById("pFlip").classList.remove("active");
        document.getElementById("fFlip").classList.remove("active");

        setTimeout(()=>{
          startRound(); // NEXT ROUND 🔥
        },600);

      },2000);
    }

  },1000);
}

/* START GAME */
startRound();

</script>

</body>
</html>
