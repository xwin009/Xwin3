<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG vs Free Fire</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('images/file_0000000007b071fa871e2db23466cd0b.png') no-repeat center;
  background-size:cover;
  color:#fff;
}

/* HEADER */
.header{
  background:url('images/file_00000000480471fa9e11748baef83b2f.png') no-repeat center;
  background-size:cover;
  text-align:center;
  padding:10px;
}

.title{
  background:url('images/27677-removebg-preview.png') no-repeat center;
  height:60px;
  background-size:contain;
}

/* TOP BG */
.top-bg{
  background:url('images/file_00000000fb9072088776bb496c7908c3.png') no-repeat center;
  background-size:cover;
  padding:20px;
  position:relative;
}

/* CHARACTERS */
.pubg{
  position:absolute;
  left:10px;
  top:20px;
  width:120px;
  height:150px;
  background:url('images/file_00000000df4871fa8609456fe5b59e5a.png') no-repeat center/contain;
}

.freefire{
  position:absolute;
  right:10px;
  top:20px;
  width:120px;
  height:150px;
  background:url('images/file_00000000b47471faa0bfb3580646bb40.png') no-repeat center/contain;
}

/* VS */
.vs{
  width:100px;
  height:80px;
  margin:auto;
  background:url('images/27678-removebg-preview.png') no-repeat center/contain;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.card{
  width:80px;
  height:120px;
  background:#fff;
  color:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  border-radius:10px;
  transform:rotateY(0deg);
  transition:0.5s;
}

/* BET AREA */
.bet-area{
  display:flex;
  justify-content:space-around;
  margin-top:30px;
}

.box{
  width:150px;
  height:180px;
  position:relative;
  text-align:center;
}

.pubg-box{
  background:url('images/file_00000000119871fab85c60ccc87fd0ee.png') no-repeat center/contain;
}

.freefire-box{
  background:url('images/file_0000000067f871fa8ab3c7b0ee53094c.png') no-repeat center/contain;
}

.amount{
  position:absolute;
  bottom:10px;
  width:100%;
  font-weight:bold;
}

/* COINS */
.coins{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.coin{
  width:50px;
  height:50px;
  background:gold;
  border-radius:50%;
  text-align:center;
  line-height:50px;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* TIMER */
.timer{
  text-align:center;
  font-size:20px;
  margin-top:10px;
}

/* HISTORY */
.history{
  display:flex;
  overflow:hidden;
  width:200px;
  margin:auto;
  gap:5px;
}

.dot{
  width:20px;
  height:20px;
  border-radius:50%;
  text-align:center;
  font-size:12px;
  line-height:20px;
}

.D{background:blue;}
.T{background:red;}

</style>
</head>

<body>

<div class="header">
  <div class="title"></div>
</div>

<div class="top-bg">
  <div class="pubg"></div>
  <div class="freefire"></div>
  <div class="vs"></div>

  <div class="cards">
    <div class="card" id="card1">?</div>
    <div class="card" id="card2">?</div>
  </div>
</div>

<div class="timer" id="timer">15</div>

<div class="history" id="history"></div>

<div class="bet-area">
  <div class="box pubg-box" onclick="bet('P')">
    <div class="amount" id="pubgAmount">0</div>
  </div>

  <div class="box freefire-box" onclick="bet('F')">
    <div class="amount" id="freeAmount">0</div>
  </div>
</div>

<div class="coins">
  <div class="coin" onclick="setCoin(10)">10</div>
  <div class="coin" onclick="setCoin(50)">50</div>
  <div class="coin" onclick="setCoin(100)">100</div>
</div>

<script>
let selectedCoin = 10;
let pubgBet = 0;
let freeBet = 0;
let timer = 15;
let locked = false;
let historyArr = [];

function setCoin(val){
  selectedCoin = val;
}

function bet(side){
  if(locked) return;

  if(side==='P'){
    pubgBet += selectedCoin;
    document.getElementById("pubgAmount").innerText = pubgBet;
  }else{
    freeBet += selectedCoin;
    document.getElementById("freeAmount").innerText = freeBet;
  }
}

/* TIMER */
setInterval(()=>{
  timer--;
  document.getElementById("timer").innerText = timer;

  if(timer<=5) locked=true;

  if(timer<=0){
    playGame();
    timer=15;
    locked=false;
  }

},1000);

/* GAME LOGIC */
function playGame(){

  let pubgCard = Math.floor(Math.random()*13)+1;
  let freeCard = Math.floor(Math.random()*13)+1;

  document.getElementById("card1").innerText = pubgCard;
  document.getElementById("card2").innerText = freeCard;

  let result = pubgCard > freeCard ? 'D' : 'T';

  addHistory(result);

  pubgBet = 0;
  freeBet = 0;

  document.getElementById("pubgAmount").innerText = 0;
  document.getElementById("freeAmount").innerText = 0;
}

/* HISTORY */
function addHistory(res){
  historyArr.unshift(res);
  if(historyArr.length>10) historyArr.pop();

  let html='';
  historyArr.forEach(r=>{
    html += `<div class="dot ${r}">${r}</div>`;
  });

  document.getElementById("history").innerHTML = html;
}

</script>

</body>
</html>
