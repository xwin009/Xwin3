<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  
.table-bg{
  flex:1;   /* 🔥 YE MAIN FIX HAI */
  background:url("images/27879-removebg-preview.png") no-repeat center;
  background-size:cover;
}
/* HEADER */
.header{
  text-align:center;
  padding:10px;
  position:relative;

  background: url("images/file_00000000fb9072088776bb496c7908c3.png") no-repeat center;
  background-size: cover;
}
.header::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:0;
}
  .header *{
  position:relative;
  z-index:1;
}
.wallet{
  position:absolute;
  right:10px;
  top:10px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.flip{
  width:80px;
  height:100px;
  perspective:1000px;
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}

.flip.active .inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  backface-visibility:hidden;
}

.front{background:#444;}
  .front img{
  width:70%;
  height:70%;
  object-fit:contain;
  }
.back{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

/* TIMER CIRCLE */
.circle-timer{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid #00ffcc;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:10px auto;
  font-weight:bold;
  font-size:18px;
  box-shadow:0 0 10px #00ffcc;
}

/* HISTORY */
.history{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:5px;
}

.history div{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TIE */
.tie{
  background:#3cd070;
  text-align:center;
  padding:12px;
  margin:10px;
  border-radius:10px;
  font-size:16px;
  position:relative;  /* ✅ YE ADD KAR */
}

/* BET BOX */
.bet{
  display:flex;
  justify-content:space-around;
  padding:20px 10px;

}

.box{
  width:45%;
  height:180px;
  background:#1f2937;
  border-radius:14px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  font-size:16px;
  padding-bottom:10px;
}

.amount{
  position:absolute;
  top:6px;
  right:6px;
  background:#000;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
}

.chips div{
  background:#333;
  padding:12px;
  border-radius:50%;
  cursor:pointer;
}

.chips .active{
  background:#ffd700;
  color:#000;
  font-weight:bold;
}
  
.table-bg{
  background:url("images/27879-removebg-preview.png") no-repeat center;
  background-size:cover;
}
  .popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  background:#111827;
  padding:20px 30px;
  border-radius:12px;
  color:#fff;
  font-size:16px;
  box-shadow:0 0 20px #00ffcc;
  animation:pop 0.3s ease;
}

@keyframes pop{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}
/* TIMER TEXT */
.timer{
  text-align:center;
  margin:5px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <b>PUBG & FREE FIRE</b>
    <div class="wallet">₹ <span id="wallet">2000</span></div>

  <div class="cards">

  <!-- PUBG -->
  <div class="flip" id="pFlip">
    <div class="inner">
      <div class="front">
        <img src="images/27681-removebg-preview.png">
      </div>
      <div class="back" id="pCard"></div>
    </div>
  </div>

  <div>VS</div>

  <!-- FREE FIRE -->
  <div class="flip" id="fFlip">
    <div class="inner">
      <div class="front">
        <img src="images/27682-removebg-preview.png">
      </div>
      <div class="back" id="fCard"></div>
    </div>
  </div>

  </div>

    <!-- 🔥 TIMER CIRCLE -->
    <div class="circle-timer">
      <span id="time">20</span>
    </div>

  </div>

  <div class="history" id="history"></div>

<div class="table-bg">

  <div class="tie" onclick="betPlace('TIE')">
    Tie (9x)
    <div class="amount" id="tieAmt">0</div>
  </div>

  <div class="bet">
    <div class="box" onclick="betPlace('PUBG')">
      <div class="amount" id="pubgAmt">0</div>
      PUBG
    </div>

    <div class="box" onclick="betPlace('FREE')">
      <div class="amount" id="freeAmt">0</div>
      FREE FIRE
    </div>
  </div>

  <div class="chips" id="chips">
    <div onclick="setAmt(10,this)">10</div>
    <div onclick="setAmt(50,this)">50</div>
    <div onclick="setAmt(100,this)">100</div>
    <div onclick="setAmt(500,this)">500</div>
    <div onclick="setAmt(1000,this)">1000</div>
  </div>

</div>

</div>

<script type="module">

let wallet = 2000;
let chip = 0;

let pubg = 0;
let free = 0;
let tie = 0;
let time = 20;
  // 🔥 LOAD SAVED DATA
if(localStorage.getItem("wallet")){
  wallet = parseInt(localStorage.getItem("wallet"));
}

if(localStorage.getItem("history")){
  document.getElementById("history").innerHTML = localStorage.getItem("history");
}

if(localStorage.getItem("time")){
  time = parseInt(localStorage.getItem("time"));
}
  
  
  function showPopup(msg){
  const p = document.getElementById("popup");
  document.getElementById("popupText").innerText = msg;
  p.classList.add("show");

  setTimeout(()=>{
    p.classList.remove("show");
  },1500);
}

/* CHIP */
window.setAmt = (a, el) => {
  chip = a;
  document.querySelectorAll(".chips div").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
};

/* BET */
window.betPlace = (type) => {

  if(time <= 3) return showPopup("Bet Closed");
if(wallet < chip) return showPopup("Low Balance");
  
  wallet -= chip;
  document.getElementById("wallet").innerText = wallet;

  if(type=="PUBG"){
    pubg += chip;
    document.getElementById("pubgAmt").innerText = pubg;
  }

  if(type=="FREE"){
    free += chip;
    document.getElementById("freeAmt").innerText = free;
  }

  if(type=="TIE"){
    tie += chip;
    document.getElementById("tieAmt").innerText = tie;
  }
};

/* RANDOM */
function rand(){
  const arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function result(p,f){
  const order=["A","K","Q","J","10","9"];
  if(order.indexOf(p) < order.indexOf(f)) return "PUBG";
  if(order.indexOf(p) > order.indexOf(f)) return "FREE";
  return "TIE";
}

/* LOOP */
function startRound(){

  time = 20;

  document.getElementById("pFlip").classList.remove("active");
  document.getElementById("fFlip").classList.remove("active");

  document.getElementById("pCard").innerText = "";
document.getElementById("fCard").innerText = "";
  
  const timer = setInterval(()=>{

    document.getElementById("time").innerText = time;
    

    time--;
    
localStorage.setItem("time", time);
    
    if(time < 0){

      clearInterval(timer);

      const p = rand();
      const f = rand();

      document.getElementById("pCard").innerText = p;
      document.getElementById("fCard").innerText = f;

      document.getElementById("pFlip").classList.add("active");
      document.getElementById("fFlip").classList.add("active");

      const r = result(p,f);

      // HISTORY
      const h = document.createElement("div");
      h.innerText = r[0];
      document.getElementById("history").prepend(h);

      // WIN
      if(r=="PUBG") wallet += pubg * 2;
      if(r=="FREE") wallet += free * 2;
      if(r=="TIE") wallet += tie * 9;

      document.getElementById("wallet").innerText = wallet;
      
localStorage.setItem("wallet", wallet);
localStorage.setItem("history", document.getElementById("history").innerHTML);
      // RESET
      pubg = 0;
      free = 0;
      tie = 0;

      document.getElementById("pubgAmt").innerText = 0;
      document.getElementById("freeAmt").innerText = 0;
      document.getElementById("tieAmt").innerText = 0;

      setTimeout(()=>{
        document.getElementById("pFlip").classList.remove("active");
        document.getElementById("fFlip").classList.remove("active");

        setTimeout(()=>{
          startRound();
        },600);

      },2000);
    }

  },1000);
}

startRound();

</script>
  
<div id="popup" class="popup">
  <div class="popup-box">
    <span id="popupText">Message</span>
  </div>
</div>
  
</body>
</html>
