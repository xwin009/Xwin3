<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
}

/* TOP */
.top{
  background:url('images/file_00000000fb9072088776bb496c7908c3.png') center/cover;
  padding:20px 0;
}

.vs-area{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-top:10px;
}

/* FLIP CARD */
.flip{
  width:70px;
  height:90px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}

.flip.active .flip-inner{
  transform:rotateY(180deg);
}

.front,.back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
  backface-visibility:hidden;
}

.front{ background:#444; }
.back{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

.vs{ font-size:20px; }

/* HISTORY */
.history{
  display:flex;
  gap:6px;
  padding:10px;
  overflow-x:auto;
  justify-content:center;
}

.history div{
  width:28px;
  height:28px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TABLE */
.table{
  background:url('images/27676-removebg-preview.png') center/cover;
  padding:15px;
  border-radius:20px;
}

/* BIG TIE */
.tie-big{
  background:#3cd070;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:20px;
}

/* BET GRID */
.bet-box{
  display:grid;
  grid-template-columns:1fr 0.6fr 1fr;
  gap:10px;
}

/* BOX */
.box{
  position:relative;
  height:150px;
  border-radius:12px;
  overflow:hidden;
}

.box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.box span{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  padding:6px;
}

/* AMOUNT SHOW */
.amount{
  position:absolute;
  top:5px;
  right:5px;
  background:#000;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

/* CENTER TIE */
.tie-center{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1f8f5a;
  font-weight:bold;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.chips div{
  background:#333;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* TIMER */
.timer{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <h2>PUBG & FREE FIRE</h2>

  <div class="vs-area">

    <div class="flip" id="pFlip">
      <div class="flip-inner">
        <div class="front">?</div>
        <div class="back" id="pCard">K</div>
      </div>
    </div>

    <div class="vs">VS</div>

    <div class="flip" id="fFlip">
      <div class="flip-inner">
        <div class="front">?</div>
        <div class="back" id="fCard">A</div>
      </div>
    </div>

  </div>
</div>

<!-- HISTORY -->
<div class="history" id="history"></div>

<div class="table">

  <!-- BIG TIE -->
  <div class="tie-big" onclick="placeBet('TIE')">
    Tie
    <div class="amount" id="tieAmt">0</div>
  </div>

  <!-- BOX -->
  <div class="bet-box">

    <div class="box" onclick="placeBet('PUBG')">
      <img src="images/27826-removebg-preview.png">
      <span>PUBG</span>
      <div class="amount" id="pubgAmt">0</div>
    </div>

    <div class="box tie-center">
      TIE
    </div>

    <div class="box" onclick="placeBet('FREE')">
      <img src="images/27825-removebg-preview.png">
      <span>FREE FIRE</span>
      <div class="amount" id="freeAmt">0</div>
    </div>

  </div>

</div>

<!-- CHIPS -->
<div class="chips">
  <div onclick="setAmount(10)">10</div>
  <div onclick="setAmount(50)">50</div>
  <div onclick="setAmount(100)">100</div>
  <div onclick="setAmount(500)">500</div>
</div>

<div class="timer">Time: <span id="time">20</span></div>

<script>

let bet="";
let amt=0;
let time=20;

let pubgTotal=0;
let freeTotal=0;
let tieTotal=0;

/* CHIP */
function setAmount(a){
  amt=a;
}

/* BET */
function placeBet(b){
  if(time<=3){
    alert("Bet Closed");
    return;
  }

  bet=b;

  if(b=="PUBG"){
    pubgTotal+=amt;
    document.getElementById("pubgAmt").innerText=pubgTotal;
  }
  if(b=="FREE"){
    freeTotal+=amt;
    document.getElementById("freeAmt").innerText=freeTotal;
  }
  if(b=="TIE"){
    tieTotal+=amt;
    document.getElementById("tieAmt").innerText=tieTotal;
  }
}

/* CARD */
function card(){
  let arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function result(p,f){
  let order=["A","K","Q","J","10","9"];
  if(order.indexOf(p)<order.indexOf(f)) return "PUBG";
  if(order.indexOf(p)>order.indexOf(f)) return "FREE";
  return "TIE";
}

/* LOOP */
setInterval(()=>{

  time--;
  document.getElementById("time").innerText=time;

  if(time==0){

    document.getElementById("pFlip").classList.remove("active");
    document.getElementById("fFlip").classList.remove("active");

    setTimeout(()=>{

      let p=card();
      let f=card();

      document.getElementById("pCard").innerText=p;
      document.getElementById("fCard").innerText=f;

      document.getElementById("pFlip").classList.add("active");
      document.getElementById("fFlip").classList.add("active");

      let r=result(p,f);

      let h=document.createElement("div");
      h.innerText=r[0];
      document.getElementById("history").prepend(h);

      // RESET BETS
      pubgTotal=0;
      freeTotal=0;
      tieTotal=0;

      document.getElementById("pubgAmt").innerText=0;
      document.getElementById("freeAmt").innerText=0;
      document.getElementById("tieAmt").innerText=0;

    },400);

    time=20;
  }

},1000);

</script>

</body>
</html>
