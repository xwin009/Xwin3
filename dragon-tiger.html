<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG vs Free Fire</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
  text-align:center;
}

.header{
  padding:10px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  position:absolute;
  right:15px;
  top:10px;
  background:#111;
  padding:6px 12px;
  border-radius:10px;
}

.top{
  position:relative;
  height:200px;
  background:url('images/file_00000000fb9072088776bb496c7908c3.png') center/cover;
}

.vs-area{
  position:absolute;
  width:100%;
  top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
}

.player{ width:100px; }
.vs{ width:80px; }

.table{
  background:url('images/27676-removebg-preview.png') center/cover;
  padding:20px;
}

/* FLIP CARD */
.cards{
  display:flex;
  justify-content:space-around;
  margin:20px 0;
}

.flip{
  width:80px;
  height:110px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.6s;
}

.flip.flip-active .flip-inner{
  transform:rotateY(180deg);
}

.front, .back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
}

.front{
  background:#444;
}

.back{
  background:#fff;
  color:#000;
  transform:rotateY(180deg);
}

/* HISTORY */
.history{
  display:flex;
  overflow-x:auto;
  gap:5px;
  padding:10px;
}

.history div{
  min-width:30px;
  height:30px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BET */
.bets{
  display:flex;
}

.bet{
  flex:1;
  padding:20px;
  margin:5px;
  border-radius:10px;
  background:#222;
  cursor:pointer;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.chip{
  padding:10px;
  background:#333;
  border-radius:50%;
  cursor:pointer;
}

.timer{
  font-size:20px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">PUBG & FREE FIRE</div>
<div class="wallet">₹ <span id="wallet">1000</span></div>

<div class="top">
  <div class="vs-area">
    <img src="images/27826-removebg-preview.png" class="player">
    <img src="images/27679-removebg-preview.png" class="vs">
    <img src="images/27825-removebg-preview.png" class="player">
  </div>
</div>

<div class="table">

<!-- CARDS -->
<div class="cards">
  <div class="flip" id="pubgFlip">
    <div class="flip-inner">
      <div class="front">?</div>
      <div class="back" id="pubgCard">K</div>
    </div>
  </div>

  <div class="flip" id="ffFlip">
    <div class="flip-inner">
      <div class="front">?</div>
      <div class="back" id="ffCard">10</div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div class="history" id="history"></div>

<!-- BET -->
<div class="bets">
  <div class="bet" onclick="placeBet('PUBG')">PUBG</div>
  <div class="bet" onclick="placeBet('TIE')">TIE</div>
  <div class="bet" onclick="placeBet('FREE')">FREE FIRE</div>
</div>

<!-- CHIPS -->
<div class="chips">
  <div class="chip" onclick="setAmount(10)">10</div>
  <div class="chip" onclick="setAmount(50)">50</div>
  <div class="chip" onclick="setAmount(100)">100</div>
  <div class="chip" onclick="setAmount(500)">500</div>
</div>

<div class="timer">Time: <span id="time">20</span></div>

</div>

<script>

let wallet = localStorage.getItem("wallet") || 1000;
let betChoice = "";
let betAmount = 0;
let time = 20;

document.getElementById("wallet").innerText = wallet;

/* CHIP */
function setAmount(a){
  betAmount = a;
}

/* BET */
function placeBet(choice){
  if(time <= 3){
    alert("Bet Closed");
    return;
  }
  betChoice = choice;
}

/* RANDOM CARD */
function randomCard(){
  let cards = ["A","K","Q","J","10","9"];
  return cards[Math.floor(Math.random()*cards.length)];
}

/* RESULT LOGIC */
function getWinner(p, f){
  let order = ["A","K","Q","J","10","9"];
  if(order.indexOf(p) < order.indexOf(f)) return "PUBG";
  if(order.indexOf(p) > order.indexOf(f)) return "FREE";
  return "TIE";
}

/* GAME LOOP */
setInterval(()=>{
  time--;
  document.getElementById("time").innerText = time;

  if(time == 0){

    // RESET FLIP
    document.getElementById("pubgFlip").classList.remove("flip-active");
    document.getElementById("ffFlip").classList.remove("flip-active");

    setTimeout(()=>{

      let pCard = randomCard();
      let fCard = randomCard();

      document.getElementById("pubgCard").innerText = pCard;
      document.getElementById("ffCard").innerText = fCard;

      // FLIP ANIMATION
      document.getElementById("pubgFlip").classList.add("flip-active");
      document.getElementById("ffFlip").classList.add("flip-active");

      let result = getWinner(pCard, fCard);

      // HISTORY
      let h = document.createElement("div");
      h.innerText = result[0];
      document.getElementById("history").prepend(h);

      // WIN
      if(betChoice == result){
        wallet = Number(wallet) + betAmount*2;
      }else{
        wallet = Number(wallet) - betAmount;
      }

      localStorage.setItem("wallet",wallet);
      document.getElementById("wallet").innerText = wallet;

      betChoice = "";

    },500);

    time = 20;
  }

},1000);

</script>

</body>
</html>
