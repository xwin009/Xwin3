<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  position:absolute;
  right:10px;
  top:10px;
  background:#111;
  padding:6px 12px;
  border-radius:10px;
}

/* TOP BG */
.top{
  height:180px;
  background:url('images/file_00000000fb9072088776bb496c7908c3.png') center/cover;
  position:relative;
}

/* VS AREA */
.vs-area{
  position:absolute;
  bottom:-40px;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
}

.card{
  width:70px;
  height:90px;
  background:#fff;
  color:#000;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:bold;
}

.vs{
  font-size:22px;
  font-weight:bold;
}

/* TABLE */
.table{
  margin-top:60px;
  background:url('images/27676-removebg-preview.png') center/cover;
  padding:15px;
  border-radius:20px 20px 0 0;
}

/* HISTORY */
.history{
  display:flex;
  overflow-x:auto;
  gap:6px;
  margin:10px 0;
}

.history div{
  min-width:28px;
  height:28px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* TIE */
.tie{
  background:#2ecc71;
  padding:12px;
  border-radius:10px;
  text-align:center;
  margin-bottom:10px;
  font-weight:bold;
}

/* BET BOX GRID */
.bet-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* TEAM BOX */
.team{
  position:relative;
  height:140px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.team img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.team span{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,0.6);
  text-align:center;
  padding:6px;
  font-weight:bold;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.chips div{
  background:#333;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* TIMER */
.timer{
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">PUBG & FREE FIRE</div>
<div class="wallet">₹ <span id="wallet">1000</span></div>

<div class="top">
  <div class="vs-area">
    <div class="card" id="pubgCard">?</div>
    <div class="vs">VS</div>
    <div class="card" id="ffCard">?</div>
  </div>
</div>

<div class="table">

<!-- HISTORY -->
<div class="history" id="history"></div>

<!-- TIE -->
<div class="tie" onclick="placeBet('TIE')">
  Tie (8:1)
</div>

<!-- BET -->
<div class="bet-grid">

  <div class="team" onclick="placeBet('PUBG')">
    <img src="images/27826-removebg-preview.png">
    <span>PUBG</span>
  </div>

  <div class="team" onclick="placeBet('FREE')">
    <img src="images/27825-removebg-preview.png">
    <span>FREE FIRE</span>
  </div>

</div>

<!-- CHIPS -->
<div class="chips">
  <div onclick="setAmount(10)">10</div>
  <div onclick="setAmount(50)">50</div>
  <div onclick="setAmount(100)">100</div>
  <div onclick="setAmount(500)">500</div>
</div>

<div class="timer">Time: <span id="time">20</span></div>

</div>

<script>

let wallet = localStorage.getItem("wallet") || 1000;
let bet = "";
let amount = 0;
let time = 20;

document.getElementById("wallet").innerText = wallet;

function setAmount(a){
  amount = a;
}

function placeBet(b){
  if(time <= 3){
    alert("Bet Closed");
    return;
  }
  bet = b;
}

/* RANDOM CARD */
function card(){
  let arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function result(p,f){
  let order=["A","K","Q","J","10","9"];
  if(order.indexOf(p)<order.indexOf(f)) return "PUBG";
  if(order.indexOf(p)>order.indexOf(f)) return "FREE";
  return "TIE";
}

setInterval(()=>{

  time--;
  document.getElementById("time").innerText=time;

  if(time==0){

    let p=card();
    let f=card();

    document.getElementById("pubgCard").innerText=p;
    document.getElementById("ffCard").innerText=f;

    let r=result(p,f);

    let h=document.createElement("div");
    h.innerText=r[0];
    document.getElementById("history").prepend(h);

    if(bet==r){
      wallet = Number(wallet) + amount*2;
    }else{
      wallet = Number(wallet) - amount;
    }

    localStorage.setItem("wallet",wallet);
    document.getElementById("wallet").innerText=wallet;

    bet="";
    time=20;
  }

},1000);

</script>

</body>
</html>
