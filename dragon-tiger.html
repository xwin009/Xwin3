<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PUBG vs FREE FIRE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

/* CONTAINER */
.app{
  max-width:420px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  background:#111827;
  position:relative;
}

.wallet{
  position:absolute;
  right:10px;
  top:10px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.card{
  width:70px;
  height:90px;
  background:#fff;
  color:#000;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

/* HISTORY */
.history{
  display:flex;
  justify-content:center;
  gap:5px;
  margin:5px;
}

.history div{
  width:22px;
  height:22px;
  background:#333;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

/* TIE BAR */
.tie{
  background:#3cd070;
  text-align:center;
  padding:10px;
  margin:10px;
  border-radius:8px;
}

/* BET AREA */
.bet{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.box{
  width:40%;
  height:130px;
  background:#1f2937;
  border-radius:10px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  padding-bottom:8px;
}

.amount{
  position:absolute;
  top:5px;
  right:5px;
  background:#000;
  padding:3px 6px;
  border-radius:6px;
  font-size:12px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.chips div{
  background:#333;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

/* TIMER */
.timer{
  text-align:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <b>PUBG & FREE FIRE</b>
    <div class="wallet">₹ <span id="wallet">1000</span></div>

    <div class="cards">
      <div class="card" id="pCard">?</div>
      <div>VS</div>
      <div class="card" id="fCard">?</div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="history" id="history"></div>

  <!-- TIE -->
  <div class="tie">Tie (9x)</div>

  <!-- BET -->
  <div class="bet">

    <div class="box" onclick="betPlace('PUBG')">
      <div class="amount" id="pubgAmt">0</div>
      PUBG
    </div>

    <div class="box" onclick="betPlace('FREE')">
      <div class="amount" id="freeAmt">0</div>
      FREE FIRE
    </div>

  </div>

  <!-- CHIPS -->
  <div class="chips">
    <div onclick="setAmt(10)">10</div>
    <div onclick="setAmt(50)">50</div>
    <div onclick="setAmt(100)">100</div>
    <div onclick="setAmt(500)">500</div>
    <div onclick="setAmt(1000)">1000</div>
  </div>

  <div class="timer">Time: <span id="time">20</span></div>

</div>

<script>

let wallet=1000;
let chip=0;

let pubg=0;
let free=0;

let time=20;

/* CHIP */
function setAmt(a){
  chip=a;
}

/* BET */
function betPlace(type){

  if(time<=3){
    alert("Bet Closed");
    return;
  }

  if(wallet<chip){
    alert("Low Balance");
    return;
  }

  wallet-=chip;
  document.getElementById("wallet").innerText=wallet;

  if(type=="PUBG"){
    pubg+=chip;
    document.getElementById("pubgAmt").innerText=pubg;
  }

  if(type=="FREE"){
    free+=chip;
    document.getElementById("freeAmt").innerText=free;
  }
}

/* CARD */
function rand(){
  let arr=["A","K","Q","J","10","9"];
  return arr[Math.floor(Math.random()*arr.length)];
}

/* RESULT */
function res(p,f){
  let order=["A","K","Q","J","10","9"];
  if(order.indexOf(p)<order.indexOf(f)) return "PUBG";
  if(order.indexOf(p)>order.indexOf(f)) return "FREE";
  return "TIE";
}

/* GAME LOOP */
setInterval(()=>{

  time--;
  document.getElementById("time").innerText=time;

  if(time==0){

    let p=rand();
    let f=rand();

    document.getElementById("pCard").innerText=p;
    document.getElementById("fCard").innerText=f;

    let r=res(p,f);

    let h=document.createElement("div");
    h.innerText=r[0];
    document.getElementById("history").prepend(h);

    // WIN LOGIC
    if(r=="PUBG") wallet+=pubg*2;
    if(r=="FREE") wallet+=free*2;
    if(r=="TIE") wallet+=(pubg+free)*0 + (0); // optional

    document.getElementById("wallet").innerText=wallet;

    // RESET
    pubg=0;
    free=0;

    document.getElementById("pubgAmt").innerText=0;
    document.getElementById("freeAmt").innerText=0;

    time=20;
  }

},1000);

</script>

</body>
</html>
