}

border:1px solid #333;
border-radius:10px;
background:#0f172a;
scroll-behavior: auto; / ❌ smooth hata */
}

.history::-webkit-scrollbar{
display:none;
}

.history div{
min-width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
color:#fff;
}

.history .P{
background:#2563eb;
}

.history .F{
background:#dc2626;
}

.history .T{
background:#22c55e;
}

/* TIE /
.tie{
background:#3cd070;
text-align:center;
padding:12px;
margin:10px;
border-radius:10px;
font-size:16px;
position:relative;  / ✅ YE ADD KAR */
}

/* BET BOX */
.bet{

justify-content:space-around;
padding:20px 10px;

}

.box{

height:180px;

/* 🔥 BORDER ONLY */
border:2px solid rgba(255,255,255,0.25);
box-shadow:0 0 10px rgba(0,0,0,0.5);

}

.pubg-box{
background-image:url("images/27826-removebg-preview.png");
}

.free-box{
background-image:url("images/27825-removebg-preview.png");
}
.amount{

top:6px;
right:6px;
background:#000;
padding:4px 8px;
border-radius:8px;
font-size:12px;
}

/* CHIPS */
.chips{
display:flex;
justify-content:center;
gap:10px;
}

.chips div{
background:#333;
padding:12px;
border-radius:50%;
cursor:pointer;
}

.chips .active{
background:#ffd700;
color:#000;
font-weight:bold;
}
.history-btn{
margin:12px auto;
width:120px;
text-align:center;
background:#111;
padding:10px;
border-radius:10px;
font-size:14px;
box-shadow:0 0 10px #00ffcc;
}

.history-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.history-box{
width:90%;
max-width:350px;
background:linear-gradient(145deg,#0f172a,#020617);
border-radius:16px;
padding:15px;
box-shadow:0 0 25px #00ffcc;
animation:pop 0.3s ease;
}

.history-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
}

#historyList{
max-height:300px;
overflow-y:auto;
}

/* 🔥 ITEM DESIGN */
.history-item{
padding:10px;
border-radius:10px;
margin-bottom:8px;
display:flex;
justify-content:space-between;
font-size:13px;
}

/* 🟢 WIN STYLE */
.win{
background:rgba(0,255,150,0.1);
border:1px solid #00ff99;
box-shadow:0 0 10px #00ff99;
}

/* 🔴 LOSS STYLE */
.loss{
background:rgba(255,0,80,0.1);
border:1px solid #ff0055;
box-shadow:0 0 10px #ff0055;
}
.table-bg{
background:url("images/27879-removebg-preview.png") no-repeat center;
background-size:cover;
}
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:0.3s;
}

.popup.show{
opacity:1;
pointer-events:auto;
}

.popup-box{
background:#111827;
padding:20px 30px;
border-radius:12px;
color:#fff;
font-size:16px;
box-shadow:0 0 20px #00ffcc;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.7);}
to{transform:scale(1);}
}
/* TIMER TEXT */
.timer{
text-align:center;
margin:5px;
}
</style>  </head>  <body>  <div class="app">    <div class="header">
<b>PUBG & FREE FIRE</b>  <div class="wallet">₹ <span id="wallet">2000</span></div>

  <div class="cards">    <!-- PUBG -->    <div class="flip" id="pFlip">    
    <div class="inner">    
      <div class="front">    
        <img src="images/27681-removebg-preview.png">    
      </div>    
      <div class="back" id="pCard"></div>    
    </div>    
  </div>    <div>VS</div>    <!-- FREE FIRE -->    <div class="flip" id="fFlip">    
    <div class="inner">    
      <div class="front">    
        <img src="images/27682-removebg-preview.png">    
      </div>    
      <div class="back" id="fCard"></div>    
    </div>    
  </div>    </div>  <!-- 🔥 TIMER CIRCLE -->    
<div class="circle-timer">    
  <span id="time">20</span>    
</div>    </div>    <div class="history" id="history"></div>  <div class="table-bg">    <div class="tie" onclick="betPlace('TIE')">    
    Tie (9x)    
    <div class="amount" id="tieAmt">0</div>    
  </div>    <div class="bet">    
    <div class="box pubg-box" onclick="betPlace('PUBG')">    
  <div class="amount" id="pubgAmt">0</div>    
</div>  <div class="box free-box" onclick="betPlace('FREE')">    
  <div class="amount" id="freeAmt">0</div>    
</div>    
  </div>    <div class="chips" id="chips">    
    <div onclick="setAmt(10,this)">10</div>    
    <div onclick="setAmt(50,this)">50</div>    
    <div onclick="setAmt(100,this)">100</div>    
    <div onclick="setAmt(500,this)">500</div>    
    <div onclick="setAmt(1000,this)">1000</div>    
  </div>

</div>  </div>    <script type="module">    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDocs, collection, query, where, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE INIT
const app = initializeApp({
apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
authDomain:"colourcash-ea60e.firebaseapp.com",
projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

// 🔥 USER
const userEmail = localStorage.getItem("userEmail");
let userDocId = "";

// 🔥 LIVE HOUSE EDGE
let houseEdge = 50;
let myBets = JSON.parse(localStorage.getItem("pf_bets")) || [];
// 🔥 REAL-TIME CONTROL 🔥
function liveEdge(){
onSnapshot(doc(db,"settings","houseEdge"), (snap)=>{
if(snap.exists()){
houseEdge = snap.data().dragonTiger ?? 50;
console.log("🔥 LIVE EDGE:", houseEdge);
}
});
}

// 🔥 GAME VARS
let wallet = 0;
let chip = 0;

let pubg = 0;
let free = 0;
let tie = 0;
let time = 20;
let gameInterval;

// 🔥 LOAD WALLET
async function loadWallet(){
const snap = await getDocs(
query(collection(db,"users"), where("email","==",userEmail))
);

snap.forEach(d=>{
userDocId = d.id;
wallet = d.data().balance || 0;
});

document.getElementById("wallet").innerText = wallet;
}

await loadWallet();
liveEdge(); // 🔥 REAL-TIME START

// 🔥 MUSIC
document.addEventListener("click", ()=>{
const music = document.getElementById("bgMusic");
if(music.paused){
music.play();
music.volume = 0.3;
}
});

// 🔥 LOAD HISTORY
if(localStorage.getItem("history")){
document.getElementById("history").innerHTML = localStorage.getItem("history");
}

if(localStorage.getItem("time")){
time = parseInt(localStorage.getItem("time"));
}

// 🔥 SCROLL FIX
setTimeout(()=>{
const hist = document.getElementById("history");
hist.scrollLeft = hist.scrollWidth;
},100);

// 🔥 POPUP
function showPopup(msg){
const p = document.getElementById("popup");
document.getElementById("popupText").innerText = msg;
p.classList.add("show");

setTimeout(()=>{
p.classList.remove("show");
},1500);
}

// 🔥 CHIP
window.setAmt = (a, el) => {
chip = a;
document.querySelectorAll(".chips div").forEach(e=>e.classList.remove("active"));
el.classList.add("active");
};

// 🔥 BET
window.betPlace = async (type) => {

if(time <= 3) return showPopup("Bet Closed");
if(wallet < chip) return showPopup("Low Balance");

wallet -= chip;

await updateDoc(doc(db,"users",userDocId),{
balance: wallet
});

document.getElementById("wallet").innerText = wallet;

if(type=="PUBG"){
pubg += chip;
document.getElementById("pubgAmt").innerText = pubg;
}

if(type=="FREE"){
free += chip;
document.getElementById("freeAmt").innerText = free;
}

if(type=="TIE"){
tie += chip;
document.getElementById("tieAmt").innerText = tie;
}
};

// 🔥 CONTROLLED RESULT (LIVE EDGE)
function controlledResult(){

let winSide;

let chance = houseEdge / 100;

if(chance === 1){
// 🟢 ALWAYS WIN
if(pubg > free) winSide = "PUBG";
else if(free > pubg) winSide = "FREE";
else winSide = Math.random()<0.5?"PUBG":"FREE";
}
else if(chance === 0){
// 🔴 ALWAYS LOSS
if(pubg > free) winSide = "FREE";
else if(free > pubg) winSide = "PUBG";
else winSide = Math.random()<0.5?"PUBG":"FREE";
}
else{
// ⚖️ MIX
if(Math.random() < chance){
if(pubg > free) winSide = "PUBG";
else if(free > pubg) winSide = "FREE";
else winSide = Math.random()<0.5?"PUBG":"FREE";
}else{
if(pubg > free) winSide = "FREE";
else if(free > pubg) winSide = "PUBG";
else winSide = Math.random()<0.5?"PUBG":"FREE";
}
}

return winSide;
}

// 🔥 RESULT
function result(p,f){
const order=["A","K","Q","J","10","9"];
if(order.indexOf(p) < order.indexOf(f)) return "PUBG";
if(order.indexOf(p) > order.indexOf(f)) return "FREE";
return "TIE";
}

// 🔥 GAME LOOP
window.openHistory = function(){
document.getElementById("historyPopup").style.display = "flex";
renderPopupHistory();
}

window.closeHistory = function(){
document.getElementById("historyPopup").style.display = "none";
}

function renderPopupHistory(){
const list = document.getElementById("historyList");
list.innerHTML = "";

myBets.forEach(b=>{

let div = document.createElement("div");    

div.className = "history-item " + (b.status === "WIN" ? "win" : "loss");    

div.innerHTML = `

<span>${b.type === "FREE" ? "FREE FIRE" : b.type}</span>
<span>₹${b.amount}</span>
<span style="font-size:11px;opacity:.7">${b.time}</span>
`;

list.appendChild(div);

});
}
function startRound(){

clearInterval(gameInterval);

if(!localStorage.getItem("time")){
time = 20;
}

document.getElementById("pFlip").classList.remove("active");
document.getElementById("fFlip").classList.remove("active");

document.getElementById("pCard").innerText = "";
document.getElementById("fCard").innerText = "";

gameInterval = setInterval(async ()=>{

document.getElementById("time").innerText = time;    

time--;    

localStorage.setItem("time", time);    
localStorage.setItem("history", document.getElementById("history").innerHTML);    

if(time < 0){    

  clearInterval(gameInterval);    

  const win = controlledResult();    

  let p,f;    

  if(win=="PUBG"){    
    p="K"; f="10";    
  }else{    
    p="10"; f="K";    
  }    

  document.getElementById("pCard").innerText = p;    
  document.getElementById("fCard").innerText = f;    

  document.getElementById("pFlip").classList.add("active");    
  document.getElementById("fFlip").classList.add("active");    

  const r = result(p,f);    

  const h = document.createElement("div");    
  h.innerText = r[0];    
  h.classList.add(r[0]);    
  document.getElementById("history").appendChild(h);    

  const hist = document.getElementById("history");    
  hist.scrollLeft = hist.scrollWidth;    

  if(r=="PUBG") wallet += pubg * 2;    
  if(r=="FREE") wallet += free * 2;    
  if(r=="TIE") wallet += tie * 9;    

  // 🔥 SAVE BET HISTORY

if(pubg > 0){
myBets.unshift({
type:"PUBG",
amount: pubg,
time: new Date().toLocaleTimeString(),
status: r=="PUBG" ? "WIN" : "LOSS"
});
}

if(free > 0){
myBets.unshift({
type:"FREE",
amount: free,
time: new Date().toLocaleTimeString(),
status: r=="FREE FIRE" ? "WIN" : "LOSS"
});
}

if(tie > 0){
myBets.unshift({
type:"TIE",
amount: tie,
time: new Date().toLocaleTimeString(),
status: r=="TIE" ? "WIN" : "LOSS"
});
}

myBets = myBets.slice(0,20);
localStorage.setItem("pf_bets", JSON.stringify(myBets));

document.getElementById("wallet").innerText = wallet;    

  await updateDoc(doc(db,"users",userDocId),{    
    balance: wallet    
  });    

  pubg = 0;    
  free = 0;    
  tie = 0;    

  document.getElementById("pubgAmt").innerText = 0;    
  document.getElementById("freeAmt").innerText = 0;    
  document.getElementById("tieAmt").innerText = 0;    

  setTimeout(()=>{    
    localStorage.removeItem("time");    
    startRound();    
  },2000);    
}

},1000);
}

startRound();
