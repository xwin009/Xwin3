<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinner Game</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;

  background:url("images/file_000000001278720b8493fb57bb1baced.png") no-repeat center center;
  background-size:cover;
  background-attachment:fixed;

  color:#fff;
}
/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

.wallet{
  background:#111;
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
  box-shadow:0 0 10px #00ffcc;
}

/* SPINNER */
.spinner-box{
  position:relative;
  margin:20px auto;
  width:260px;
  height:260px;
}

.spinner{
  width:100%;
  height:100%;
  border-radius:50%;
  transition:4s cubic-bezier(.17,.67,.83,.67);
}

.arrow{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(0deg);
  transform-origin:center -120px; /* 🔥 radius adjust */
}

.arrow img{
  width:40px;   /* size adjust kar sakta hai */
  height:auto;
}

/* BOXES */
.boxes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  padding:0;
  overflow:hidden;
  position:relative;
  border-radius:12px;
  background:transparent; /* 🔥 black hata diya */
}

.box img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.active{
  border:2px solid #00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.start{background:#22c55e;}
.history{background:#000;}

/* BET */
.bet{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.bet button{
  width:40px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  opacity:0;
  pointer-events:none;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:10px;
}

/* HISTORY */
.history-box{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  padding:20px;
}

.history-item{
  background:#111;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
}
  .ball{
  position:absolute;
  top:50%;
  left:50%;
  width:14px;
  height:14px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 10px #fff;

  transform:rotate(0deg) translate(110px) rotate(0deg);
  transform-origin:center;
}
  
</style>
</head>

<body>

<div class="header">
M416 Spiner 💫
  <div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<div class="spinner-box">
<div class="arrow">
  <img src="images/33752-removebg-preview.png" alt="arrow">
</div>
  <img src="images/33724-removebg-preview.png" id="spinner" class="spinner">
  <div class="ball" id="ball"></div>
</div>

<!-- BOXES -->
<div class="boxes">

  <div class="box" onclick="selectBox(0)">
    <img src="images/Picsart_26-03-27_22-32-15-790.jpg"><br>5x
  </div>

  <div class="box" onclick="selectBox(1)">
    <img src="images/Picsart_26-03-27_22-33-19-351.jpg"><br>4x
  </div>

  <div class="box" onclick="selectBox(2)">
    <img src="images/Picsart_26-03-27_22-33-43-202.jpg"><br>2x
  </div>

  <div class="box" onclick="selectBox(3)">
    <img src="images/Picsart_26-03-27_22-32-49-442.jpg"><br>2x
  </div>

</div>

<!-- BET -->
<div class="bet">
  <button onclick="changeBet(-10)">-</button>
  <input type="number" id="bet" value="100">
  <button onclick="changeBet(10)">+</button>
</div>

<button class="start" onclick="spin()">START</button>
<button class="history" onclick="openHistory()">📜 History</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<!-- HISTORY -->
<div class="history-box" id="historyBox">
  <h3>History</h3>
  <div id="historyList"></div>
  <button onclick="closeHistory()">Close</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDocs, collection, query, where, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

/* USER */
const userEmail = localStorage.getItem("userEmail");
let userDocId = "";
let wallet = 0;

/* 🔥 HOUSE EDGE */
let HOUSE_EDGE = 0.5;

/* 🔥 ROTATION CONTROL */
let spinDeg = 0;

/* LOAD WALLET */
async function loadWallet(){
  const snap = await getDocs(query(collection(db,"users"), where("email","==",userEmail)));
  snap.forEach(d=>{
    userDocId = d.id;
    wallet = d.data().balance || 0;
  });
  document.getElementById("wallet").innerText = wallet;
}
await loadWallet();

/* 🔥 LIVE HOUSE EDGE */
onSnapshot(doc(db,"settings","houseEdge"), (snap)=>{
  if(snap.exists()){
    let val = snap.data().m416Spinner ?? 50;
    HOUSE_EDGE = val / 100;
  }
});

/* GAME */
let selected = -1;
let history = [];

const multipliers = [5,4,2,2];

const wheelMap = [
  {type:"win", box:0},
  {type:"lose"},
  {type:"win", box:1},
  {type:"lose"},
  {type:"win", box:2},
  {type:"lose"},
  {type:"win", box:3},
  {type:"lose"}
];

/* SELECT */
window.selectBox = function(i){
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".box")[i].classList.add("active");
  selected = i;
}

/* 🔥 FINAL SPIN */
let ballDeg = 0;

window.spin = async function(){

  if(selected === -1){
    alert("Select box first");
    return;
  }

  let bet = parseInt(document.getElementById("bet").value) || 0;

  if(wallet < bet){
    alert("Low Balance");
    return;
  }

  // 💰 BET CUT
  wallet -= bet;
  document.getElementById("wallet").innerText = wallet;
  await updateDoc(doc(db,"users",userDocId),{ balance: wallet });

  let ball = document.getElementById("ball");

  // 🎯 RESULT FIX
  let winChance = Math.random();
let index;

if(winChance < HOUSE_EDGE){

  // ✅ EXACT WIN
  index = wheelMap.findIndex(item => item.type === "win" && item.box === selected);

}else{

  // ❌ ONLY LOSE
  let loseIndexes = wheelMap
    .map((item,i)=> item.type==="lose" ? i : null)
    .filter(i=> i !== null);

  index = loseIndexes[Math.floor(Math.random() * loseIndexes.length)];
}

  let result = wheelMap[index];

  let slice = 360 / 8;

// 🎯 target (center of slice)
let target = index * slice + (slice / 2);

// 🔥 arrow top (IMPORTANT FIX)
let finalAngle = target - 90;

// 🔥 smooth spin
let spins = 5;

ballDeg += (360 * spins) + finalAngle;

ball.style.transition = "4s cubic-bezier(0.22, 1, 0.36, 1)";
ball.style.transform = `rotate(${ballDeg}deg) translate(110px) rotate(-${ballDeg}deg)`;
  // 🎯 RESULT AFTER STOP
  setTimeout(async ()=>{

    if(result.type === "lose"){
      showPopup(`🥲 Better Luck Next Time`);
      addHistory("LOSS", bet);

    } else {

      if(result.box === selected){

        let amount = bet * multipliers[selected];

        wallet += amount;
        document.getElementById("wallet").innerText = wallet;
        await updateDoc(doc(db,"users",userDocId),{ balance: wallet });

        showPopup(`🎉 WIN ₹${amount}`);
        addHistory("WIN", amount);

      } else {
        showPopup(`💀 LOSS ₹${bet}`);
        addHistory("LOSS", bet);
      }

    }

  },4000);
}

/* BET */
window.changeBet = function(val){
  let i = document.getElementById("bet");
  i.value = Math.max(10,(parseInt(i.value)||0)+val);
}

/* POPUP */
function showPopup(text){
  let p = document.getElementById("popup");
  let t = document.getElementById("popupText");

  t.innerHTML = text;
  p.classList.add("show");

  setTimeout(()=>p.classList.remove("show"),2000);
}

/* HISTORY */
function addHistory(type, amount){
  let time = new Date().toLocaleTimeString();
  history.unshift({type,amount,time});
  renderHistory();
}

function renderHistory(){
  let list = document.getElementById("historyList");
  list.innerHTML = "";

  history.forEach(h=>{
    let d = document.createElement("div");
    d.className="history-item";
    d.innerHTML = `${h.time} - ${h.type} ₹${h.amount}`;
    list.appendChild(d);
  });
}

/* HISTORY */
window.openHistory = function(){
  document.getElementById("historyBox").style.display="flex";
}
window.closeHistory = function(){
  document.getElementById("historyBox").style.display="none";
}

</script>
</body>
</html>
