<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

h2{text-align:center}

.game{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  margin:10px 0;
  background:#111;
  border-radius:10px;
}

button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.on{background:#00c853;color:#000}
.off{background:#ff1744;color:#fff}
</style>

</head>

<body>

<h2>⚙️ Admin Panel</h2>

<!-- 🔥 ALL GAMES -->
<div id="games"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

/* 🔥 ALL GAME LIST */
const games = [
"wingo",
"mines",
"aviator",
"dragon-tiger",
"roulette",
"m416spiner",
"coinflip",
"treasure",
"chicken-road",
"dice",
"plinko",
"drax-turbo-drive",
"spin-stop",
"horse-race",
"ganesh-slots",
"keno",
"fate-shift",
"hilo",
"dragon-tower",
"balloon-crash",
"7updown",
"draxbet-invest"
];

/* UI CREATE */
const container = document.getElementById("games");

games.forEach(name=>{
  const div = document.createElement("div");
  div.className="game";

  div.innerHTML = `
    <span>${name}</span>
    <button onclick="toggleGame('${name}')" id="${name}Btn">...</button>
  `;

  container.appendChild(div);
});

/* LOAD STATUS */
async function loadGame(name){
  const ref = doc(db,"gameStatus",name);
  const snap = await getDoc(ref);

  let active = true;

  if(snap.exists()){
    active = snap.data().active;
  }

  const btn = document.getElementById(name+"Btn");

  if(active){
    btn.innerText = "ON";
    btn.className = "on";
  }else{
    btn.innerText = "OFF";
    btn.className = "off";
  }
}

/* TOGGLE */
window.toggleGame = async function(name){

  const ref = doc(db,"gameStatus",name);
  const snap = await getDoc(ref);

  let current = true;

  if(snap.exists()){
    current = snap.data().active;
  }

  await updateDoc(ref,{
    active: !current
  });

  loadGame(name);
}

/* INIT LOAD */
games.forEach(loadGame);

</script>

</body>
</html>
