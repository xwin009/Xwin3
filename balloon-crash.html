<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloon Crash</title>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:linear-gradient(#4facfe,#00f2fe);
  color:#fff;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#1e3c72;
}

/* MULTIPLIER */
#multi{
  font-size:60px;
  margin-top:50px;
}

/* BALLOON */
.balloon{
  font-size:80px;
  margin-top:20px;
}

/* BUTTONS */
.controls{
  position:fixed;
  bottom:20px;
  width:100%;
}

button{
  padding:14px 30px;
  font-size:18px;
  border:none;
  border-radius:20px;
  margin:5px;
}

.bet{background:#2196f3;color:#fff}
.cash{background:#4caf50;color:#000}
</style>

</head>

<body>

<div class="top">
  <div>🎈 Balloon Crash</div>
  <div>₹ <span id="wallet">1000</span></div>
</div>

<div id="multi">1.00x</div>
<div class="balloon">🎈</div>

<div class="controls">
  <button class="bet" onclick="start()">BET</button>
  <button class="cash" onclick="cashout()">CASHOUT</button>
</div>

<script>

let wallet = 1000;
let bet = 100;
let multi = 1;
let running = false;
let crashed = false;

function start(){

if(running) return;

running = true;
crashed = false;
multi = 1;

wallet -= bet;
update();

let crashPoint = (Math.random()*5 + 1).toFixed(2); // 🔥 random crash

let interval = setInterval(()=>{

multi += 0.02;
document.getElementById("multi").innerText = multi.toFixed(2)+"x";

// 💥 crash
if(multi >= crashPoint){
clearInterval(interval);
running = false;
crashed = true;

document.getElementById("multi").innerText = "💥 CRASHED at "+multi.toFixed(2)+"x";
}

},50);

}

function cashout(){

if(!running || crashed) return;

running = false;

let win = Math.floor(bet * multi);
wallet += win;

document.getElementById("multi").innerText = "✅ CASHOUT "+multi.toFixed(2)+"x";

update();
}

function update(){
document.getElementById("wallet").innerText = wallet;
}

</script>

</body>
</html>
