<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Carrom Bet Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f5132;
  color:#fff;
  text-align:center;
}

/* HEADER */
.header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.timer{
  font-size:20px;
  color:#ffd54f;
}

/* BOARD */
.board{
  width:90%;
  max-width:380px;
  aspect-ratio:1/1;
  margin:20px auto;
  border-radius:20px;
  position:relative;

  background:url("images/34543-removebg-preview.png") no-repeat center;
  background-size:100% 100%;
}
/* STRIKER */
.striker{
  width:16px;
  height:16px;
  background:#fff;
  border-radius:50%;
  position:absolute;
  bottom:35px;     /* 🔥 line pe aayega */
  left:50%;
  transform:translateX(-50%);
  transition:1s;
  z-index:5;
}
  
.coin{
  width:26px;
  height:26px;
  border-radius:50%;
  position:absolute;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:bold;
  color:#fff;
}

/* 🔴 RED */
.redCoin{
  background:#e53935;
  top:35%;
  left:25%;
}

/* ⚪ WHITE */
.whiteCoin{
  background:#eee;
  color:#000;
  top:25%;
  left:50%;
  transform:translateX(-50%);
}

/* ⚫ BLACK */
.blackCoin{
  background:#000;
  top:35%;
  right:25%;
}
/* SELECT */
.select{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.btn{
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.red{background:#e53935}
.white{background:#eee;color:#000}
.black{background:#000}

.active{
  outline:3px solid #00e5ff;
}

/* INPUT */
input{
  width:80%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
.play{
  width:80%;
  padding:12px;
  margin-top:10px;
  background:#4caf50;
  border:none;
  border-radius:10px;
  color:#fff;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
}
.popup div{
  background:#111;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🎯 Carrom Bet</div>
<div>Wallet: ₹<span id="wallet">1000</span></div>
<div class="timer" id="timer">20</div>

<div class="board">
  <div class="striker" id="striker"></div>
  <div class="coin redCoin">5x</div>
<div class="coin whiteCoin">3x</div>
<div class="coin blackCoin">2x</div>
</div>

<div class="select">
  <div class="btn red" onclick="select('RED',this)">RED 5x</div>
  <div class="btn white" onclick="select('WHITE',this)">WHITE 3x</div>
  <div class="btn black" onclick="select('BLACK',this)">BLACK 2x</div>
</div>

<input id="amount" type="number" placeholder="Enter Amount">

<button class="play" onclick="placeBet()">Place Bet</button>

<div class="popup" id="popup">
  <div id="popupText"></div>
</div>

<script>

/* STATE */
let wallet = 1000;
let selected = null;
let bet = 0;

let phase = "BET";
let time = 20;

/* SELECT */
function select(color,el){
  if(phase!=="BET") return;

  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  selected = color;
}

/* BET */
function placeBet(){
  let amt = parseInt(document.getElementById("amount").value);

  if(!selected || !amt) return alert("Select & Enter Amount");

  if(amt > wallet) return alert("Low balance");

  bet = amt;
  wallet -= amt;

  updateUI();
}

/* TIMER */
setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;

  if(phase==="BET" && time===0){
    phase="LOCK";
    time=5;
  }

  else if(phase==="LOCK" && time===0){
    playGame();
    phase="RESULT";
    time=5;
  }

  else if(phase==="RESULT" && time===0){
    phase="BET";
    time=20;
    selected=null;
    bet=0;
    document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  }

},1000);

/* RESULT LOGIC */
function getResult(){
  let r = Math.random();

  if(r < 0.2) return "RED";
  else if(r < 0.5) return "WHITE";
  else return "BLACK";
}

/* GAME */
function playGame(){

  let result = getResult();

  animate(result);

  setTimeout(()=>{

    if(selected === result){

      let multi = result==="RED"?5:result==="WHITE"?3:2;

      let win = bet * multi;
      wallet += win;

      showPopup(`🎉 WIN ₹${win}`);

    }else{
      showPopup(`💀 LOSS ₹${bet}`);
    }

    updateUI();

  },1200);
}

/* ANIMATION */
function animate(result){

  let striker = document.getElementById("striker");

  let move = {
    RED: "translate(-150px,-150px)",
    WHITE: "translate(0,-180px)",
    BLACK: "translate(150px,-150px)"
  };

  striker.style.transform = move[result];

  setTimeout(()=>{
    striker.style.transform = "translateX(-50%)";
  },1000);
}

/* POPUP */
function showPopup(msg){
  let p = document.getElementById("popup");
  let t = document.getElementById("popupText");

  t.innerText = msg;
  p.style.display="flex";

  setTimeout(()=>p.style.display="none",1500);
}

/* UI */
function updateUI(){
  document.getElementById("wallet").innerText = wallet;
}

</script>

</body>
</html>
