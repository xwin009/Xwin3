<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DICE ROLL</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

  body{
  margin:0;
  font-family:Arial, sans-serif;

  /* 🔥 BACKGROUND IMAGE */
  background:url("images/file_0000000023bc71faade15b20862c7b4a.png") no-repeat center;
  background-size:cover;
  background-attachment:fixed;

  color:#fff;
  text-align:center;
  position:relative;
}

/* 🔥 DARK OVERLAY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  font-weight:bold;
}

/* WALLET */
.wallet{
  background:rgba(0,0,0,.5);
  padding:6px 14px;
  border-radius:20px;

  border:2px solid #00ff66;
  box-shadow:0 0 10px #00ff66,0 0 20px rgba(0,255,102,0.5);
}

/* 🎲 DICE */
.dice{
  width:120px;
  height:120px;
  margin:20px auto;

  border-radius:20px;
  border:2px solid #00ff66;
  box-shadow:0 0 12px #00ff66,0 0 25px rgba(0,255,102,0.6);

  transition:transform .3s;
}
.roll{
  transform:rotate(360deg) scale(1.2);
}

/* INPUT */
input{
  width:80%;
  padding:14px;
  border-radius:30px;
  border:2px solid #00ff66;
  margin-bottom:14px;
  font-size:16px;

  background:rgba(0,0,0,0.6);
  color:#fff;

  box-shadow:0 0 10px #00ff66,0 0 20px rgba(0,255,102,0.4);
}

/* ODD EVEN */
.odd-even{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:14px;
}

.oe-btn{
  flex:1;
  max-width:140px;
  padding:12px 0;
  border-radius:20px;
  border:2px solid #00ff66;

  background:#1e2a3a;
  color:#fff;
  font-weight:bold;

  box-shadow:0 0 10px #00ff66,0 0 20px rgba(0,255,102,0.4);
}

/* ACTIVE BUTTON */
.oe-btn.active{
  background:#00ff66;
  color:#000;
  transform:scale(1.05);

  box-shadow:
    0 0 12px #00ff66,
    0 0 25px #00ff66,
    0 0 40px rgba(0,255,102,0.8);
}

/* ROLL BUTTON */
#roll{
  width:80%;
  padding:14px;
  border-radius:30px;
  border:2px solid #00ff66;

  background:#ffb300;
  font-size:18px;
  font-weight:bold;

  box-shadow:
    0 0 12px #00ff66,
    0 0 25px rgba(0,255,102,0.6),
    0 0 35px rgba(0,255,102,0.4);
}

/* HISTORY */
.my-history{
  margin:16px;
  background:rgba(0,0,0,.5);
  border-radius:12px;
  padding:10px;
  text-align:left;
  font-size:13px;

  border:2px solid #00ff66;
  box-shadow:0 0 12px #00ff66,0 0 25px rgba(0,255,102,0.5);
}

.my-history h3{
  margin:0 0 6px;
  text-align:center;
}

/* HISTORY ROW */
.bet-row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:6px 0;
}

.win{ color:#00ff66; }
.lose{ color:#ff5252; }

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}

/* POPUP BOX */
.popup-box{
  background:#111;
  color:#00ff66;
  padding:24px 40px;
  border-radius:20px;
  font-size:22px;
  font-weight:bold;

  border:2px solid #00ff66;
  box-shadow:
    0 0 15px #00ff66,
    0 0 30px rgba(0,255,102,0.6),
    0 0 45px rgba(0,255,102,0.4);
}
</style>
</head>

<body>

<div class="header">
  <div>DICE ROLL</div>
  <div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<img id="dice" class="dice" src="images/Picsart_26-03-29_22-28-59-286.png">
  
<div class="odd-even">
  <button class="oe-btn" id="oddBtn">ODD<br><small>1 · 3 · 5</small></button>
  <button class="oe-btn" id="evenBtn">EVEN<br><small>2 · 4 · 6</small></button>
</div>

<input type="number" id="bet" value="100">
<button id="roll">ROLL DICE</button>

<div class="my-history">
  <h3>MY BETS HISTORY</h3>
  <div id="betHistory"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDocs, collection, query, where, doc, updateDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

const userEmail = localStorage.getItem("userEmail");
let wallet = 0;
let uid = "";

/* LOAD WALLET */
async function loadWallet(){
  const q = query(collection(db,"users"), where("email","==",userEmail));
  const snap = await getDocs(q);
  snap.forEach(d=>{
    uid = d.id;
    wallet = Number(d.data().balance || 0);
  });
  updateWallet();
}

/* SAVE WALLET */
async function saveWallet(){
  if(!uid) return;
  await updateDoc(doc(db,"users",uid), { balance: wallet });
}

/* 🔥 HOUSE EDGE (FINAL FIXED) */
async function getChance(){
  const ref = doc(db,"settings","houseEdge");
  const snap = await getDoc(ref);

  let chance = 50;
  if(snap.exists()){
    chance = Number(snap.data().dice ?? 50);
  }

  console.log("CHANCE:", chance); // debug
  return chance;
}

/* GAME */
const dice = document.getElementById("dice");
const rollBtn = document.getElementById("roll");
const betInp = document.getElementById("bet");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const betHistory = document.getElementById("betHistory");

let selectedOE="";

/* SELECT */
oddBtn.onclick=()=>{
  selectedOE="odd";
  oddBtn.classList.add("active");
  evenBtn.classList.remove("active");
};
evenBtn.onclick=()=>{
  selectedOE="even";
  evenBtn.classList.add("active");
  oddBtn.classList.remove("active");
};

/* 🎲 ROLL */
rollBtn.onclick = async ()=>{

  const bet = Number(betInp.value);

  if(!selectedOE) return alert("Select ODD or EVEN");
  if(bet<=0 || bet>wallet) return alert("Low balance");

  wallet -= bet;

}

  setTimeout(async ()=>{

    dice.classList.remove("roll");

    let chance = await getChance();

    let willWin = false;

/* 🚨 SUPER RULE (FINAL) */
if(bet >= 350){
  willWin = false;   // ❌ ALWAYS LOSS
}
else if(chance <= 0){
  willWin = false;
}
else if(chance >= 100){
  willWin = true;
}
else{
  let rand = Math.random()*100;
  willWin = rand < chance;
}

  }

  }else{

  }
}

/* 🔥 IMAGE MAP (IMPORTANT) */
const diceImages = {
  1:"images/Picsart_26-03-29_22-28-59-286.png",
  2:"images/Picsart_26-03-29_22-29-15-611.png",
  3:"images/Picsart_26-03-29_22-29-36-400.png",
  4:"images/Picsart_26-03-29_22-29-45-215.png",
  5:"images/Picsart_26-03-29_22-29-49-514.png",
  6:"images/Picsart_26-03-29_22-29-53-763.png"
};

/* 🎲 RESULT SHOW */
dice.src = diceImages[num];

let winAmt=0;

if(win){
  winAmt = bet*2;
  wallet += winAmt;
  popupText.innerText=`🎉 YOU WIN ₹${winAmt}`;
  await saveWallet();
}else{
  popupText.innerText="❌ YOU LOST";
}

    updateWallet();
    addHistory(num,bet,selectedOE,win,winAmt);

    popup.style.display="flex";
    setTimeout(()=>popup.style.display="none",1500);

  },600);
};

/* WALLET UI */
function updateWallet(){
  document.getElementById("wallet").innerText=wallet;
}

/* HISTORY */
function addHistory(num,bet,oe,win,amt){
  const div=document.createElement("div");
  div.className="bet-row";
  div.innerHTML=`
    <span>🎲 ${num} (${oe.toUpperCase()})</span>
    <span class="${win?'win':'lose'}">
      ${win?`+₹${amt}`:`-₹${bet}`}
    </span>`;
  betHistory.prepend(div);
}

loadWallet();
</script>

</body>
</html>
