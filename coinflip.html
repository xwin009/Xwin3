<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coin Flip</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
  
<script src="game-control.js"></script>
  
<style>
body{margin:0;font-family:Arial;background:#081c2f;color:#fff}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px;background:#041425}
.balance{font-size:18px;color:#00e676;font-weight:bold}
.title{font-size:20px}

.history{
  display:flex;gap:8px;padding:10px;
  overflow-x:auto;background:#061a2f
}
.history span{
  padding:6px 10px;
  border-radius:20px;
  font-size:14px;
  background:#0e2a44
}

.game{
  height:45vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.coin{
  width:140px;height:140px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  font-weight:bold;
  color:#000;
  transition:transform 1s;
}
  .coin img{
  width:100%;
  height:100%;
  object-fit:cover;   /* 🔥 contain → cover */
  transform:scale(1.15); /* 🔥 thoda zoom */
  border-radius:50%;
  }

.flip{animation:spin 1s linear}
@keyframes spin{from{transform:rotateY(0deg)}to{transform:rotateY(720deg)}}

.controls{padding:15px;background:#041425}
.betrow{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.betrow button{width:40px;height:40px;border:none;border-radius:10px;background:#123a5c;color:#fff;font-size:18px}
.betrow input{flex:1;padding:10px;border:none;border-radius:10px;font-size:18px;text-align:center}

.action{display:flex;gap:12px}
.action button{flex:1;padding:14px;border:none;border-radius:12px;font-size:18px;font-weight:bold;color:#fff}
.head{background:#2ecc71}
.tail{background:#3498db}

.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:99}
.popup{background:#0b2a45;padding:20px 26px;border-radius:14px;font-size:20px;font-weight:bold}
.win{color:#2ecc71}
.loss{color:#ff5252}

/* NEW */
.mybets{padding:12px;background:#041425}
.mybets h3{margin:0 0 8px;font-size:16px}
.mybets div{font-size:14px;padding:6px;border-bottom:1px solid #123}
</style>
</head>

<body>

<div class="header">
  <div class="title">Coin Flip</div>
  <div class="balance">₹ <span id="wallet">1000</span></div>
</div>

<div class="history" id="history"></div>

<div class="game">
  <div class="coin" id="coin">
  <img id="coinImg" src="images/28560-removebg-preview.png">
  </div>
</div>

<div class="controls">
  <div class="betrow">
    <button onclick="chg(-1)">−</button>
    <input id="amt" value="10">
    <button onclick="chg(1)">+</button>
  </div>
  <div class="action">
    <button class="head" onclick="play('HEAD')">BET HEAD</button>
    <button class="tail" onclick="play('TAIL')">BET TAIL</button>
  </div>
</div>

<!-- 🔥 MY BETS HISTORY -->
<div class="mybets">
  <h3>My Bets</h3>
  <div id="mybets"></div>
</div>

<div class="popup-bg" id="popupBg">
  <div class="popup" id="popup"></div>
</div>

<!-- FIREBASE WALLET CONNECT (ADDITION ONLY) -->
  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

/* 🔥 STATE */
let wallet = +localStorage.getItem("coin_wallet") || 1000;
let coinHistory = JSON.parse(localStorage.getItem("coin_history")||"[]");
let bets = JSON.parse(localStorage.getItem("coin_bets")||"[]");

let COIN_EDGE = 50; // %

const walletEl = document.getElementById("wallet");
const coin = document.getElementById("coin");
const histEl = document.getElementById("history");
const betsEl = document.getElementById("mybets");
const popupBg = document.getElementById("popupBg");
const popup = document.getElementById("popup");

const email = localStorage.getItem("userEmail");
let uid = "";
let lastWallet = wallet;

/* 🔥 LIVE EDGE CONTROL */
function liveCoinEdge(){
  onSnapshot(doc(db,"settings","houseEdge"), (snap)=>{
    if(snap.exists()){
      COIN_EDGE = snap.data().coinFlip ?? 50;
      console.log("🔥 LIVE COIN EDGE:", COIN_EDGE);
    }
  });
}

/* 🔥 LOAD WALLET */
async function loadWallet(){
  if(!email) return;

  const q = query(collection(db,"users"), where("email","==",email));
  const snap = await getDocs(q);

  snap.forEach(d=>{
    uid = d.id;
    wallet = d.data().balance ?? wallet;
    walletEl.innerText = wallet;
    localStorage.setItem("coin_wallet", wallet);
  });
}

/* 🔥 RESULT CONTROL */
function decideCoinResult(choice){

  let chance = COIN_EDGE / 100;

  if(chance === 1){
    return choice; // always win
  }

  if(chance === 0){
    return choice==="HEAD"?"TAIL":"HEAD"; // always lose
  }

  return Math.random() < chance
    ? choice
    : (choice==="HEAD"?"TAIL":"HEAD");
}

/* 🔥 POPUP */
function showPopup(msg,type){
  popup.className="popup "+type;
  popup.innerText=msg;
  popupBg.style.display="flex";
  setTimeout(()=>popupBg.style.display="none",1500);
}

/* 🔥 PLAY */
window.play = async function(choice){

  let amt = +document.getElementById("amt").value;

  if(wallet < amt) return showPopup("Low Balance","loss");

  wallet -= amt;
  walletEl.innerText = wallet;

  coin.classList.add("flip");

  setTimeout(()=>{

    coin.classList.remove("flip");

    let result = decideCoinResult(choice);

    const coinImg = document.getElementById("coinImg");

if(result === "HEAD"){
  coinImg.src = "images/28558-removebg-preview.png";
}else{
  coinImg.src = "images/28560-removebg-preview.png";
}

    // HISTORY
    coinHistory.unshift(result);
    coinHistory = coinHistory.slice(0,10);
    renderHistory();
    localStorage.setItem("coin_history", JSON.stringify(coinHistory));

    // WIN / LOSS
    if(result === choice){
      wallet += amt * 2;
      showPopup("You Win ₹"+amt*2,"win");
    }else{
      showPopup("You Lose","loss");
    }

    // BET HISTORY
    bets.unshift({
      time: new Date().toLocaleTimeString(),
      choice,
      result,
      amt,
      status: result===choice?"WIN":"LOSS"
    });

    bets = bets.slice(0,20);
    localStorage.setItem("coin_bets", JSON.stringify(bets));
    renderBets();

    walletEl.innerText = wallet;
    localStorage.setItem("coin_wallet", wallet);

  },1000);
};

/* 🔥 RENDER */
function renderHistory(){
  histEl.innerHTML="";
  coinHistory.forEach(h=>{
    let s=document.createElement("span");
    s.innerText = h==="HEAD"?"🙂 HEAD":"🪙 TAIL";
    histEl.appendChild(s);
  });
}

function renderBets(){
  betsEl.innerHTML="";
  bets.forEach(b=>{
    let d=document.createElement("div");
    d.innerText=`${b.time} | ${b.choice} | ₹${b.amt} | ${b.status}`;
    betsEl.appendChild(d);
  });
}

/* 🔥 INIT */
walletEl.innerText = wallet;
renderHistory();
renderBets();

await loadWallet();
liveCoinEdge(); // 🔥 REAL-TIME START

/* 🔥 AUTO FIREBASE SYNC */
setInterval(async ()=>{
  if(!uid) return;

  if(wallet !== lastWallet){
    lastWallet = wallet;

    await updateDoc(doc(db,"users",uid),{
      balance: wallet
    });
  }
},800);

  </script>
  
</body>
</html>
