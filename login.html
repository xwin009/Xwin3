<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* 🌤 SKY BLUE BACKGROUND */
body{
  margin:0;
  font-family:Arial, sans-serif;

  background:url("images/file_000000008f787208b840aa1446e72c62.png") no-repeat center;
  background-size:cover;
  background-attachment:fixed;

  color:#fff;
}
.container{
  max-width:380px;
  margin:80px auto;
  padding:20px;
  text-align:center;
}

/* LOGO */
.logo-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:12px;
}
.logo{
  width:160px;
  max-width:80%;
}

input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.2);
  font-size:15px;
  outline:none;

  background:rgba(0,0,0,0.5);
  color:#fff;

  box-shadow:
    0 0 10px rgba(0,195,255,0.3);
}
button{
  width:100%;
  padding:14px;
  margin-top:16px;
  border:none;
  border-radius:12px;
  background:#3498db;
  color:#fff;
  font-size:16px;
  font-weight:bold;

  box-shadow:
    0 0 10px #3498db,
    0 0 20px rgba(52,152,219,0.5);
}
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center
}
.popup div{
  background:#1e1e1e;
  padding:25px;
  border-radius:14px;
  font-size:18px
}
a{
  color:#2ecc71;
  text-decoration:none
}
</style>
</head>

<body>

<div class="container">

  <!-- ✅ LOGO -->
  <div class="logo-wrap">
    <img src="images/logo.png" class="logo" alt="DraxBet Logo">
  </div>

  <p>Login to your account</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">LOGIN</button>

  <p style="margin-top:12px">
    New user? <a href="register.html">Register</a>
  </p>
</div>

<div class="popup" id="popup">
  <div id="popupText"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");

function showPopup(msg){
  popupText.innerText = msg;
  popup.style.display = "flex";
  setTimeout(()=>popup.style.display="none",1200);
}

window.login = () => {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value;

  if(!email || !pass){
    showPopup("Fill all fields");
    return;
  }

  signInWithEmailAndPassword(auth, email, pass)
  .then((result)=>{
    const user = result.user;

    localStorage.setItem("userEmail", user.email);
    localStorage.setItem(
      "userName",
      user.displayName || user.email.split("@")[0]
    );

    const now = new Date().toLocaleString();
    localStorage.setItem("lastLogin", now);

    showPopup("Login Successful ✅");
    setTimeout(()=>location.href="index.html",1200);
  })
  .catch(()=>{
    showPopup("Wrong email or password ❌");
  });
};
</script>

</body>
</html>
