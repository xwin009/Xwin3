<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Withdraw – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f0f0f;color:#fff}
.header{padding:16px;text-align:center;font-size:20px;font-weight:bold}
.card{background:#1c1c1c;margin:15px;border-radius:16px;padding:20px}
.balance{text-align:center;margin-bottom:15px}
.balance span{font-size:22px;font-weight:bold;color:#4caf50}
.tabs{display:flex;background:#111;border-radius:12px;overflow:hidden;margin-bottom:15px}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;color:#aaa}
.tab.active{background:#4caf50;color:#fff;font-weight:bold}
.form{display:none}
.form.active{display:block}
label{font-size:13px;opacity:.8}
input{width:100%;padding:12px;margin:8px 0 14px;border-radius:10px;border:none;font-size:15px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;background:#4caf50;color:#fff}
.rules{margin-top:15px;font-size:13px;color:#ccc}
.rules div{margin-bottom:8px}
.popup{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999}
.popup-box{background:#1c1c1c;padding:25px;border-radius:14px;text-align:center;width:80%}
.popup-box h3{margin:0 0 10px}
.popup-box.success h3{color:#4caf50}
.popup-box.error h3{color:#ff5252}
.popup-box button{margin-top:15px;width:100%;padding:12px;border:none;border-radius:10px;background:#4caf50;color:#fff}
</style>
</head>

<body>

<div class="header">🏦 Withdraw</div>

<div class="card">

  <div class="balance">
    Available Balance<br>
    ₹ <span id="balance">0.00</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="openTab('upi',this)">UPI</div>
    <div class="tab" onclick="openTab('bank',this)">Bank</div>
  </div>

  <!-- UPI -->
  <div class="form active" id="upi">
    <label>Withdraw Amount (₹)</label>
    <input type="number" id="upiAmount" placeholder="Minimum ₹100">

    <label>UPI ID</label>
    <input type="text" id="upiId" placeholder="example@upi">

    <button class="btn" onclick="submitWithdraw()">Submit Withdraw</button>

    <div class="rules">
      <div>🔴 Withdraw time: <b>00:05 - 23:55</b></div>
      <div>🔴 Inday Remaining Withdrawal Times: <b>3</b></div>
      <div>🔴 Withdrawal amount range: <b>₹100 - ₹50,000</b></div>
      <div>🔴 Please confirm your beneficiary details carefully</div>
      <div>🔴 Wrong details may cause permanent loss</div>
      <div>🟡 Bet Required: ₹<b id="wagerText">0</b></div>
    </div>
  </div>

  <!-- BANK -->
  <div class="form" id="bank">
    <label>Withdraw Amount (₹)</label>
    <input type="number" id="bankAmount" placeholder="Minimum ₹100">

    <label>Account Holder Name</label>
    <input type="text" id="bankHolder">

    <label>Bank Name</label>
    <input type="text" id="bankName">

    <label>Account Number</label>
    <input type="number" id="bankAccount">

    <label>IFSC Code</label>
    <input type="text" id="bankIfsc">

    <button class="btn" onclick="submitWithdraw()">Submit Withdraw</button>
  </div>

</div>

<!-- 🔥 POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupBox">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <!-- ✅ ONLY CHANGE HERE -->
    <button id="popupOk">OK</button>
  </div>
</div>

<!-- 🔥 FIRESTORE LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const popup = document.getElementById("popup");
const popupBox = document.getElementById("popupBox");
const popupTitle = document.getElementById("popupTitle");
const popupMsg = document.getElementById("popupMsg");

/* 🔥 POPUP FIX */
function showPopup(type,title,msg){
  popupBox.className="popup-box "+type;
  popupTitle.innerText=title;
  popupMsg.innerText=msg;
  popup.style.display="flex";
}
function closePopup(){
  popup.style.display="none";
}
document.getElementById("popupOk").addEventListener("click", closePopup);

/* ===== LOAD BALANCE (FIRESTORE ONLY) ===== */
const userEmail = localStorage.getItem("userEmail");
let userDocId = "";
let balance = 0;

async function loadBalance(){
  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );
  snap.forEach(d=>{
    userDocId = d.id;
    balance = d.data().balance || 0;
  });
  document.getElementById("balance").innerText = balance.toFixed(2);
}
loadBalance();
  
async function loadWager(){

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  snap.forEach(d=>{
    let data = d.data();

    let required = data.wagerRequired || 0;
    let done = data.wagerDone || 0;

    let remaining = required - done;

    if(remaining < 0) remaining = 0;

    document.getElementById("wagerText").innerText = remaining;
  });

}

loadWager();
/* ===== DAILY LIMIT RESET ===== */
const today = new Date().toDateString();
if(localStorage.getItem("withdrawDate") !== today){
  localStorage.setItem("withdrawDate", today);
  localStorage.setItem("withdrawCount", "0");
}
let withdrawCount = Number(localStorage.getItem("withdrawCount")) || 0;

/* ===== UI ===== */
window.openTab = function(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
};

/* ===== SUBMIT WITHDRAW ===== */
window.submitWithdraw = async function(){
  const snap = await getDocs(
  query(collection(db,"users"), where("email","==",userEmail))
);

let wager = 0;

snap.forEach(d=>{
  let data = d.data();
  let required = data.wagerRequired || 0;
  let done = data.wagerDone || 0;

  wager = required - done;
});

if(wager > 0){
  return showPopup("error","Bet Required","Complete betting ₹"+wager+" first");
}
  const isUpi = document.getElementById("upi").classList.contains("active");
  const amt = Number(isUpi ? upiAmount.value : bankAmount.value);

  if(amt < 100) return showPopup("error","Minimum Withdraw","Minimum ₹100");
  if(amt > balance) return showPopup("error","Insufficient Balance","Not enough balance");
  if(withdrawCount >= 3) return showPopup("error","Limit Reached","Daily 3 withdraw limit exceeded");

  await updateDoc(doc(db,"users",userDocId),{
    balance: balance - amt
  });

  await addDoc(collection(db,"withdraws"),{
  email: userEmail,
  amount: amt,
  method: isUpi ? "UPI" : "BANK",
  upiId: isUpi ? upiId.value.trim() : "",
  bankDetails: !isUpi ? {
    holder: bankHolder.value,
    bank: bankName.value,
    account: bankAccount.value,
    ifsc: bankIfsc.value
  } : null,
  status: "PENDING",
  time: new Date().toLocaleString(),   // ✅ comma add
  timeStamp: Date.now()               // ✅ now ok
});

  withdrawCount++;
  localStorage.setItem("withdrawCount",withdrawCount);

  showPopup("success","Withdraw Submitted","Amount deducted successfully");
  loadBalance();
};
</script>

</body>
</html>
