<!DOCTYPE html>
<html>
<head>
<title>Admin Auto Round</title>
</head>
<body>

<h2>Auto Round Running...</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

// 🎯 RESULT LOGIC (same tera)
async function getResult(){

  const snap = await getDoc(doc(db,"bets","global"));

  if(!snap.exists()) return "LOW";

  const data = snap.data();

  let low = Number(data.LOW)||0;
  let high = Number(data.HIGH)||0;
  let mid = Number(data.MID)||0;

  if(mid > 20){
    if(low === high){
      return Math.random()>0.5?"LOW":"HIGH";
    }
    return low>high?"HIGH":"LOW";
  }

  if(low > high) return "HIGH";
  if(high > low) return "LOW";

  if(low === high){
    let total = low+high+mid;
    let payoutMid = mid*5;
    let profit = total - payoutMid;

    if(mid>0 && profit>0) return "MID";

    return Math.random()>0.5?"LOW":"HIGH";
  }

  return "LOW";
}

// 🎲 DICE
function getDice(r){
  if(r==="LOW") return {d1:1,d2:2};
  if(r==="HIGH") return {d1:6,d2:5};
  return {d1:3,d2:4};
}

// 🔥 TIME SYNC
function getNextTime(){
  let now = Date.now();
  return Math.ceil(now/20000)*20000;
}

// 🔥 MAIN LOOP
async function start(){

  while(true){

  let startTime = getNextTime();

  if(lastRoundId === startTime){
    await new Promise(r=>setTimeout(r,100));
    continue;
  }

  lastRoundId = startTime;

  let wait = startTime - Date.now();
  if(wait>0){
    await new Promise(r=>setTimeout(r,wait));
  }

  const result = await getResult();
  const dice = getDice(result);

  await setDoc(doc(db,"gameRounds","current"),{
    roundId:startTime,
    startTime:startTime,
    result:result,
    d1:dice.d1,
    d2:dice.d2
  });

  await new Promise(r=>setTimeout(r,300));

  await setDoc(doc(db,"history","global"),{
    lastResult:result,
    time:Date.now()
  });
await addDoc(collection(db,"history","all"),{
  result: result,
  time: Date.now()
});
  await setDoc(doc(db,"bets","global"),{
    LOW:0,HIGH:0,MID:0
  });

  console.log("FINAL:",result);
  }
}

start();

</script>

</body>
</html>
