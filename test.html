<!DOCTYPE html>
<html>
<head>
<title>Admin Auto Round</title>
</head>
<body>

<h2>Auto Round Running...</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

let running = false; // 🔥 duplicate loop rokne ke liye

// 🎲 SMART RESULT (HOUSE EDGE)
async function getResult(){

  let low=0, high=0, mid=0;

  try{
    const snap = await getDocs(collection(db,"bets"));

    snap.forEach(d=>{
      const b = d.data();
      low += b.LOW || 0;
      high += b.HIGH || 0;
      mid += b.MID || 0;
    });

  }catch(e){
    console.log("⚠ bets fetch error",e);
  }

  console.log("💰 BETS:",low,high,mid);

  // ✅ Equal bet → MID (SAFE, no loss)
  if(low === high){
    return "MID";
  }

  // ✅ MID heavy → avoid MID (loss control)
  if(mid > low && mid > high){
    return low > high ? "HIGH" : "LOW";
  }

  // ✅ Jispe jyada bet → usko harana
  if(low > high){
    return "HIGH";
  }else{
    return "LOW";
  }
}

// 🎲 DICE
function getDice(r){
  if(r==="LOW") return {d1:1,d2:2};
  if(r==="HIGH") return {d1:6,d2:5};
  return {d1:3,d2:4};
}

// 🔥 MAIN GAME LOOP
async function startGame(){

  if(running) return; // 🔥 double start fix
  running = true;

  while(true){

    const r = await getResult();
    const d = getDice(r);

    await setDoc(doc(db,"gameRounds","current"),{
      roundId: Date.now(),
      startTime: Date.now(),
      result: r,
      d1: d.d1,
      d2: d.d2
    });

    console.log("✅ NEW ROUND:", r);

    // ⏱ 20 sec wait
    await new Promise(res => setTimeout(res, 20000));
  }
}

// 🔥 START
startGame();

</script>

</body>
</html>
