<!DOCTYPE html>
<html>
<head>
<title>Admin Auto Round</title>
</head>
<body>

<h2>Auto Round Running...</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, doc, setDoc, getDoc 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

let running = false;

// 🎯 FINAL SMART RESULT LOGIC
async function getResult(){

  const snap = await getDoc(doc(db,"bets","global"));

  if(!snap.exists()){
    return "LOW"; // fallback
  }

  const data = snap.data();

  let low = Number(data.LOW) || 0;
  let high = Number(data.HIGH) || 0;
  let mid = Number(data.MID) || 0;

  console.log("LOW:",low,"HIGH:",high,"MID:",mid);

  // 💣 RULE 1: MID > 20 → MID NEVER WIN
  if(mid > 20){
    if(low === high){
      return Math.random() > 0.5 ? "LOW" : "HIGH";
    }
    return low > high ? "HIGH" : "LOW";
  }

  // 💣 RULE 2: JISPE JYADA → WO HAREGA
  if(low > high){
    return "HIGH";
  }
  if(high > low){
    return "LOW";
  }

  // 💣 RULE 3: LOW == HIGH
  if(low === high){

    // 🎯 MID PROFIT CHECK
    let total = low + high + mid;
    let payoutMid = mid * 5;

    let profitIfMid = total - payoutMid;

    console.log("ProfitIfMID:",profitIfMid);

    // ✅ agar profit hai → MID jeetne de
    if(mid > 0 && profitIfMid > 0){
      return "MID";
    }

    // ❌ warna random LOW/HIGH
    return Math.random() > 0.5 ? "LOW" : "HIGH";
  }

  return "LOW"; // fallback
}

// 🎲 DICE
function getDice(r){
  if(r==="LOW") return {d1:1,d2:2};
  if(r==="HIGH") return {d1:6,d2:5};
  return {d1:3,d2:4};
}

// 🔥 MAIN LOOP
async function startGame(){

  if(running) return;
  running = true;

  while(true){

    const r = await getResult();
    const d = getDice(r);

    // 🔥 ROUND CREATE
    await setDoc(doc(db,"gameRounds","current"),{
      roundId: Date.now(),
      startTime: Date.now(),
      result: r,
      d1: d.d1,
      d2: d.d2
    });

    console.log("🎯 FINAL RESULT:", r);

    // 🔥 RESET BETS
    await setDoc(doc(db,"bets","global"),{
      LOW:0,
      HIGH:0,
      MID:0
    });

    // ⏱ 20 sec wait
    await new Promise(res => setTimeout(res, 20000));
  }
}

// 🚀 START
startGame();

</script>

</body>
</html>
