<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("images/bg.jpg") no-repeat center;
  background-size:cover;
  height:100vh;
  overflow:hidden;
}

/* FULL SCREEN */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

/* TOP AREA */
.top{
  width:100%;
  text-align:center;
  color:#fff;
  margin-top:10px;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.timer{
  font-size:20px;
  color:#ffd700;
}

/* TABLE IMAGE */
.table{
  position:relative;
  width:100%;
  height:60vh;
  background:url("images/table.png") no-repeat center;
  background-size:contain;
}

/* CLICK ZONES */
.zone{
  position:absolute;
}

/* BELOW 7 */
.low{
  left:8%;
  top:20%;
  width:28%;
  height:55%;
}

/* ABOVE 7 */
.high{
  right:8%;
  top:20%;
  width:28%;
  height:55%;
}

/* EXACT 7 */
.mid{
  left:36%;
  top:48%;
  width:28%;
  height:25%;
}

/* ACTIVE EFFECT */
.active{
  box-shadow:0 0 20px #ffd700 inset;
  border-radius:10px;
}

/* DICE */
.dice{
  font-size:22px;
  color:#fff;
}

/* CHIPS */
.chips{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.chips div{
  background:#555;
  padding:12px;
  border-radius:50%;
  color:#fff;
}

.active-chip{
  background:#ffd700;
  color:#000;
}

/* BUTTON */
.btn{
  width:80%;
  padding:14px;
  background:#222;
  border-radius:20px;
  text-align:center;
  color:#fff;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
  <div class="title">7 UP DOWN</div>
  <div class="timer">Time: <span id="time">15</span></div>
</div>

<!-- TABLE -->
<div class="table">

  <div class="zone low" onclick="selectBet('LOW',this)"></div>
  <div class="zone high" onclick="selectBet('HIGH',this)"></div>
  <div class="zone mid" onclick="selectBet('MID',this)"></div>

</div>

<div class="dice" id="dice">🎲 🎲</div>

<div class="chips">
  <div onclick="setChip(10,this)">10</div>
  <div onclick="setChip(50,this)">50</div>
  <div onclick="setChip(100,this)">100</div>
  <div onclick="setChip(500,this)">500</div>
  <div onclick="setChip(1000,this)">1000</div>
</div>

<div class="btn" onclick="startGame()">REBET</div>

</div>

<script>

let chip=0;
let betType="";
let interval;

// CHIP
function setChip(v,e){
  chip=v;
  document.querySelectorAll(".chips div").forEach(el=>el.classList.remove("active-chip"));
  e.classList.add("active-chip");
}

// BET
function selectBet(type,el){
  betType=type;
  document.querySelectorAll(".zone").forEach(z=>z.classList.remove("active"));
  el.classList.add("active");
}

// TIMER + GAME
function startGame(){

  if(!chip) return alert("Select chip");
  if(!betType) return alert("Select bet");

  let t=15;

  interval=setInterval(()=>{
    document.getElementById("time").innerText=t;
    t--;

    if(t<0){
      clearInterval(interval);
      result();
    }

  },1000);
}

// RESULT
function result(){

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;
  let total=d1+d2;

  document.getElementById("dice").innerText="🎲 "+d1+" 🎲 "+d2;

  let type;

  if(total<7) type="LOW";
  else if(total>7) type="HIGH";
  else type="MID";

  if(type===betType){
    alert(type==="MID" ? "WIN 5x" : "WIN 2x");
  }else{
    alert("LOSS");
  }
}

</script>

</body>
</html>
