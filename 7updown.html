<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#3b0d4f,#1a0826);
  color:#fff;
  transition: opacity 0.2s ease;
}

/* TITLE */
.title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ffd700;
  margin-top:10px;
  margin-bottom:4px;
  letter-spacing:2px;
  text-shadow:0 0 10px #ffd700;
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  padding:0 15px;
}

.timer{
  font-size:20px;
  color:#ffd700;
}

.wallet{
  background:rgba(0,0,0,0.4);
  padding:6px 12px;
  border-radius:10px;
}

/* HISTORY */
.history{
  display:flex;
  gap:6px;
  overflow-x:auto;
  margin:6px 12px 4px 12px;   /* 🔥 niche gap kam */
  padding:8px;
  border:2px solid rgba(255,255,255,0.2);
  border-radius:20px;
}

.history div{
  min-width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

.B{background:red;}
.A{background:blue;}
.E{background:green;}

/* TABLE */
.table-wrap{
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;   /* 🔥 center kar diya */
  margin-bottom:20px;   /* 🔥 kam kar */
  margin-top:5px;
}

.table{
  width:90%;
  height:90%;
  border-radius:40px 40px 80px 80px;
  background:radial-gradient(circle,#166534,#0f3a23);
  border:4px solid gold;
  position:relative;
}
.result-box{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

#dome{
  width:140px;
}

/* 🎲 Dice inside dome */
#diceArea{
  position:absolute;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:10px;
  opacity:0;
  transition:0.2s;
}

.dice{
  font-size:28px;
  background:#fff;
  color:#000;
  padding:8px;
  border-radius:8px;
}

/* 🔥 REAL SHAKE */
@keyframes shake{
  0%{transform:translate(-50%,-50%) translateX(0);}
  25%{transform:translate(-50%,-50%) translateX(-8px);}
  50%{transform:translate(-50%,-50%) translateX(8px);}
  75%{transform:translate(-50%,-50%) translateX(-8px);}
  100%{transform:translate(-50%,-50%) translateX(0);}
}

.shake{
  animation:shake 0.6s;
}
/* BOX */

  /* 🔥 CARD BASE */
.card{
  position:absolute;
  width:24%;        /* 🔥 pehle 26% tha */
  height:58%;       /* 🔥 pehle 65% tha */
  display:flex;
  justify-content:center;
  align-items:center;
}

/* POSITIONS */
.low{ left:8%; top:20%; }
.mid{ left:38%; top:20%; }
.high{ right:8%; top:20%; }
/* INNER CARD */
.card-inner{
  width:100%;
  height:100%;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
  padding-bottom:15px;
  font-weight:bold;
  color:#fff;
  position:relative;
}
  .mid .card-inner{
  height:85%;      /* 🔥 height kam */
  margin-top:10%;  /* 🔥 upar gap */
  }

/* 🔴 RED */
.red{
  background:linear-gradient(180deg,#7f1d1d,#1a0000);
  border:2px solid #ff3b3b;
  box-shadow:
    0 0 20px #ff3b3b,
    inset 0 0 20px rgba(255,0,0,0.5);
}

/* 🟢 GREEN */
.green{
  background:linear-gradient(180deg,#064e3b,#022c22);
  border:2px solid #00ff99;
  box-shadow:
    0 0 20px #00ff99,
    inset 0 0 20px rgba(0,255,150,0.5);
}

/* 🔵 BLUE */
.blue{
  background:linear-gradient(180deg,#1e3a8a,#020617);
  border:2px solid #3b82f6;
  box-shadow:
    0 0 20px #3b82f6,
    inset 0 0 20px rgba(0,100,255,0.5);
}

/* TEXT */
.card-title{ font-size:14px; }
.card-type{ margin-top:4px; }
.card-amt{
  margin-top:5px;
  color:#ffd700;
  font-size:18px;
}

/* CLICK EFFECT */
.card-inner:active{
  transform:scale(0.95);
}

/* ACTIVE BET */
.card-inner.active{
  box-shadow:0 0 30px gold, inset 0 0 20px gold;
}

/* CHIPS */
.chips{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:12px;
}

.chip{
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle,#666,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.chip.active{
  background:gold;
  color:#000;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);

  visibility:hidden;   /* 🔥 important */
  opacity:0;
  transition:0.3s;
}

.popup.show{
  visibility:visible;
  opacity:1;
}

.popup-box{
  padding:20px 30px;
  border-radius:12px;
  font-weight:bold;
}

  #cover{
  font-size:60px;
  filter: drop-shadow(0 0 10px gold);
  position:relative;
  top:-15px;
  margin-bottom:10px;
  }
  
.win{ background:#065f46;color:#00ff99; }
.loss{ background:#7f1d1d;color:#ff4d4d; }
.lock{ background:#111;color:#ffd700; }
  
  /* 📜 HISTORY BUTTON */
#historyBtn{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:#fff;
  padding:10px 25px;
  border-radius:12px;
  box-shadow:0 0 15px #00ffcc;
  cursor:pointer;
}

/* POPUP */
.history-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:flex-end;

  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.history-popup.show{
  visibility:visible;
  opacity:1;
}

.history-box{
  width:100%;
  max-height:70%;
  background:#0b1220;
  border-radius:20px 20px 0 0;
  padding:15px;
  overflow:hidden;
}

/* HEADER */
.history-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

/* LIST */
.history-list{
  max-height:300px;
  overflow-y:auto;   /* 🔥 SCROLL ENABLE */
}

/* ITEM */
.history-item{
  background:#111;
  margin-bottom:8px;
  padding:12px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.win-item{
  border:1px solid #00ff99;
}

.loss-item{
  border:1px solid #ff4d4d;
}

  /* ❓ HELP BUTTON */
#helpBtn{
  width:45px;
  height:45px;
  border-radius:50%;
  background:radial-gradient(circle,#ffd700,#b8860b);
  color:#000;
  font-size:22px;
  font-weight:bold;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:10px auto;
  cursor:pointer;
  box-shadow:0 0 15px gold;
}

/* POPUP */
.help-popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;

  visibility:hidden;
  opacity:0;
  transition:0.3s;
}

.help-popup.show{
  visibility:visible;
  opacity:1;
}

.help-box img{
  width:90%;
  max-width:350px;
  border-radius:15px;
}

</style>
</head>

<body>

<div class="title">7 UP-DOWN</div>

<div class="top-bar">
  <div class="timer" id="timer">20</div>
  <div class="wallet">₹ <span id="wallet">10000</span></div>
</div>

<!-- ✅ ONLY ONE HISTORY -->
<div id="history" class="history"></div>
<div id="helpBtn">?</div>
<div class="table-wrap">
  <div class="table">
    
<div id="resultBox" class="result-box">
  <div id="cover">🎁</div>
  <div id="diceArea">
    <span id="d1">🎲</span>
    <span id="d2">🎲</span>
  </div>
</div>
    
<div class="card low" onclick="bet('LOW',this)">
  <div class="card-inner red">
    <div class="card-title">BELOW 7</div>
    <div class="card-type">(B)</div>
    <div class="card-amt" id="lowAmt">0</div>
  </div>
</div>

<div class="card mid" onclick="bet('MID',this)">
  <div class="card-inner green">
    <div class="card-title">EXACT 7</div>
    <div class="card-type">(E)</div>
    <div class="card-amt" id="midAmt">0</div>
  </div>
</div>

<div class="card high" onclick="bet('HIGH',this)">
  <div class="card-inner blue">
    <div class="card-title">ABOVE 7</div>
    <div class="card-type">(A)</div>
    <div class="card-amt" id="highAmt">0</div>
  </div>
</div>
<div id="historyBtn">📜 History</div>
  </div>
</div>

<div class="chips">
  <div class="chip" onclick="setChip(10,this)">10</div>
  <div class="chip" onclick="setChip(50,this)">50</div>
  <div class="chip" onclick="setChip(100,this)">100</div>
  <div class="chip" onclick="setChip(500,this)">500</div>
  <div class="chip" onclick="setChip(1000,this)">1000</div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, where, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 FIREBASE
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

// 🔥 USER
const userEmail = localStorage.getItem("userEmail");
let userDocId = "";

// 🔥 GAME VARS
let chip=0;
let bets={LOW:0,HIGH:0,MID:0};
let wallet=0;
let bettingOpen=true;
let resultRunning=false;
let houseEdge=50;
let time=20;

// 🔥 ROUND SYNC (NO REFRESH RESET)
let roundStart = localStorage.getItem("roundStart");

if(!roundStart){
  roundStart = Date.now();
  localStorage.setItem("roundStart", roundStart);
}

function getTime(){
  let elapsed = Date.now() - roundStart;
  let t = Math.floor((20000 - elapsed) / 1000);
  return t < 0 ? 0 : t;
}

// 🔥 LOAD WALLET
async function loadWallet(){
  const snap = await getDocs(query(collection(db,"users"), where("email","==",userEmail)));
  snap.forEach(d=>{
    userDocId = d.id;
    wallet = d.data().balance || 0;
  });
  document.getElementById("wallet").innerText = wallet;
}
await loadWallet();

// 🔥 LOAD EDGE
async function loadHouseEdge(){
  const snap = await getDoc(doc(db,"settings","houseEdge"));
  if(snap.exists()){
    houseEdge = snap.data().sevenUpDown ?? 50;
  }
}
await loadHouseEdge();

// 🎁 INIT VIEW
const cover=document.getElementById("cover");
const dice=document.getElementById("diceArea");

cover.style.display="block";
dice.style.display="none";
dice.style.opacity="0";

// 🔥 CHIP
window.setChip = (v,e)=>{
  chip=v;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  e.classList.add("active");
};

// 🔥 BET
window.bet = async (type,el)=>{
  if(!chip || !bettingOpen) return;

  if(wallet < chip){
    alert("Low Balance");
    return;
  }

  wallet -= chip;

  await updateDoc(doc(db,"users",userDocId),{ balance: wallet });

  document.getElementById("wallet").innerText=wallet;

  bets[type]+=chip;
  document.getElementById(type.toLowerCase()+"Amt").innerText=bets[type];

  el.querySelector(".card-inner").classList.add("active");
};

// 🎲 RESULT LOGIC
function controlledResult(){

  let userBet=null;

  if(bets.LOW>0) userBet="LOW";
  else if(bets.HIGH>0) userBet="HIGH";
  else if(bets.MID>0) userBet="MID";

  if(!userBet){
    return ["LOW","HIGH","MID"][Math.floor(Math.random()*3)];
  }

  let rand=Math.random()*100;

  if(rand < houseEdge){
    return userBet;
  }else{
    if(userBet=="LOW") return "HIGH";
    if(userBet=="HIGH") return "LOW";
    return "LOW";
  }
}

// 🔥 TIMER LOOP (SYNCED)
setInterval(()=>{

  time = getTime();

  document.getElementById("timer").innerText = time;

  if(time === 5){
    bettingOpen=false;
    showPopup("BET LOCK",null,true);
  }

  if(time === 0){
    if(!resultRunning){
      result();
    }
  }

},1000);

// 🎲 RESULT
async function result(){

  if(resultRunning) return;

  resultRunning = true;
  bettingOpen = false;

  let d1El=document.getElementById("d1");
  let d2El=document.getElementById("d2");

  let winType = controlledResult();

  let d1,d2;

  if(winType=="LOW"){ d1=1; d2=2; }
  else if(winType=="HIGH"){ d1=6; d2=5; }
  else{ d1=3; d2=4; }

  // 🎁 hide gift → show dice smooth
  cover.style.display="none";
  dice.style.display="flex";

  setTimeout(()=>{
    dice.style.opacity="1";
  },100);

  setTimeout(async ()=>{

    d1El.innerText="🎲 "+d1;
    d2El.innerText="🎲 "+d2;

    let win=false;
    let winAmount=0;

    if(bets[winType] > 0){

      win=true;
      winAmount = winType=="MID" ? bets[winType]*11 : bets[winType]*2;

      wallet += winAmount;

      await updateDoc(doc(db,"users",userDocId),{ balance: wallet });

      document.getElementById("wallet").innerText=wallet;

      showPopup("WIN ₹"+winAmount,true);

    }else{
      showPopup("LOSS",false);
    }

    // 🔥 SAVE HISTORY
    await addDoc(collection(db,"users",userDocId,"bets"),{
  type: winType,
  amount: win ? winAmount : bets[winType] || 0,  // ✅ comma yahan
  win: win,
  time: new Date().toLocaleTimeString()
});

    updateHistory(winType);

  },500);

  // 🔄 RESET
  setTimeout(()=>{

    dice.style.opacity="0";

    setTimeout(()=>{
      dice.style.display="none";
      cover.style.display="block";
    },200);

    resultRunning=false;
    bettingOpen=true;

    bets={LOW:0,HIGH:0,MID:0};

    document.getElementById("lowAmt").innerText=0;
    document.getElementById("highAmt").innerText=0;
    document.getElementById("midAmt").innerText=0;

    document.querySelectorAll(".card-inner").forEach(b=>b.classList.remove("active"));

    // 🔥 NEW ROUND SYNC
    roundStart = Date.now();
    localStorage.setItem("roundStart", roundStart);

  },2000);
}

// 📜 TOP HISTORY DOTS
function updateHistory(type){

  let h=document.getElementById("history");
  let div=document.createElement("div");

  if(type=="LOW"){div.className="B";div.innerText="B";}
  else if(type=="HIGH"){div.className="A";div.innerText="A";}
  else{div.className="E";div.innerText="E";}

  h.prepend(div);

  if(h.children.length>10){
    h.removeChild(h.lastChild);
  }

  localStorage.setItem("history", h.innerHTML);
}

// 💬 POPUP
function showPopup(msg,win,lock=false){
  
  const p=document.getElementById("popup");
  const box=document.getElementById("popupText");

  box.innerText=msg;

  if(lock){
    box.className="popup-box lock";
  }else{
    box.className="popup-box "+(win?"win":"loss");
  }

  p.classList.add("show");

  setTimeout(()=> p.classList.remove("show"),2000);
}

// ❓ HELP
const helpBtn = document.getElementById("helpBtn");
const helpPopup = document.getElementById("helpPopup");

helpBtn.onclick = ()=> helpPopup.classList.add("show");
helpPopup.onclick = ()=> helpPopup.classList.remove("show");

// 📜 HISTORY POPUP
const historyBtn = document.getElementById("historyBtn");
const historyPopup = document.getElementById("historyPopup");
const closeHistory = document.getElementById("closeHistory");
const historyList = document.getElementById("historyList");

historyBtn.onclick = ()=>{
  historyPopup.classList.add("show");
  loadBetHistory();
};

closeHistory.onclick = ()=>{
  historyPopup.classList.remove("show");
};

historyPopup.onclick = (e)=>{
  if(e.target === historyPopup){
    historyPopup.classList.remove("show");
  }
};

// 🔥 LOAD HISTORY
async function loadBetHistory(){

  historyList.innerHTML="Loading...";

  const snap = await getDocs(collection(db,"users",userDocId,"bets"));

  let data=[];
  snap.forEach(d=> data.push(d.data()));

  data.reverse();

  historyList.innerHTML="";

  if(data.length===0){
    historyList.innerHTML="No bets yet";
    return;
  }

  data.forEach(item=>{
    let div=document.createElement("div");
    div.className="history-item "+(item.win?"win-item":"loss-item");

    let typeName = "";

if(item.type === "LOW") typeName = "BELOW 7";
else if(item.type === "HIGH") typeName = "ABOVE 7";
else typeName = "EXACT 7";

let amountText = item.win 
  ? `+₹${item.amount} 🎉` 
  : `-₹${item.amount} ❌`;

div.innerHTML = `
  <span>${typeName}</span>
  <span>${amountText}</span>
  <span>${item.time}</span>
`;

    historyList.appendChild(div);
  });
}

</script>
  
    <div id="helpPopup" class="help-popup">
  <div class="help-box">
    <img src="images/Picsart_26-03-21_20-58-33-008.png">
  </div>
    </div>
  <div id="historyPopup" class="history-popup">
  <div class="history-box">

    <div class="history-header">
      <span>My Betting History</span>
      <span id="closeHistory">✖</span>
    </div>

    <div id="historyList" class="history-list"></div>

  </div>
  </div>
  
</body>
</html>
