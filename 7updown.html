<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#3b0d4f,#1a0826);
  color:#fff;
}

/* TITLE */
.title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ffd700;
  margin-top:12px;
  letter-spacing:2px;
  text-shadow:0 0 10px #ffd700;
}

/* 🔥 HISTORY STRIP */
.history{
  display:flex;
  gap:6px;
  overflow-x:auto;
  margin:10px;
  padding:6px;
}

.history div{
  min-width:28px;
  height:28px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:13px;
}

/* COLORS */
.B{ background:red; }
.E{ background:green; }
.A{ background:blue; }

/* TABLE */
.table-wrap{
  height:65vh;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding-top:40px;
}

.table{
  width:90%;
  height:90%;
  border-radius:40px 40px 80px 80px;
  background:radial-gradient(circle,#166534,#0f3a23);
  border:4px solid gold;
  position:relative;
}

/* BOX */
.box{
  position:absolute;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-weight:bold;
}

/* POSITIONS */
.low{ left:8%; top:15%; width:28%; height:60%; }
.high{ right:8%; top:15%; width:28%; height:60%; }
.mid{ left:36%; bottom:8%; width:28%; height:30%; }

/* 🔥 BOX COLORS HINT */
.low span{ color:red; }
.high span{ color:blue; }
.mid span{ color:#00ff99; }

/* ACTIVE */
.box.active{
  border:2px solid #ffd700;
  box-shadow:0 0 20px #ffd700 inset,0 0 20px #ffd700;
}

/* AMOUNT */
.amount{
  margin-top:6px;
  color:#ffd700;
}

/* CHIPS */
.chips{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:12px;
}

.chip{
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle,#666,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.chip.active{
  background:gold;
  color:#000;
  box-shadow:0 0 15px gold;
}

/* POPUP */
.popup{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  padding:20px;
  border-radius:12px;
  font-weight:bold;
}

.win{ background:#065f46;color:#00ff99; }
.loss{ background:#7f1d1d;color:#ff4d4d; }

</style>
</head>

<body>

<div class="title">7 UP-DOWN</div>

<!-- 🔥 HISTORY -->
<div class="history" id="history"></div>

<div class="table-wrap">
  <div class="table">

    <div class="box low" onclick="bet('LOW',this)">
      BELOW 7 <span>(B)</span>
      <div class="amount" id="lowAmt">0</div>
    </div>

    <div class="box high" onclick="bet('HIGH',this)">
      ABOVE 7 <span>(A)</span>
      <div class="amount" id="highAmt">0</div>
    </div>

    <div class="box mid" onclick="bet('MID',this)">
      EXACT 7 <span>(E)</span>
      <div class="amount" id="midAmt">0</div>
    </div>

  </div>
</div>

<div class="chips">
  <div class="chip" onclick="setChip(10,this)">10</div>
  <div class="chip" onclick="setChip(50,this)">50</div>
  <div class="chip" onclick="setChip(100,this)">100</div>
  <div class="chip" onclick="setChip(500,this)">500</div>
  <div class="chip" onclick="setChip(1000,this)">1000</div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<script>

let chip=0;
let bets={LOW:0,HIGH:0,MID:0};

// CHIP
function setChip(v,e){
  chip=v;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  e.classList.add("active");
}

// BET
function bet(type,el){
  if(!chip) return;

  bets[type]+=chip;
  document.getElementById(type.toLowerCase()+"Amt").innerText=bets[type];
  el.classList.add("active");
}

// GAME LOOP
setInterval(()=>{
  result();
  reset();
},5000);

// RESULT
function result(){

  let total=Math.floor(Math.random()*11)+2;

  let winType;
  let letter;

  if(total<7){ winType="LOW"; letter="B"; }
  else if(total>7){ winType="HIGH"; letter="A"; }
  else{ winType="MID"; letter="E"; }

  // 🔥 HISTORY ADD
  const h=document.createElement("div");
  h.innerText=letter;
  h.classList.add(letter);
  document.getElementById("history").appendChild(h);

  // AUTO SCROLL
  const hist=document.getElementById("history");
  hist.scrollLeft=hist.scrollWidth;

  if(bets[winType]>0){
    let winAmt = winType=="MID"?bets[winType]*5:bets[winType]*2;
    showPopup("WIN ₹"+winAmt,true);
  }else{
    showPopup("LOSS",false);
  }
}

// RESET
function reset(){
  bets={LOW:0,HIGH:0,MID:0};
  document.getElementById("lowAmt").innerText=0;
  document.getElementById("highAmt").innerText=0;
  document.getElementById("midAmt").innerText=0;

  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
}

// POPUP
function showPopup(msg,win){
  const p=document.getElementById("popup");
  const box=document.getElementById("popupText");

  box.innerText=msg;
  box.className="popup-box "+(win?"win":"loss");

  p.classList.add("show");

  setTimeout(()=>p.classList.remove("show"),2000);
}

</script>

</body>
</html>
