<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#3b0d4f,#1a0826);
  color:#fff;
}

/* TIMER */
.timer{
  text-align:center;
  font-size:22px;
  color:#ffd700;
  margin-top:10px;
}

/* TABLE */
.table-wrap{
  height:65vh;
  display:flex;
  justify-content:center;
  align-items:flex-end;  /* 🔥 center se bottom */
  padding-top:40px;      /* 🔥 upar gap */
}

.table{
  width:90%;
  height:90%;
  border-radius:40px 40px 80px 80px;
  background:radial-gradient(circle,#166534,#0f3a23);
  border:4px solid gold;
  position:relative;
  box-shadow:0 0 30px #000 inset;
}

.table::before{
  content:"";
  position:absolute;
  top:5%;
  left:5%;
  width:90%;
  height:90%;
  border-radius:30px 30px 70px 70px;
  border:2px solid rgba(255,255,255,0.2);
}

/* BET BOX */
.box{
  position:absolute;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:18px;
  flex-direction:column;
  transition:0.2s;
}

/* POSITIONS */
.low{ left:8%; top:15%; width:28%; height:60%; }
.high{ right:8%; top:15%; width:28%; height:60%; }
.mid{ left:36%; bottom:8%; width:28%; height:30%; }

/* HOVER GLOW */
.box.active{
  border:2px solid #ffd700;
  box-shadow:0 0 20px #ffd700 inset, 0 0 20px #ffd700;
}

/* BET AMOUNT */
.amount{
  margin-top:6px;
  font-size:14px;
  color:#ffd700;
}

/* DICE */
.dice{
  text-align:center;
  font-size:26px;
  margin-top:10px;
}

/* 🎯 CHIPS DESIGN */
.chips{
  position:fixed;
  bottom:20px;
  left:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:12px;
}
.chip{
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle,#666,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 10px #000;
  transition:0.2s;
}

.chip.active{
  background:gold;
  color:#000;
  box-shadow:0 0 15px gold;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  padding:20px 30px;
  border-radius:15px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
  animation:pop 0.3s;
}

.win{
  background:#065f46;
  color:#00ff99;
  box-shadow:0 0 20px #00ff99;
}

.loss{
  background:#7f1d1d;
  color:#ff4d4d;
  box-shadow:0 0 20px #ff4d4d;
}
.title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ffd700;
  margin-top:12px;
  letter-spacing:2px;
  text-shadow:0 0 10px #ffd700;
}
  
@keyframes pop{
  from{transform:scale(0.5);}
  to{transform:scale(1);}
}
</style>
</head>

<body>

<div class="title">7 UP-DOWN</div>

<div class="table-wrap">
  <div class="table">

    <div class="box low" onclick="bet('LOW',this)">
      BELOW 7
      <div class="amount" id="lowAmt">0</div>
    </div>

    <div class="box high" onclick="bet('HIGH',this)">
      ABOVE 7
      <div class="amount" id="highAmt">0</div>
    </div>

    <div class="box mid" onclick="bet('MID',this)">
      EXACT 7
      <div class="amount" id="midAmt">0</div>
    </div>

  </div>
</div>


<div class="chips">
  <div class="chip" onclick="setChip(10,this)">10</div>
  <div class="chip" onclick="setChip(50,this)">50</div>
  <div class="chip" onclick="setChip(100,this)">100</div>
  <div class="chip" onclick="setChip(500,this)">500</div>
  <div class="chip" onclick="setChip(1000,this)">1000</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<script>

let chip=0;
let bets={LOW:0,HIGH:0,MID:0};

// CHIP SELECT
function setChip(v,e){
  chip=v;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  e.classList.add("active");
}

// PLACE BET (MULTIPLE)
function bet(type,el){
  if(!chip) return;

  bets[type]+=chip;

  document.getElementById(type.toLowerCase()+"Amt").innerText=bets[type];

  el.classList.add("active");
}

// GAME LOOP
let t=15;
setInterval(()=>{
  document.getElementById("time").innerText=t;
  t--;

  if(t<0){
    result();
    t=15;
    reset();
  }

},1000);

// RESULT
function result(){

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;

  document.getElementById("dice").innerText="🎲 "+d1+" 🎲 "+d2;

  let total=d1+d2;

  let winType;
  if(total<7) winType="LOW";
  else if(total>7) winType="HIGH";
  else winType="MID";

  let winAmount=0;

  if(bets[winType]>0){
    winAmount = winType=="MID" ? bets[winType]*5 : bets[winType]*2;
    showPopup("WIN ₹"+winAmount,true);
  }else{
    showPopup("LOSS",false);
  }
}

// RESET
function reset(){
  bets={LOW:0,HIGH:0,MID:0};
  document.getElementById("lowAmt").innerText=0;
  document.getElementById("highAmt").innerText=0;
  document.getElementById("midAmt").innerText=0;

  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
}

// POPUP
function showPopup(msg,win){

  const p=document.getElementById("popup");
  const box=document.getElementById("popupText");

  box.innerText=msg;
  box.className="popup-box "+(win?"win":"loss");

  p.classList.add("show");

  setTimeout(()=>{
    p.classList.remove("show");
  },2000);
}

</script>

</body>
</html>
