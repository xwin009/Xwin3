<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Up Down</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#2b0f3a,#14081d);
  height:100vh;
  color:#fff;
}

/* APP */
.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* TOP */
.top{
  text-align:center;
  padding:10px;
}

.timer{
  font-size:22px;
  color:#ffd700;
}

/* TABLE */
.table-wrapper{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.table{
  width:90%;
  height:60vh;
  background:linear-gradient(180deg,#14532d,#0f3a23);
  border-radius:30px;
  border:3px solid #caa85c;
  position:relative;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* BOXES */
.box{
  position:absolute;
  border-radius:20px;
  border:2px solid rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  font-weight:bold;
}

/* BELOW */
.low{
  left:5%;
  top:15%;
  width:30%;
  height:60%;
}

/* ABOVE */
.high{
  right:5%;
  top:15%;
  width:30%;
  height:60%;
}

/* EXACT */
.mid{
  left:35%;
  bottom:10%;
  width:30%;
  height:30%;
}

/* ACTIVE */
.active{
  box-shadow:0 0 20px #ffd700 inset;
  border:2px solid #ffd700;
}

/* DICE */
.dice{
  text-align:center;
  font-size:22px;
  margin:5px;
}

/* CHIPS */
.chips{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.chips div{
  background:#444;
  padding:12px;
  border-radius:50%;
}

.active-chip{
  background:#ffd700;
  color:#000;
}

/* BUTTON */
.btn{
  margin:15px;
  padding:14px;
  background:#222;
  border-radius:20px;
  text-align:center;
}
</style>
</head>

<body>

<div class="app">

<div class="top">
  <div class="timer">Time: <span id="time">15</span></div>
</div>

<div class="table-wrapper">

  <div class="table">

    <div class="box low" onclick="selectBet('LOW',this)">BELOW 7</div>
    <div class="box high" onclick="selectBet('HIGH',this)">ABOVE 7</div>
    <div class="box mid" onclick="selectBet('MID',this)">EXACT 7</div>

  </div>

</div>

<div class="dice" id="dice">🎲 🎲</div>

<div class="chips">
  <div onclick="setChip(10,this)">10</div>
  <div onclick="setChip(50,this)">50</div>
  <div onclick="setChip(100,this)">100</div>
  <div onclick="setChip(500,this)">500</div>
  <div onclick="setChip(1000,this)">1000</div>
</div>

<div class="btn" onclick="startGame()">REBET</div>

</div>

<script>

let chip=0;
let betType="";
let interval;

// CHIP
function setChip(v,e){
  chip=v;
  document.querySelectorAll(".chips div").forEach(el=>el.classList.remove("active-chip"));
  e.classList.add("active-chip");
}

// BET
function selectBet(type,el){
  betType=type;
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// GAME
function startGame(){

  if(!chip) return alert("Select chip");
  if(!betType) return alert("Select bet");

  let t=15;

  interval=setInterval(()=>{
    document.getElementById("time").innerText=t;
    t--;

    if(t<0){
      clearInterval(interval);
      result();
    }

  },1000);
}

// RESULT
function result(){

  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;

  document.getElementById("dice").innerText="🎲 "+d1+" 🎲 "+d2;

  let total=d1+d2;

  let type;
  if(total<7) type="LOW";
  else if(total>7) type="HIGH";
  else type="MID";

  if(type===betType){
    alert(type==="MID" ? "WIN 5x" : "WIN 2x");
  }else{
    alert("LOSS");
  }
}

</script>

</body>
</html>
