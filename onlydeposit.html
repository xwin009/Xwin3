<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.row{
  margin:5px 0;
}

.btns{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.approve{
  flex:1;
  padding:10px;
  background:#4caf50;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
}

.reject{
  flex:1;
  padding:10px;
  background:#f44336;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🛠 Deposit Admin Panel</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);
const list = document.getElementById("list");

/* 🔥 LOAD DATA */
async function loadDeposits(){

  list.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"deposits"));

  list.innerHTML = "";

  snap.forEach(d=>{

    let data = d.data();

    if(data.status !== "PENDING") return;

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="row">💰 Amount: ₹${data.amount}</div>
      <div class="row">🔑 UTR: ${data.utr}</div>
      <div class="row">📧 Email: ${data.email}</div>
      <div class="row">⏰ Time: ${new Date(data.time).toLocaleString()}</div>
      <div class="row">📌 Status: ${data.status}</div>

      <div class="row">
  <button onclick="viewImage('${data.screenshot}')">📸 View Screenshot</button>
</div>

      <div class="btns">
        <button class="approve" onclick="approve('${d.id}','${data.email}',${data.amount})">Approve</button>
        <button class="reject" onclick="reject('${d.id}')">Reject</button>
      </div>
    `;

    list.appendChild(div);
  });
}

/* 🔥 APPROVE */
window.approve = async function(id,email,amount){

  try{

    const snap = await getDocs(
      query(collection(db,"users"), where("email","==",email))
    );

    if(snap.empty){
      alert("User not found ❌");
      return;
    }

    snap.forEach(async (u)=>{

      let bal = u.data().balance || 0;

      await updateDoc(doc(db,"users",u.id),{
        balance: bal + amount
      });

    });

    await updateDoc(doc(db,"deposits",id),{
      status:"APPROVED"
    });

    alert("Approved ✅");

    loadDeposits();

  }catch(e){
    alert("Error: "+e.message);
  }
}

/* 🔥 REJECT */
window.reject = async function(id){

  await updateDoc(doc(db,"deposits",id),{
    status:"REJECTED"
  });

  alert("Rejected ❌");

  loadDeposits();
}
  window.viewImage = function(url){
  document.getElementById("popupImg").src = url;
  document.getElementById("imgPopup").style.display = "flex";
}

window.closeImg = function(){
  document.getElementById("imgPopup").style.display = "none";
}

/* INIT */
loadDeposits();

</script>
<div id="imgPopup" style="position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.8);z-index:9999;">
  <div style="background:#000;padding:10px;border-radius:10px;">
    <img id="popupImg" style="width:250px;border-radius:10px;">
    <button onclick="closeImg()" style="margin-top:10px;width:100%;">Close</button>
  </div>
</div>
</body>
</html>
