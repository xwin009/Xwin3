<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Road</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
}

.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}

/* HEADER */
.header{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* ROAD */
.road-container{
  overflow:hidden;
  width:100%;
  height:200px;
  position:relative;
}

.road{
  display:flex;
  gap:12px;
  padding-left:120px; /* 🔥 center chicken */
  transition:0.4s;
}

/* STEP DESIGN */
.step{
  min-width:85px;
  height:110px;
  border-radius:14px;
  background:linear-gradient(145deg,#1e293b,#020617);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#00ffcc;
  font-size:16px;
  box-shadow:0 0 15px rgba(0,255,200,0.2);
  border:1px solid rgba(0,255,200,0.2);
}

/* ACTIVE STEP */
.active{
  background:linear-gradient(145deg,#00ffcc,#00cc99);
  color:#000;
  box-shadow:0 0 25px #00ffcc;
  transform:scale(1.1);
}

/* 🐔 CHICKEN */
.chicken{
  position:absolute;
  bottom:10px;
  left:120px;
  width:70px;
  transition:0.3s;
}

/* JUMP */
@keyframes jump{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}

.jump{
  animation:jump 0.4s;
}

/* MULTI */
#multi{
  text-align:center;
  font-size:22px;
  margin:10px;
  color:#ffd700;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.play{ background:#22c55e; }
.cash{ background:#f59e0b; }

</style>
</head>

<body>

<div class="container">

<div class="header">🐔 Chicken Road</div>

<div class="road-container">
  <div class="road" id="road"></div>
  <img src="images/28859-removebg-preview.png" id="chicken" class="chicken">
</div>

<div id="multi">1.00x</div>

<select id="level" onchange="initGame()">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
<option value="hardcore">Hardcore</option>
</select>

<button class="play" id="playBtn" onclick="play()">PLAY</button>
<button class="cash" onclick="cashout()">CASH OUT</button>

</div>

<script>

// 🔥 MULTIPLIERS FULL
const levels = {
easy:[1.02,1.08,1.14,1.21,1.29,1.37,1.46,1.56,1.67,1.80,1.94,2.09],
medium:[1.08,1.22,1.38,1.57,1.79,2.06,2.38,2.78],
hard:[1.19,1.47,1.84,2.32,2.97,3.84,5.05],
hardcore:[1.45,2.22,3.47,5.56,9.13,15.46]
};

let playing=false;
let step=0;
let currentLevel="easy";
let bet=100;

// 🔥 INIT
function initGame(){
  currentLevel=document.getElementById("level").value;
  createRoad();
}
initGame();

// 🔥 CREATE ROAD
function createRoad(){
  let road=document.getElementById("road");
  road.innerHTML="";

  levels[currentLevel].forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="step";
    d.innerText=m+"x";
    d.id="s"+i;
    road.appendChild(d);
  });
}

// ▶️ PLAY / JUMP
function play(){

  if(!playing){
    playing=true;
    step=0;

    document.getElementById("playBtn").innerText="JUMP";
    document.getElementById("multi").innerText="1.00x";

  }else{

    step++;

    let arr=levels[currentLevel];

    if(step>=arr.length){
      gameOver();
      return;
    }

    move(step);

    let loseChance={
      easy:0.1,
      medium:0.2,
      hard:0.3,
      hardcore:0.5
    };

    if(Math.random()<loseChance[currentLevel]){
      gameOver();
      return;
    }

    document.getElementById("multi").innerText=arr[step]+"x";
  }
}

// 🐔 MOVE + FIXED POSITION
function move(s){

  let chicken=document.getElementById("chicken");
  let road=document.getElementById("road");

  // jump
  chicken.classList.add("jump");
  setTimeout(()=>chicken.classList.remove("jump"),400);

  // highlight
  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById("s"+s).classList.add("active");

  // slide road
  let stepWidth=95;
  road.style.transform = `translateX(-${s * stepWidth}px)`;
}

// 💰 CASHOUT
function cashout(){
  if(!playing) return;

  let arr=levels[currentLevel];
  let win=bet*arr[step];

  alert("WIN ₹"+Math.floor(win));
  reset();
}

// ❌ LOSE
function gameOver(){
  alert("❌ LOSE");
  reset();
}

// 🔄 RESET
function reset(){
  playing=false;
  step=0;

  document.getElementById("playBtn").innerText="PLAY";
  document.getElementById("multi").innerText="1.00x";

  document.getElementById("road").style.transform="translateX(0)";
  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
}

</script>

</body>
</html>
