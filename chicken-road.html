<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Road</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:20px 10px;
  text-align:center;
}

/* HEADER */
.header{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

/* MULTI BOX CONTAINER */
.multi-box{
  border:2px solid rgba(0,255,200,0.3);
  border-radius:20px;
  padding:15px;
  overflow:hidden;
  margin-bottom:20px;
}

.road{
  display:flex;
  gap:12px;
  transition:0.4s;
}

/* STEP */
.step{
  min-width:85px;
  height:110px;
  border-radius:14px;
  background:linear-gradient(145deg,#1e293b,#020617);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  color:#00ffcc;
  box-shadow:0 0 15px rgba(0,255,200,0.2);
}

.active{
  background:linear-gradient(145deg,#00ffcc,#00cc99);
  color:#000;
  transform:scale(1.1);
}

/* 🐔 CHICKEN */
.chicken{
  width:70px;
  margin:10px auto;
  transition:0.3s;
}

/* JUMP */
@keyframes jump{
  0%{transform:translateY(0);}
  50%{transform:translateY(-60px);}
  100%{transform:translateY(0);}
}

.jump{
  animation:jump 0.4s;
}

/* MULTI TEXT */
#multi{
  font-size:24px;
  color:#ffd700;
  margin:10px 0;
}

/* BUTTONS */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.play{ background:#22c55e; }
.cash{ background:#f59e0b; }

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  padding:20px 30px;
  border-radius:15px;
  font-size:18px;
  font-weight:bold;
  animation:pop 0.3s;
}

.win{
  background:#065f46;
  color:#00ff99;
}

.loss{
  background:#7f1d1d;
  color:#ff4d4d;
}

@keyframes pop{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<div class="header">🐔 Chicken Road</div>

<!-- MULTIPLIER BOX -->
<div class="multi-box">
  <div class="road" id="road"></div>
</div>

<!-- 🐔 -->
<img src="images/28859-removebg-preview.png" id="chicken" class="chicken">

<div id="multi">1.00x</div>

<select id="level" onchange="initGame()">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
<option value="hardcore">Hardcore</option>
</select>

<button class="play" id="playBtn" onclick="play()">PLAY</button>
<button class="cash" onclick="cashout()">CASH OUT</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div id="popupText" class="popup-box"></div>
</div>

<script>

const levels={
easy:[1.02,1.08,1.14,1.21,1.29,1.37],
medium:[1.08,1.22,1.38,1.57,1.79],
hard:[1.19,1.47,1.84,2.32],
hardcore:[1.45,2.22,3.47,5.56]
};

let playing=false;
let step=0;
let currentLevel="easy";
let bet=100;

// INIT
function initGame(){
  currentLevel=document.getElementById("level").value;
  createRoad();
}
initGame();

// CREATE ROAD
function createRoad(){
  let road=document.getElementById("road");
  road.innerHTML="";

  levels[currentLevel].forEach((m,i)=>{
    let d=document.createElement("div");
    d.className="step";
    d.innerText=m+"x";
    d.id="s"+i;
    road.appendChild(d);
  });
}

// PLAY / JUMP
function play(){

  if(!playing){
    playing=true;
    step=0;

    document.getElementById("playBtn").innerText="JUMP";

    // 🔥 FIRST JUMP
    move(0);

  }else{

    step++;

    let arr=levels[currentLevel];

    if(step>=arr.length){
      gameOver();
      return;
    }

    move(step);

    let loseChance={
      easy:0.1,
      medium:0.2,
      hard:0.3,
      hardcore:0.5
    };

    if(Math.random()<loseChance[currentLevel]){
      gameOver();
      return;
    }

    document.getElementById("multi").innerText=arr[step]+"x";
  }
}

// MOVE
function move(s){

  let chicken=document.getElementById("chicken");

  chicken.classList.add("jump");
  setTimeout(()=>chicken.classList.remove("jump"),400);

  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById("s"+s).classList.add("active");

  // slide
  document.getElementById("road").style.transform = `translateX(-${s*90}px)`;
}

// POPUP
function showPopup(msg,win){

  let p=document.getElementById("popup");
  let box=document.getElementById("popupText");

  box.innerText=msg;
  box.className="popup-box "+(win?"win":"loss");

  p.classList.add("show");

  setTimeout(()=>p.classList.remove("show"),2000);
}

// CASHOUT
function cashout(){
  if(!playing) return;

  let arr=levels[currentLevel];
  let win=bet*arr[step];

  showPopup("WIN ₹"+Math.floor(win),true);
  reset();
}

// LOSE
function gameOver(){
  showPopup("❌ LOSS",false);
  reset();
}

// RESET
function reset(){
  playing=false;
  step=0;
  document.getElementById("playBtn").innerText="PLAY";
  document.getElementById("multi").innerText="1.00x";
  document.getElementById("road").style.transform="translateX(0)";
  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
}

</script>

</body>
</html>
