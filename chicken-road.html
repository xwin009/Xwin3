<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Road</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:#fff;
  display:flex;
  justify-content:center;
}

.container{
  max-width:420px;
  width:100%;
  padding:15px;
  text-align:center;
}

.header{
  font-size:22px;
  font-weight:bold;
}

.wallet{
  margin:10px 0;
  background:#111;
  padding:8px;
  border-radius:10px;
}

/* MULTI BOX */
.multi-box{
  border:2px solid rgba(0,255,200,0.3);
  border-radius:20px;
  padding:15px;
  padding-bottom:80px;   /* 🔥 IMPORTANT */
  overflow-x:auto;
}

/* ROAD */
.road{
  display:flex;
  gap:12px;
  position:relative;
}

/* STEP */
.step{
  min-width:85px;
  height:110px;
  border-radius:14px;
  background:linear-gradient(145deg,#1e293b,#020617);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#00ffcc;
  font-weight:bold;
}

.active{
  background:#00ffcc;
  color:#000;
  transform:scale(1.1);
}

/* 🐔 CHICKEN INSIDE ROAD */
#chicken{
  position:absolute;
  bottom:-85px;   /* 🔥 pehle -60 tha → ab aur niche */
  width:60px;
  transition:0.3s;
}
/* JUMP */
@keyframes jump{
  0%{transform:translateY(0);}
  50%{transform:translateY(-40px);}
  100%{transform:translateY(0);}
}

.jump{
  animation:jump 0.4s;
}

/* MULTI TEXT */
#multi{
  font-size:24px;
  color:#ffd700;
  margin:30px 0;   /* 🔥 pehle 10 tha */
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}
.play{ background:#22c55e; }
.cash{ background:#f59e0b; }

/* POPUP */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}
.popup.show{
  opacity:1;
  pointer-events:auto;
}
.popup-box{
  padding:25px;
  border-radius:15px;
  font-size:18px;
  font-weight:bold;
  animation:pop 0.3s;
}
.win{ background:#065f46; color:#00ff99; }
.loss{ background:#7f1d1d; color:#ff4d4d; }
  
.fire-line{
  position:absolute;
  bottom:-25px;
  left:0;
  display:flex;
  gap:12px;
  width:max-content;   /* 🔥 YE MAIN FIX */
}

.pipe{
  width:85px;   /* 🔥 step ke equal */
  height:12px;
  background:#111;
  border-radius:8px;
  position:relative;
}

/* 🔥 FIRE */
.pipe::before{
  content:"";
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:20px;
  height:0;
  background:linear-gradient(to top, orange, red, yellow);
  border-radius:50%;
  opacity:0;
  transition:0.3s;
}

/* 🔥 ACTIVE FIRE */
.pipe.active::before{
  height:40px;
  opacity:1;
}

@keyframes pop{
  from{transform:scale(0.7);}
  to{transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">

<div class="header">🐔 Chicken Road</div>

<div class="wallet">💰 Wallet: ₹ <span id="wallet">1000</span></div>

<div class="multi-box">
  <div class="road" id="road">
    <img src="images/28859-removebg-preview.png" id="chicken">
 <div class="fire-line">
  <div class="pipe"></div>
  <div class="pipe"></div>
  <div class="pipe"></div>
  <div class="pipe"></div>
</div>
  </div>
</div>

<div id="multi">1.00x</div>

<select id="level" onchange="initGame()">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
<option value="hardcore">Hardcore</option>
</select>

<button class="play" id="playBtn" onclick="play()">PLAY</button>
<button class="cash" onclick="cashout()">CASH OUT</button>

</div>

<div id="popup" class="popup">
  <div id="popupText" class="popup-box"></div>
</div>

<script>

const levels = {

easy:[
1.02,1.08,1.14,1.21,1.29,1.37,1.46,1.56,1.67,1.80,1.94,2.09,2.27,2.47,2.69,2.95,3.24,3.58,3.98,4.45,5.01,5.68,6.49,7.49,8.74,10.33,12.39,15.15,18.94,24.35
],

medium:[
1.08,1.22,1.38,1.57,1.79,2.06,2.38,2.78,3.27,3.89,4.67,5.67,6.98,8.73,11.11,14.44,19.25,26.48,37.83,56.74,90.79,158.88,317.77,794.43,3177.72
],

hard:[
1.19,1.47,1.84,2.32,2.97,3.84,5.05,6.73,9.13,12.65,17.92,26.07,39.11,60.84,98.87,169.49,310.74,621.49,1398.35,3728.95,13051.35,78308.1
],

hardcore:[
1.45,2.22,3.47,5.56,9.13,15.46,27.06,49.21,93.5,187.01,397.39,908.33,2270.83,6358.35,20664.63,82658.55,456622.02,4546220.25
]

};

let wallet=1000;
let bet=100;

let playing=false;
let step=0;
let currentLevel="easy";

// INIT
function initGame(){
  currentLevel=document.getElementById("level").value;
  createRoad();
}
initGame();

// CREATE ROAD + FIRE PIPE
function createRoad(){
  let road=document.getElementById("road");

  road.innerHTML = `
    <img src="images/28859-removebg-preview.png" id="chicken">
    <div class="fire-line" id="fireLine"></div>
  `;

  let fireLine=document.getElementById("fireLine");

  levels[currentLevel].forEach((m,i)=>{

  // STEP
  let d=document.createElement("div");
  d.className="step";
  d.innerText=m+"x";
  d.id="s"+i;
  road.appendChild(d);

  // 🔥 PIPE (same count as steps)
  let pipe=document.createElement("div");
  pipe.className="pipe";
  fireLine.appendChild(pipe);

});

  document.getElementById("s0").classList.add("active");
  moveChicken(0);
}

// PLAY / JUMP
function play(){

  if(!playing){
    playing=true;
    step=0;

    document.getElementById("playBtn").innerText="JUMP";

    let first=levels[currentLevel][0];
    document.getElementById("multi").innerText=first+"x";

  }else{

    step++;

    let arr=levels[currentLevel];

    if(step>=arr.length){
      gameOver();
      return;
    }

    moveChicken(step);

    let loseChance={
      easy:0.1,
      medium:0.2,
      hard:0.3,
      hardcore:0.5
    };

    if(Math.random()<loseChance[currentLevel]){

      triggerFire(step); // 🔥 FIRE

      setTimeout(()=>{
        gameOver();
      },400);

      return;
    }

    document.getElementById("multi").innerText=arr[step]+"x";
  }
}

// 🐔 MOVE
function moveChicken(s){

  let chicken=document.getElementById("chicken");

  let boxWidth=97;
  chicken.style.left = (s * boxWidth)+"px";

  chicken.classList.add("jump");
  setTimeout(()=>chicken.classList.remove("jump"),400);

  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById("s"+s).classList.add("active");
}
  
function autoFire(){

  setInterval(()=>{

    let pipes = document.querySelectorAll(".pipe"); // 🔥 har baar fresh lo

    if(pipes.length === 0) return;

    // 🔥 1–3 random pipes ek sath
    let count = Math.floor(Math.random()*3)+1;

    for(let i=0;i<count;i++){

      let index = Math.floor(Math.random() * pipes.length);

      pipes[index].classList.add("active");

      setTimeout(()=>{
        pipes[index].classList.remove("active");
      },600);
    }

  }, 1000 + Math.random()*2000); // 1–3 sec

}
  
// 🔥 FIRE TRIGGER
function triggerFire(index){

  let pipes=document.querySelectorAll(".pipe");

  if(pipes[index]){
    pipes[index].classList.add("active");

    setTimeout(()=>{
      pipes[index].classList.remove("active");
    },800);
  }
}

// POPUP
function showPopup(msg,win){
  let p=document.getElementById("popup");
  let box=document.getElementById("popupText");

  box.innerHTML=msg;
  box.className="popup-box "+(win?"win":"loss");

  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),2500);
}

// CASHOUT
function cashout(){
  if(!playing) return;

  let arr=levels[currentLevel];
  let winAmount = Math.floor(bet * arr[step]);

  wallet += winAmount;
  document.getElementById("wallet").innerText=wallet;

  showPopup(`🎉 Congratulations!<br>Win ₹${winAmount} 💰`,true);

  reset();
}

// LOSE
function gameOver(){

  wallet -= bet;
  document.getElementById("wallet").innerText=wallet;

  showPopup(`💀 Bad Luck!<br>You Lost ₹${bet} 🔥`,false);

  reset();
}

// RESET
function reset(){
  playing=false;
  step=0;

  document.getElementById("playBtn").innerText="PLAY";
  document.getElementById("multi").innerText="1.00x";

  document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
  document.getElementById("s0").classList.add("active");

  moveChicken(0);
  autoFire();
}

        </script>
    
</body>
</html>
