<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chicken Betting Game</title>
  <style>
    body {
      background: #222;
      color: #fff;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    #gameArea {
      position: relative;
      width: 600px;
      height: 300px;
      margin: 20px auto;
      border: 2px solid #fff;
      background: #333;
    }
    #chicken {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: url('https://i.ibb.co/3mLkYwM/chicken.png') no-repeat center/cover;
      transition: left 0.5s;
    }
    .door {
      position: absolute;
      bottom: 20px;
      width: 60px;
      height: 100px;
      background: brown;
      color: #fff;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Chicken Betting Game</h1>
  <div>
    Bet Amount: <input type="number" id="betAmount" value="100">
    <button onclick="playGame()">Play</button>
  </div>
  
  <div id="gameArea">
    <div id="chicken"></div>
    <!-- Doors with multipliers -->
    <div class="door" style="left:150px;" data-multiplier="2">2X</div>
    <div class="door" style="left:250px;" data-multiplier="5">5X</div>
    <div class="door" style="left:350px;" data-multiplier="10">10X</div>
    <div class="door" style="left:450px;" data-multiplier="20">20X</div>
  </div>

  <p id="result"></p>

  <script>
    function playGame() {
      let bet = parseInt(document.getElementById("betAmount").value);
      let chicken = document.getElementById("chicken");
      let doors = document.querySelectorAll(".door");

      doors.forEach(door => {
        door.onclick = () => {
          // Move chicken to door
          chicken.style.left = door.style.left;

          // Calculate reward
          let multiplier = parseFloat(door.dataset.multiplier);
          let win = bet * multiplier;

          document.getElementById("result").innerText =
            "Chicken chose " + multiplier + "X door! You won ₹" + win;
        };
      });
    }
  </script>
</body>
</html>
