<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinner Game</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

/* HEADER */
.header{
  padding:10px;
  font-size:20px;
  font-weight:bold;
}

/* SPINNER */
.spinner-box{
  position:relative;
  margin:20px auto;
  width:260px;
  height:260px;
}

.spinner{
  width:100%;
  height:100%;
  border-radius:50%;
  transition:4s cubic-bezier(.17,.67,.83,.67);
}

.arrow{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:25px;
}

/* BOXES */
.boxes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.box{
  background:#111;
  padding:10px;
  border-radius:12px;
  border:2px solid transparent;
}

.box img{
  width:50px;
}

.active{
  border:2px solid #00ffcc;
  box-shadow:0 0 10px #00ffcc;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.start{background:#22c55e;}
.history{background:#000;}

/* BET */
.bet{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.bet button{
  width:40px;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.7);
  opacity:0;
  pointer-events:none;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:10px;
}

/* HISTORY */
.history-box{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  padding:20px;
}

.history-item{
  background:#111;
  margin:5px 0;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🎯 Spinner Game</div>

<div class="spinner-box">
  <div class="arrow">⬇️</div>
  <img src="images/33724-removebg-preview.png" id="spinner" class="spinner">
</div>

<!-- BOXES -->
<div class="boxes">
  <div class="box" onclick="selectBox(0)">
    <img src="images/33620-removebg-preview.png"><br>5x
  </div>
  <div class="box" onclick="selectBox(1)">
    <img src="images/33619-removebg-preview.png"><br>4x
  </div>
  <div class="box" onclick="selectBox(2)">
    <img src="images/IMG_20260327_114703.png"><br>2x
  </div>
  <div class="box" onclick="selectBox(3)">
    <img src="images/33623-removebg-preview.png"><br>2x
  </div>
</div>

<!-- BET -->
<div class="bet">
  <button onclick="changeBet(-10)">-</button>
  <input type="number" id="bet" value="100">
  <button onclick="changeBet(10)">+</button>
</div>

<button class="start" onclick="spin()">START</button>
<button class="history" onclick="openHistory()">📜 History</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

<!-- HISTORY -->
<div class="history-box" id="historyBox">
  <h3>History</h3>
  <div id="historyList"></div>
  <button onclick="closeHistory()">Close</button>
</div>

<script>

let selected = -1;
let rotation = 0;
let history = [];

const multipliers = [5,4,2,2];

// SELECT BOX
function selectBox(i){
  document.querySelectorAll(".box").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".box")[i].classList.add("active");
  selected = i;
}

// SPIN
function spin(){

  if(selected==-1){
    return alert("Select box first");
  }

  let bet = parseInt(document.getElementById("bet").value);

  let randomIndex = Math.floor(Math.random()*4);

  let deg = 360 * 5 + (randomIndex * 90);

  rotation += deg;

  let spinner = document.getElementById("spinner");
  spinner.style.transform = `rotate(${rotation}deg)`;

  setTimeout(()=>{

    let win = selected === randomIndex;

    if(win){
      let amount = bet * multipliers[selected];
      showPopup(`🎉 WIN ₹${amount}`);
      addHistory("WIN", amount);
    }else{
      showPopup(`💀 LOSS ₹${bet}`);
      addHistory("LOSS", bet);
    }

  },4000);
}

// POPUP
function showPopup(text){
  let p = document.getElementById("popup");
  let t = document.getElementById("popupText");

  t.innerHTML = text;
  p.classList.add("show");

  setTimeout(()=>p.classList.remove("show"),2000);
}

// BET
function changeBet(val){
  let i = document.getElementById("bet");
  i.value = Math.max(10,(parseInt(i.value)||0)+val);
}

// HISTORY
function addHistory(type, amount){
  let time = new Date().toLocaleTimeString();
  history.unshift({type,amount,time});
  renderHistory();
}

function renderHistory(){
  let list = document.getElementById("historyList");
  list.innerHTML = "";

  history.forEach(h=>{
    let d = document.createElement("div");
    d.className="history-item";
    d.innerHTML = `${h.time} - ${h.type} ₹${h.amount}`;
    list.appendChild(d);
  });
}

function openHistory(){
  document.getElementById("historyBox").style.display="flex";
}
function closeHistory(){
  document.getElementById("historyBox").style.display="none";
}

</script>

</body>
</html>
