<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invest Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:url("images/bd1af2ba1bab5df898ea0a2c8ccb4453.jpg") center/cover no-repeat;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

body:before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
}

/* WALLET */
.wallet{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:10px 20px;
border-radius:20px;
font-size:18px;
font-weight:bold;
color:#00e676;
z-index:2;
}

/* TOP TEXT */
.top-text{
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
font-size:22px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 15px rgba(255,215,0,0.9);
white-space:nowrap;
animation:glow 2s infinite;
z-index:2;
}

@keyframes glow{
0%{text-shadow:0 0 10px #ffd700}
50%{text-shadow:0 0 25px #ffd700}
100%{text-shadow:0 0 10px #ffd700}
}

/* CARD */
.box{
position:relative;
z-index:1;
width:340px;
padding:25px;
border-radius:18px;
background:rgba(30,41,59,0.9);
backdrop-filter:blur(8px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
color:#fff;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:6px;
}

.subtitle{
font-size:15px;
color:#ddd;
margin-bottom:20px;
}

.plan{
background:linear-gradient(135deg,#22c55e,#4ade80);
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-weight:bold;
color:#000;
cursor:pointer;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
margin-bottom:12px;
text-align:center;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#000;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.timer{
margin-top:18px;
font-size:22px;
font-weight:bold;
color:#ffcc00;
}

.history{
margin-top:15px;
background:#111;
padding:10px;
border-radius:10px;
font-size:14px;
max-height:120px;
overflow:auto;
}
.popup-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup-box{
background:#1e293b;
padding:25px;
border-radius:16px;
text-align:center;
width:260px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.popup-box button{
margin-top:15px;
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
}
  
</style>
</head>

<body>

<div class="wallet">
💰 Wallet: ₹<span id="wallet">0</span>
</div>

<div class="top-text">
🚀 Biggest Earning Opportunity 🚀
</div>

<div class="box">

<div class="title">💰 Invest Game</div>
<div class="subtitle">Earn passive reward</div>

<div class="plan" onclick="selectPlan(1000,1500)">
₹1000 → ₹1500 (10 Hours)
</div>

<div class="plan" onclick="selectPlan(5000,8000)">
₹5000 → ₹8000 (10 Hours)
</div>

<div class="plan" onclick="selectPlan(10000,16000)">
₹10000 → ₹16000 (10 Hours)
</div>

<input type="number" id="amount" placeholder="Selected Plan Amount">

<button onclick="invest()">Invest</button>

<div class="timer" id="timer">--</div>

<div class="history" id="history">
<b>Investment History</b><br>
</div>

</div>

<script>

let wallet = Number(localStorage.getItem("wallet")) || 0;
document.getElementById("wallet").innerText = wallet;

let rewardValue = 0;

function selectPlan(amt,reward){

document.getElementById("amount").value = amt;
rewardValue = reward;

}

function invest(){

let amt = Number(document.getElementById("amount").value);

if(wallet < amt){
alert("Low Wallet Balance");
return;
}

wallet -= amt;

localStorage.setItem("wallet",wallet);
document.getElementById("wallet").innerText = wallet;

let unlock = Date.now() + (10*60*60*1000);

localStorage.setItem("investAmount",amt);
localStorage.setItem("investReward",rewardValue);
localStorage.setItem("unlockTime",unlock);

let history = localStorage.getItem("investHistory") || "";
history += "Invested ₹"+amt+"<br>";
localStorage.setItem("investHistory",history);

document.getElementById("history").innerHTML =
"<b>Investment History</b><br>"+history;

showPopup("Investment Started 🚀");

}

function updateTimer(){

let unlock = Number(localStorage.getItem("unlockTime")) || 0;

if(!unlock) return;

let diff = unlock - Date.now();

if(diff <= 0){

let reward = Number(localStorage.getItem("investReward")) || 0;

wallet += reward;

localStorage.setItem("wallet",wallet);

alert("🔔 Investment Completed\n₹"+reward+" Added");

localStorage.removeItem("unlockTime");

location.reload();

return;

}

let h = Math.floor(diff/3600000);
let m = Math.floor((diff%3600000)/60000);
let s = Math.floor((diff%60000)/1000);

document.getElementById("timer").innerText =
h+"h "+m+"m "+s+"s";

}

setInterval(updateTimer,1000);

let history = localStorage.getItem("investHistory") || "";
document.getElementById("history").innerHTML =
"<b>Investment History</b><br>"+history;
function showPopup(msg){

document.getElementById("popupText").innerText = msg;
document.getElementById("popupBg").style.display="flex";

}

function closePopup(){

document.getElementById("popupBg").style.display="none";

}
  
</script>
  
<div class="popup-bg" id="popupBg">
<div class="popup-box">
<div id="popupText"></div>
<button onclick="closePopup()">OK</button>
</div>
</div>
  
</body>
</html>
