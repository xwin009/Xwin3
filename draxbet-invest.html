<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invest Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:url("images/bd1af2ba1bab5df898ea0a2c8ccb4453.jpg") center/cover no-repeat;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
  
/* dark overlay */
body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,0.65);
}

.box{
position:relative;
z-index:1;
width:340px;
padding:25px;
border-radius:18px;
background:rgba(30,41,59,0.9);
backdrop-filter:blur(8px);
box-shadow:0 15px 40px rgba(0,0,0,0.5);
text-align:center;
color:#fff;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:6px;
}

.subtitle{
font-size:15px;
color:#ddd;
margin-bottom:20px;
}

.plan{
background:linear-gradient(135deg,#22c55e,#4ade80);
padding:12px;
border-radius:12px;
margin-bottom:18px;
font-weight:bold;
color:#000;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
font-size:16px;
margin-bottom:12px;
text-align:center;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#22c55e;
color:#000;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.03);
background:#16a34a;
}

.timer{
margin-top:18px;
font-size:20px;
font-weight:bold;
color:#facc15;
}

.claim{
background:#facc15;
margin-top:10px;
display:none;
}
.top-text{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
font-size:22px;
font-weight:bold;
color:#ffd700;
text-shadow:0 0 12px rgba(255,215,0,0.8);
z-index:2;
}
</style>
</head>

<body>
<div class="top-text">
🚀 Biggest Earning Opportunity 🚀
</div>
  
<div class="box">

<div class="title">💰 Invest Game</div>
<div class="subtitle">Earn passive reward</div>

<div class="plan">
Invest ₹1000 → Receive ₹1500 after 10 hours
</div>

<input type="number" id="amount" value="1000">

<button onclick="invest()">Invest</button>

<div class="timer" id="timer"></div>

<button class="claim" id="claimBtn" onclick="claim()">Claim Reward</button>

</div>

<script>

function invest(){

let amt = Number(document.getElementById("amount").value);

if(amt < 100){
alert("Minimum invest ₹100");
return;
}

let unlock = Date.now() + (10 * 60 * 60 * 1000);

localStorage.setItem("investAmount", amt);
localStorage.setItem("unlockTime", unlock);

alert("Investment Started");

}

function claim(){

let amt = Number(localStorage.getItem("investAmount")) || 0;
let reward = Math.floor(amt * 1.5);

let wallet = Number(localStorage.getItem("wallet")) || 0;
wallet += reward;

localStorage.setItem("wallet", wallet);

alert("₹"+reward+" added to wallet");

localStorage.removeItem("investAmount");
localStorage.removeItem("unlockTime");

location.reload();

}

setInterval(()=>{

let unlock = localStorage.getItem("unlockTime");

if(!unlock) return;

let diff = unlock - Date.now();

if(diff <= 0){

document.getElementById("timer").innerText="Ready to Claim 🎉";
document.getElementById("claimBtn").style.display="block";

}else{

let h = Math.floor(diff/3600000);
let m = Math.floor(diff%3600000/60000);
let s = Math.floor(diff%60000/1000);

document.getElementById("timer").innerText =
h+"h "+m+"m "+s+"s";

}

},1000);

</script>

</body>
</html>
