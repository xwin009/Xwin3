<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚗 Drax Turbo Drive</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;font-family:Arial;
  background:linear-gradient(135deg,#ff4fd8,#8f2bff);
  color:#fff;text-align:center
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  font-size:22px;
  font-weight:bold;
}

.wallet{
  background:rgba(0,0,0,.3);
  padding:6px 16px;
  border-radius:20px;
}
  
.multis{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.multi{
  background:#000;
  padding:8px 14px;
  border-radius:14px;
  font-weight:bold;
}
  
/* TRACK */
.track{
  display:flex;gap:10px;padding:10px;
}
.lane{
  flex:1;background:#2b003d;
  border-radius:16px;padding:10px;
  position:relative;
}

/* ROAD LINE */
.dots{
  height:120px;margin:10px auto;
  width:6px;
  background:repeating-linear-gradient(
    to bottom,
    yellow 0 14px,
    black 14px 28px
  );
  border-radius:6px
}

/* CAR */
.car{
  width:80px;
  transition:transform 1.5s ease;
}

/* SELECT */
.select{display:flex;gap:10px;padding:10px}
.sel{
  flex:1;background:#2b003d;
  padding:12px;border-radius:16px;
  cursor:pointer;font-weight:bold
}
.sel.active{background:#ff66e3;color:#000}

/* INPUT */
input{
  width:90%;padding:14px;
  border:none;border-radius:30px;
  margin-top:10px
}

/* BUTTON */
button{
  width:90%;padding:16px;
  border:none;border-radius:30px;
  background:#ff4fd8;
  font-size:18px;font-weight:bold;
  margin-top:10px
}

/* HISTORY */
.history{
  background:#14001f;margin:14px;padding:12px;
  border-radius:16px;text-align:left
}

/* POPUP */
.popup{
  position:fixed;inset:0;
  background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center
}
.popup div{
  background:#fff;color:#000;
  padding:24px;border-radius:20px;font-size:20px
}
</style>
</head>

<body>

<div class="header">
  🚗 DRAX TURBO DRIVE
  <div class="wallet">₹ <span id="wallet">0</span></div>
</div>

  <div class="multis">
  <div class="multi">Mercedes 3x</div>
  <div class="multi">Audi 3x</div>
  <div class="multi">BMW 5x</div>
  </div>
  
<!-- TRACK -->
<div class="track">

  <div class="lane">
    <div>Mercedes</div>
    <div class="dots"></div>
    <img src="images/29118-removebg-preview.png" class="car" id="car-mer">
  </div>

  <div class="lane">
    <div>Audi</div>
    <div class="dots"></div>
    <img src="images/29119-removebg-preview.png" class="car" id="car-audi">
  </div>

  <div class="lane">
    <div>BMW</div>
    <div class="dots"></div>
    <img src="images/29122-removebg-preview.png" class="car" id="car-bmw">
  </div>

</div>

<!-- SELECT -->
<div class="select">
  <div class="sel" onclick="selectCar('mer',this)">Mercedes</div>
  <div class="sel" onclick="selectCar('audi',this)">Audi</div>
  <div class="sel" onclick="selectCar('bmw',this)">BMW</div>
</div>

<input id="betInput" type="number" value="100">
<button onclick="startRace()">START RACE</button>

<div class="history">
<b>MY BETS</b>
<div id="historyBox">No bets yet</div>
</div>

<div class="popup" id="popup"><div id="popupText"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,collection,query,where,
  getDocs,doc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===== ELEMENTS ===== */
const betInput = document.getElementById("betInput");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const historyBox = document.getElementById("historyBox");
const walletSpan = document.getElementById("wallet");

/* ===== FIREBASE ===== */
const app=initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db=getFirestore(app);

const userEmail=localStorage.getItem("userEmail");

/* ===== STATE ===== */
let uid="";
let wallet=0;
let HOUSE_EDGE=0.25;

/* ===== LOAD WALLET ===== */
async function loadWallet(){
  if(!userEmail) return;

  const q=query(collection(db,"users"),where("email","==",userEmail));
  const snap=await getDocs(q);

  snap.forEach(d=>{
    uid=d.id;
    wallet=Number(d.data().balance||0);
  });

  updateWallet();
}

/* ===== SAVE WALLET ===== */
async function saveWallet(){
  if(uid){
    await updateDoc(doc(db,"users",uid),{balance:wallet});
  }
}

/* ===== INIT ===== */
await loadWallet();

/* ===== GAME ===== */
let selected="";
let history=[];
let raceRunning=false;

const cars={
 mer:{el:"car-mer",pay:3},
 audi:{el:"car-audi",pay:3},
 bmw:{el:"car-bmw",pay:5}
};

window.selectCar=(c,el)=>{
 if(raceRunning) return;
 selected=c;

 document.querySelectorAll(".sel").forEach(x=>x.classList.remove("active"));
 el.classList.add("active");
};

window.startRace=async()=>{
 if(raceRunning) return;

 const bet=Number(betInput.value);

 if(!selected){
   showPopup("⚠️ Select Car");
   return;
 }

 if(bet<=0 || bet>wallet){
   showPopup("💸 Low Balance");
   return;
 }

 raceRunning=true;

 /* RESET CARS */
 Object.values(cars).forEach(c=>{
  document.getElementById(c.el).style.transform="translateY(0)";
 });

 wallet-=bet;
 await saveWallet();
 updateWallet();

 const winner = Math.random()<HOUSE_EDGE ? selected : getOther();

 /* MOVE WINNER */
 setTimeout(()=>{
  document.getElementById(cars[winner].el)
   .style.transform="translateY(-120px)";
 },200);

 /* RESULT */
 setTimeout(async()=>{

  if(winner===selected){
    const win = bet * cars[winner].pay;
    wallet += win;
    await saveWallet();

    showPopup(`🎉 ${winner.toUpperCase()} WIN ₹${win}`);
    addHistory(`✅ ${winner} +₹${win}`);

  }else{
    showPopup(`❌ ${winner.toUpperCase()} WON`);
    addHistory(`❌ ${selected} -₹${bet}`);
  }

  updateWallet();
  raceRunning=false;

 },1600);
};

/* ===== HELPERS ===== */

function getOther(){
 return Object.keys(cars).filter(c=>c!==selected)
 [Math.floor(Math.random()*2)];
}

function addHistory(t){
 history.unshift(t);
 history=history.slice(0,10);
 historyBox.innerHTML=history.join("<br>");
}

function updateWallet(){
 walletSpan.innerText = wallet;   // ✔️ FIXED
}

function showPopup(t){
 popupText.innerText=t;
 popup.style.display="flex";
 setTimeout(()=>popup.style.display="none",1500);
}
</script>
  
</body>
</html>
