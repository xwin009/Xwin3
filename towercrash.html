<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏢 Tower X</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f2a;
  color:#fff;
  text-align:center;
}

.header{
  padding:12px;
  font-size:22px;
  font-weight:bold;
}

/* GAME */
.game{
  position:relative;
  height:400px;
  max-width:300px;
  margin:10px auto;
  background:linear-gradient(#87ceeb,#4fa3d1);
  overflow:hidden;
  border-radius:20px;
}

/* HOLE */
.hole{
  width:165px;   /* 🔥 thoda chhota */
  height:90px;
  position:absolute;
  top:10px;
  background-size:contain;
  background-repeat:no-repeat;
}

/* IMAGE BLOCK */
.block{
  width:180px;   /* 🔥 aur bada */
  height:100px;
  position:absolute;
  background-size:contain;
  background-repeat:no-repeat;
}
/* BASE IMAGE */
.base{
  width:190px;
  height:100px;
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  background:url("images/29202-removebg-preview.png") no-repeat center/contain;
}

/* MULT */
.mult{
  font-size:24px;
  color:#00ffcc;
  margin:10px;
}

/* BTN */
button,input{
  width:85%;
  padding:14px;
  border:none;
  border-radius:30px;
  margin-top:10px;
}

button{
  background:#ff4fd8;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.7);
}

.popup div{
  background:#111;
  padding:25px;
  border-radius:20px;
  font-size:20px;
}

.win{color:#00ff88;}
.loss{color:#ff3b3b;}
</style>
</head>

<body>

<div class="header">🏢 Tower X</div>

<div id="game" class="game">
  <div id="hole" class="hole"></div>
  <div class="base"></div>
</div>

<div class="mult" id="mult">x1.00</div>

<input id="bet" type="number" value="100">

<button id="mainBtn">START</button>
<button id="dropBtn">DROP</button>

<div class="popup" id="popup">
  <div id="popupText"></div>
</div>

 <script>
let wallet=1000;
let running=false;
let bet=0;
let step=0;

const multipliers=[
1.02,1.08,1.14,1.21,1.29,1.37,1.46,1.56,1.67,1.80,
1.94,2.09,2.27,2.47,2.69,2.95,3.24,3.58,3.98,4.45,
5.01,5.68,6.49,7.49,8.74,10.33,12.39,15.15,18.94,24.35
];

let holeX=0,dir=1,moveHole;
let lastLeft=0;
let lastWidth=180;

const game=document.getElementById("game");
const mainBtn=document.getElementById("mainBtn");
const dropBtn=document.getElementById("dropBtn");

/* POPUP */
function showPopup(text,type){
 popupText.className=type;
 popupText.innerText=text;
 popup.style.display="flex";
 setTimeout(()=>popup.style.display="none",2000);
}

/* BUTTON */
mainBtn.onclick=()=>{
 if(!running){
   startGame();
 }else{
   cashout();
 }
};

dropBtn.onclick=()=>drop();

/* START */
function startGame(){
 bet=+document.getElementById("bet").value;

 if(bet<=0 || bet>wallet){
   showPopup("❌ Low Balance","loss");
   return;
 }

 wallet-=bet;
 running=true;
 step=0;

 mainBtn.innerText="CASHOUT";

 game.innerHTML='<div id="hole" class="hole"></div><div class="base"></div>';

 lastWidth=180;
 lastLeft=(game.clientWidth/2)-(lastWidth/2);

 startHole();
}

/* HOLE MOVE */
function startHole(){
 const hole=document.getElementById("hole");

 hole.style.background="url(images/29199-removebg-preview.png) center/contain no-repeat";

 moveHole=setInterval(()=>{
   holeX+=dir*2;

   if(holeX>220) dir=-1;
   if(holeX<0) dir=1;

   hole.style.left=holeX+"px";
 },25);
}

/* DROP */
function drop(){
 if(!running) return;

 clearInterval(moveHole);

 const block=document.createElement("div");

 let blockWidth=180;
 let holeWidth=165;

 let blockLeft = holeX + (holeWidth/2) - (blockWidth/2);

 block.className="block";
 block.style.left=blockLeft+"px";
 block.style.top="-120px"; // 🔥 upar se start
 block.style.background="url(images/29199-removebg-preview.png) center/contain no-repeat";

 game.appendChild(block);

 const blockHeight=100;
 const baseOffset=100;

 let targetY = game.clientHeight - baseOffset - (step * blockHeight);

 /* 🔥 REAL PHYSICS DROP */
 let velocity = 0;
 let gravity = 0.6;

 let fall = setInterval(()=>{
   let top = parseFloat(block.style.top);

   velocity += gravity;
   top += velocity;

   block.style.top = top + "px";

   if(top >= targetY){
     clearInterval(fall);

     /* 🔥 BOUNCE EFFECT */
     block.style.top = (targetY - 10) + "px";

     setTimeout(()=>{
       block.style.top = targetY + "px";

       /* LOSS RANDOM */
       if(Math.random()<0.25){
         block.style.filter="brightness(0)";
         showPopup("🔥 Bad Luck! You Loss","loss");
         reset();
         return;
       }

       /* STACK */
       let overlap = Math.min(blockLeft + blockWidth, lastLeft + lastWidth)
                   - Math.max(blockLeft, lastLeft);

       if(overlap<=0){
         block.style.filter="brightness(0)";
         showPopup("🔥 Miss! You Loss","loss");
         reset();
         return;
       }

       let newLeft = Math.max(blockLeft, lastLeft);

       block.style.left=newLeft+"px";
       block.style.width=overlap+"px";

       /* 🔥 IMPACT EFFECT */
       block.style.transform="scaleY(0.95)";
       setTimeout(()=>{
         block.style.transform="scaleY(1)";
       },120);

       lastLeft=newLeft;
       lastWidth=overlap;

       document.getElementById("mult").innerText="x"+multipliers[step];

       step++;

       /* AUTO SCROLL */
       if(step>3){
         game.scrollTop += blockHeight;
       }

       if(step>=multipliers.length){
         cashout();
         return;
       }

       startHole();

     },120);
   }

 },16);
}

/* CASHOUT */
function cashout(){
 if(!running) return;

 let win=bet*multipliers[Math.max(step-1,0)];

 wallet+=win;

 showPopup("💰 You Cashout ₹"+Math.floor(win),"win");

 reset();
}

/* RESET */
function reset(){
 running=false;
 mainBtn.innerText="START";
}
 </script>
  
</body>
</html>
