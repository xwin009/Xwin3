<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏢 Tower X</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f2a;
  color:#fff;
  text-align:center;
}

.header{
  padding:12px;
  font-size:22px;
  font-weight:bold;
}

/* GAME */
.game{
  position:relative;
  height:400px;
  max-width:300px;
  margin:10px auto;
  background:linear-gradient(#87ceeb,#4fa3d1);
  overflow:hidden;
  border-radius:20px;
}

/* HOLE */
.hole{
  width:80px;
  height:40px;
  position:absolute;
  top:10px;
}

/* IMAGE BLOCK */
.block{
  width:80px;
  height:40px;
  position:absolute;
  background-size:cover;
  background-repeat:no-repeat;
}

/* BASE IMAGE */
.base{
  width:100px;
  height:40px;
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  background:url("images/29202-removebg-preview.png") no-repeat center/contain;
}

/* MULT */
.mult{
  font-size:24px;
  color:#00ffcc;
  margin:10px;
}

/* BTN */
button,input{
  width:85%;
  padding:14px;
  border:none;
  border-radius:30px;
  margin-top:10px;
}

button{
  background:#ff4fd8;
  font-weight:bold;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.7);
}

.popup div{
  background:#111;
  padding:25px;
  border-radius:20px;
  font-size:20px;
}

.win{color:#00ff88;}
.loss{color:#ff3b3b;}
</style>
</head>

<body>

<div class="header">🏢 Tower X</div>

<div id="game" class="game">
  <div id="hole" class="hole"></div>
  <div class="base"></div>
</div>

<div class="mult" id="mult">x1.00</div>

<input id="bet" type="number" value="100">

<button id="mainBtn">START</button>
<button id="dropBtn">DROP</button>

<div class="popup" id="popup">
  <div id="popupText"></div>
</div>

<script>
let wallet=1000;
let running=false;
let bet=0;
let step=0;

const multipliers=[
1.02,1.08,1.14,1.21,1.29,1.37,1.46,1.56,1.67,1.80,
1.94,2.09,2.27,2.47,2.69,2.95,3.24,3.58,3.98,4.45,
5.01,5.68,6.49,7.49,8.74,10.33,12.39,15.15,18.94,24.35
];

let holeX=0,dir=1,moveHole;
let lastLeft=110;
let lastWidth=100;

/* ELEMENTS */
const game=document.getElementById("game");
const mainBtn=document.getElementById("mainBtn");
const dropBtn=document.getElementById("dropBtn");

/* POPUP */
function showPopup(text,type){
 popupText.className=type;
 popupText.innerText=text;
 popup.style.display="flex";
 setTimeout(()=>popup.style.display="none",2000);
}

/* BUTTON */
mainBtn.onclick=()=>{
 if(!running){
   startGame();
 }else{
   cashout();
 }
};

dropBtn.onclick=()=>drop();

/* START */
function startGame(){
 bet=+document.getElementById("bet").value;

 if(bet<=0 || bet>wallet){
   showPopup("❌ Low Balance","loss");
   return;
 }

 wallet-=bet;
 running=true;
 step=0;

 mainBtn.innerText="CASHOUT";

 game.innerHTML='<div id="hole" class="hole"></div><div class="base"></div>';

 startHole();
}

/* 🔥 SLOW HOLE MOVEMENT */
function startHole(){
 const hole=document.getElementById("hole");

 hole.style.background="url(images/29199-removebg-preview.png) center/contain no-repeat";

 moveHole=setInterval(()=>{
   holeX+=dir*2;   /* 🔥 SPEED SLOW */

   if(holeX>220) dir=-1;
   if(holeX<0) dir=1;

   hole.style.left=holeX+"px";
 },25);
}

/* DROP */
function drop(){
 if(!running) return;

 clearInterval(moveHole);

 const block=document.createElement("div");

 block.className="block";
 block.style.left=holeX+"px";
 block.style.top="0px";
 block.style.background="url(images/29199-removebg-preview.png) center/contain no-repeat";

 game.appendChild(block);

 /* FALL */
 let fall=setInterval(()=>{
   let top=parseInt(block.style.top);
   top+=4;   /* 🔥 SLOW FALL */
   block.style.top=top+"px";

   if(top>=350-(step*30)){
     clearInterval(fall);

     if(Math.random()<0.25){
       block.style.filter="brightness(0)";
       showPopup("🔥 Bad Luck! You Loss","loss");
       reset();
       return;
     }

     let overlap=Math.min(holeX+80,lastLeft+lastWidth)-Math.max(holeX,lastLeft);

     if(overlap<=0){
       block.style.filter="brightness(0)";
       showPopup("🔥 Miss! You Loss","loss");
       reset();
       return;
     }

     block.style.left=Math.max(holeX,lastLeft)+"px";
     block.style.width=overlap+"px";

     lastLeft=parseFloat(block.style.left);
     lastWidth=overlap;

     document.getElementById("mult").innerText="x"+multipliers[step];

     step++;

     if(step>=multipliers.length){
       cashout();
       return;
     }

     startHole();
   }

 },20);
}

/* CASHOUT */
function cashout(){
 if(!running) return;

 let win=bet*multipliers[Math.max(step-1,0)];

 wallet+=win;

 showPopup("💰 You Cashout ₹"+Math.floor(win),"win");

 reset();
}

/* RESET */
function reset(){
 running=false;
 mainBtn.innerText="START";
}
</script>

</body>
</html>
