<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account – Colour Cash</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f2f2f2;padding-bottom:90px}

.header{
  background:linear-gradient(135deg,#ff6a6a,#ff8e8e);
  padding:18px;color:#fff;display:flex;gap:12px
}
.header img{width:52px;height:52px;border-radius:50%}

.card{background:#fff;margin:15px;border-radius:16px;padding:18px}

.history{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px
}
.history div{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:16px;border-radius:14px;font-weight:bold;text-align:center
}

.logout{
  background:#e53935;color:#fff;border:none;width:calc(100% - 30px);
  margin:15px;padding:14px;border-radius:14px;font-size:16px
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#111;
  display:flex;
  border-top:1px solid #222;
  z-index:99999;
}
.nav-btn{
  flex:1;
  text-align:center;
  padding:10px 0;
  font-size:12px;
  color:#aaa;
}
.nav-btn.active{
  color:#ff6a6a;
  font-weight:bold;
}
.nav-btn div{font-size:20px}
</style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/6VBx3io.png">
  <div>
    <h3 id="userName">USER</h3>
    <p>UID: <span id="uid"></span></p>
    <p>Last login: <span id="lastLogin"></span></p>
  </div>
</div>

<div class="card">
  <p>Total balance</p>
  <h2 id="accBalance">₹0.00</h2>

  <div style="display:flex;justify-content:space-between;margin-top:15px">
    <div onclick="location.href='wallet.html'">👛 Wallet</div>
    <div onclick="location.href='deposit.html'">💰 Deposit</div>
    <div onclick="location.href='withdraw.html'">🏦 Withdraw</div>
  </div>
</div>

<div class="history">
  <div onclick="location.href='deposit-history.html'">📥 My Deposit History</div>
  <div onclick="location.href='withdraw-history.html'">📤 My Withdraw History</div>
</div>

<button class="logout" onclick="logout()">Logout</button>
  <button class="logout" style="background:#1e88e5" onclick="openChangePass()">
  🔑 Change Password
</button>

<div class="bottom-nav">
  <div class="nav-btn" onclick="location.href='index.html'">
    <div>🏠</div>Home
  </div>
  <div class="nav-btn" onclick="location.href='wallet.html'">
    <div>💰</div>Wallet
  </div>
  <div class="nav-btn" onclick="location.href='promotion.html'">
    <div>🎁</div>Promotion
  </div>
  <div class="nav-btn active">
    <div>👤</div>Account
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain: "colourcash-ea60e.firebaseapp.com",
  projectId: "colourcash-ea60e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER NAME */
const name = localStorage.getItem("userName") || "USER";
document.getElementById("userName").innerText = name.toUpperCase();

/* UID */
let uid = localStorage.getItem("uid");
if(!uid){
  uid = Math.floor(1000000 + Math.random()*9000000);
  localStorage.setItem("uid", uid);
}
document.getElementById("uid").innerText = uid;

/* LAST LOGIN */
document.getElementById("lastLogin").innerText =
  localStorage.getItem("lastLogin") || "-";

/* LIVE BALANCE */
const userEmail = localStorage.getItem("userEmail");

async function loadBalance(){
  let balance = 0;
  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );
  snap.forEach(d=>{
    balance = d.data().balance || 0;
  });
  document.getElementById("accBalance").innerText =
    "₹" + balance.toFixed(2);
}
loadBalance();

/* 🔥 ONLY FIX — LOGOUT */
window.logout = function(){
  localStorage.clear();
  location.href = "login.html";
  window.openChangePass = () => {
  document.getElementById("passPopup").style.display = "flex";
};

window.closePopup = () => {
  document.getElementById("passPopup").style.display = "none";
};

window.changePassword = async () => {

  const oldPass = document.getElementById("oldPass").value;
  const newPass = document.getElementById("newPass").value;
  const confirm = document.getElementById("confirmPass").value;

  if(!oldPass || !newPass || !confirm){
    return alert("Fill all fields");
  }

  if(newPass !== confirm){
    return alert("Passwords do not match");
  }

  const userEmail = localStorage.getItem("userEmail");

  const snap = await getDocs(
    query(collection(db,"users"), where("email","==",userEmail))
  );

  let docId = "";
  let currentPass = "";

  snap.forEach(d=>{
    docId = d.id;
    currentPass = d.data().password;
  });

  if(oldPass !== currentPass){
    return alert("Wrong old password");
  }

  // 🔥 UPDATE PASSWORD
  await updateDoc(doc(db,"users",docId),{
    password: newPass
  });

  alert("Password Updated ✅");
  closePopup();
};
};
</script>
  <div id="passPopup" style="position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;justify-content:center;align-items:center">
  <div style="background:#111;padding:20px;border-radius:12px;width:90%;max-width:320px">
    
    <h3 style="color:#fff;text-align:center">Change Password</h3>

    <input type="password" id="oldPass" placeholder="Old Password" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none">
    <input type="password" id="newPass" placeholder="New Password" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none">
    <input type="password" id="confirmPass" placeholder="Confirm Password" style="width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none">

    <button onclick="changePassword()" style="width:100%;margin-top:12px;padding:10px;border:none;border-radius:8px;background:#2ecc71;color:#fff">
      Update Password
    </button>

    <button onclick="closePopup()" style="width:100%;margin-top:8px;padding:10px;border:none;border-radius:8px;background:#e53935;color:#fff">
      Cancel
    </button>

  </div>
  </div>

</body>
</html>
