<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#1c1c1c;
  padding:25px;
  border-radius:12px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff6a6a;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="pass" placeholder="Enter Password">
  <button onclick="login()">LOGIN</button>
</div>

<script>
const ADMIN_PASS = "Ja2xwin@333"; // 🔥 apna password

function login(){
  let p = document.getElementById("pass").value;

  if(p === ADMIN_PASS){
    localStorage.setItem("adminLogin","true");
    location.href = "admin-panel.html";
  }else{
    alert("Wrong Password ❌");
  }
}
</script>

</body>
</html>
