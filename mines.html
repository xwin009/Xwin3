<style>
/* ORIGINAL CSS – NOT TOUCHED */
body{
  margin:0;
  font-family:Arial,sans-serif;

  background:url("images/a86381302368c0497be0e687f936939b.jpg") no-repeat center;
  background-size:cover;
  background-attachment:fixed;

  color:#fff;
}
.header{padding:15px;font-size:20px;font-weight:bold;text-align:center}
.wallet{text-align:center;margin:10px 0;font-size:16px}
.container{padding:15px}
.controls{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;

  /* 🔥 NEW BORDER */
  border:2px solid #ffffff;

  box-shadow:
    0 0 10px #ffffff,
    0 0 20px #ffffff,
    0 0 35px rgba(255,255,255,0.6);
}
.controls input,
.controls select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  font-size:16px;

  box-sizing:border-box; /* 🔥 MOST IMPORTANT */
}
.btn{
  margin-top:10px;width:100%;padding:12px;
  border:none;border-radius:8px;font-size:16px;
  cursor:pointer;
}
.start{background:#4caf50;color:#fff}
.cashout{background:#ff4081;color:#fff}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:15px}
.cell{
  background:#2a2a2a;
  aspect-ratio:1/1;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;

  /* 🔥 NEW ADD */
  border:2px solid #009dff;

  box-shadow:
    0 0 6px #009dff,
    0 0 12px #009dff,
    0 0 20px rgba(0,157,255,0.6);

  transition:0.2s;
}
.cell.open.safe{background:#4caf50}
.cell.open.mine{background:#e53935}
.history{margin-top:15px;background:#1c1c1c;padding:12px;border-radius:12px}
.history h3{margin:0 0 8px;color:#ff4081}
.history-item{font-size:14px;border-bottom:1px solid #333;padding:6px 0}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.65);
  z-index:999;
}
.popup.show{display:flex}
.popup-box{
  background:#1e1e1e;
  padding:25px 30px;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}
</style>
</head>

<body>

<div class="wallet">Wallet: ₹<span id="wallet">0</span></div>

<div class="container">

<div class="controls">
<label>Bet Amount</label>
<input type="number" id="betAmount" placeholder="Min ₹1" min="1">

<label>Mines (1–20)</label>
<select id="mineCount"></select>

<button class="btn start" onclick="startGame()">Start Game</button>
<button class="btn cashout" onclick="cashOut()" disabled id="cashBtn">
Cashout (x<span id="multi">1.00</span>)
</button>
</div>

<div class="grid" id="grid"></div>

<div class="history">
<h3>My Bets</h3>
<div id="betHistory"></div>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-box" id="popupBox"></div>
</div>

<!-- SAME HTML & CSS — NOT TOUCHED -->

<script type="module">

/* INIT */
const mineSelect=document.getElementById("mineCount");
for(let i=1;i<=20;i++) mineSelect.innerHTML+=`<option value="${i}">${i} Mines</option>`;
createGrid();
loadWallet();

/* POPUP */
function showPopup(text,color){
 popupBox.innerText=text;
 popupBox.style.color=color;
 popup.classList.add("show");
 setTimeout(()=>popup.classList.remove("show"),1500);
}

/* LOAD WALLET */
async function loadWallet(){
 const snap=await getDocs(query(collection(db,"users"),where("email","==",userEmail)));
 snap.forEach(d=>{
  userDocId=d.id;
  wallet=d.data().balance||0;
 });
 document.getElementById("wallet").innerText=wallet;
}

/* GRID */
function createGrid(){
 grid.innerHTML="";
 for(let i=0;i<25;i++){
  const d=document.createElement("div");
  d.className="cell";
  d.onclick=()=>clickCell(i,d);
  grid.appendChild(d);
 }
}

/* START GAME */
async function startGame(){
 bet=Number(betAmount.value);
 mines=Number(mineCount.value);

 if(bet<1) return showPopup("Min ₹1","#ff5252");
 if(bet>wallet) return showPopup("Low Balance","#ff5252");

 wallet-=bet;
  // 🔥 WAGER CUT (YAHI DALNA HAI)
let wager = Number(localStorage.getItem("wager")) || 0;

if(wager > 0){
  wager -= bet;
  if(wager < 0) wager = 0;
  localStorage.setItem("wager", wager);
}
 await updateDoc(doc(db,"users",userDocId),{balance:wallet});
 document.getElementById("wallet").innerText=wallet;

 showPopup("🎯 Bet ₹"+bet,"#4caf50");

 opened=0;multiplier=1;active=true;
 multi.innerText=multiplier.toFixed(2);
 cashBtn.disabled=false;
 minePositions=[];

 // 🔥 HOUSE EDGE LOGIC (ONLY ADDITION)
 const ref = doc(db, "settings", "houseEdge");
 const snap = await getDoc(ref);

 let chance = Number(snap.data().mines ?? 50);
console.log("MINES VALUE:", chance);

 if(chance === 0){
   safeLimit = 0;
 }else if(chance === 100){
   safeLimit = 25 - mines;
 }else{
   safeLimit = Math.floor(((25 - mines) * chance) / 100);

   let variation = Math.floor(Math.random() * 3);
   safeLimit = Math.max(0, safeLimit - variation);
 }

 createGrid();
}

/* CELL */
async function clickCell(i,el){

  if(!active || el.classList.contains("open")) return;

// 🔥 STREAK SYSTEM (14–20 MINES ONLY)
// 🔥 STREAK SYSTEM (SMART RANDOM)
if(opened === 0 && mines >= 14){

  if(streak >= 6){

    let rand = Math.random();

    if(rand < 0.4){
      // 🟢 WIN (40%)
      el.classList.add("safe");
      el.innerText="💎";
      opened++;

      streak = 0;
      localStorage.setItem("mineStreak", streak);

      calcMultiplier();
      return;

    }else{
      // 🔴 LOSS (60%)
      el.classList.add("mine");
      el.innerText="💣";

      streak = 0;
      localStorage.setItem("mineStreak", streak);

      endGame(false);
      return;
    }

  }else{
    // normal loss build
    el.classList.add("mine");
    el.innerText="💣";

    streak++;
    localStorage.setItem("mineStreak", streak);

    endGame(false);
    return;
  }

}
  el.classList.add("open");

  // 🔥 NEW CONTROL LOGIC
  if(opened >= safeLimit){
    el.classList.add("mine");
    el.innerText="💣";
    endGame(false);
  }else{
    el.classList.add("safe");
    el.innerText="💎";
    opened++;

const safe = 25 - mines;

// ✅ AUTO CASHOUT BEFORE MULTIPLIER BREAK
if(opened >= safe){
  cashOut();
  return; // 🔥 VERY IMPORTANT
}

calcMultiplier();
  }

}

/* MULTIPLIER */

function calcMultiplier(){

  let arr = mineMultipliers[mines];

  if(!arr){
    multiplier = 1;
    return;
  }

  let index = opened - 1;

  if(index < 0) index = 0;
  if(index >= arr.length) index = arr.length - 1;

  multiplier = arr[index];

  multi.innerText = multiplier.toFixed(2);
}
/* CASHOUT */
async function cashOut(){
 if(!active)return;
 const win=Math.floor(bet*multiplier);
 wallet+=win;
 await updateDoc(doc(db,"users",userDocId),{balance:wallet});
 document.getElementById("wallet").innerText=wallet;
 addHistory("WIN",win);
 showPopup("💰 +₹"+win,"#4caf50");
 endGame(true);
}

/* END GAME */
function endGame(win){
 active=false;cashBtn.disabled=true;
 if(!win){
  addHistory("LOSS",-bet);
  showPopup("💣 -₹"+bet,"#ff5252");
 }
}

/* HISTORY */
function addHistory(type,amt){
 const d=document.createElement("div");
 d.className="history-item";
 d.innerText=`${type} | ${amt>0?"+₹"+amt:"₹"+amt}`;
 betHistory.prepend(d);
}

window.startGame = startGame;
window.cashOut = cashOut;
