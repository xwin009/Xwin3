<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPIN & STOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

  
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;

  background:url("images/5f45f8f81efb0955785e67027f72f48f.jpg") no-repeat center;
  background-size:cover;
  background-attachment:fixed;

  color:#fff;
  text-align:center;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px;
  font-weight:bold;
}
.wallet{
  background:rgba(0,0,0,.5);
  padding:6px 14px;
  border-radius:20px;
}

/* SPINNER */
.spinner-wrap{
  margin:30px auto;
  width:240px;
  height:240px;
  border-radius:50%;
  border:8px solid #4fc3f7;

  box-shadow:
    0 0 20px #4fc3f7,
    0 0 40px #4fc3f7,
    0 0 60px rgba(79,195,247,0.6);

  position:relative;
  overflow:hidden;
}
.spinner{
  width:100%;
  height:100%;
  border-radius:50%;
  background:url("images/30202-removebg-preview.png") no-repeat center;
  background-size:cover;
  transition:transform 0.1s linear;
}
.pointer{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  z-index:5;
}
/* BET */
input{
  width:80%;
  padding:14px;
  border-radius:30px;
  border:none;
  font-size:16px;
  margin-bottom:12px;

  box-shadow:
    0 0 10px #4fc3f7,
    0 0 20px rgba(79,195,247,0.5);
}
button{
  width:80%;
  padding:14px;
  border-radius:30px;
  border:none;
  background:#ff5252;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  margin-bottom:10px;
}
  #startBtn{
  background:#ff5252;
  box-shadow:
    0 0 8px #ff5252,
    0 0 15px rgba(255,82,82,0.5);
  }
  #stopBtn{
  background:#ff1744;
  box-shadow:
    0 0 10px #ff1744,
    0 0 18px rgba(255,23,68,0.5);
  }
  .choose{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:10px;
}

.chooseBtn{
  width:40%;
  padding:14px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  font-size:16px;
}

.redBtn{
  background:#e53935;
  box-shadow:
    0 0 10px #ff3b3b,
    0 0 20px #ff3b3b,
    0 0 30px rgba(255,0,0,0.6);
}
.greenBtn{
  background:#2ecc71;
  box-shadow:
    0 0 10px #00ff99,
    0 0 20px #00ff99,
    0 0 30px rgba(0,255,150,0.6);
}

.chooseBtn.active{
  outline:3px solid #fff;
  transform:scale(1.05);
}

/* HISTORY */
.history{
  margin:14px;
  background:rgba(0,0,0,.4);
  border-radius:12px;
  padding:10px;
  font-size:13px;
  text-align:left;
}
.history h3{
  margin:0 0 6px;
  text-align:center;
}
.h-row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:6px 0;
}
.win{color:#4caf50}
.lose{color:#ff5252}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}
.popup-box{
  background:#ff5252;
  color:#fff;
  padding:26px 40px;
  border-radius:20px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <div>🔥 SPIN & STOP</div>
  <div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<div class="spinner-wrap">
  <div class="pointer">⬇️</div>
  <div class="spinner" id="spinner"></div>
</div>

<input type="number" id="bet" value="100" placeholder="Enter Bet Amount">
<br>
<div class="choose">
  <button class="chooseBtn redBtn" onclick="selectColor('red',this)">RED</button>
  <button class="chooseBtn greenBtn" onclick="selectColor('green',this)">GREEN</button>
</div>
  <button id="startBtn">START</button>
<button id="stopBtn" disabled>STOP</button>

<div class="history">
  <h3>LAST SPINS</h3>
  <div id="history"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupText"></div>
</div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDocs, collection, query, where, doc, updateDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db = getFirestore(app);

const userEmail = localStorage.getItem("userEmail");
let wallet = 0;
let uid = "";

/* LOAD WALLET */
async function loadWallet(){
  const q = query(collection(db,"users"), where("email","==",userEmail));
  const snap = await getDocs(q);
  snap.forEach(d=>{
    uid = d.id;
    wallet = Number(d.data().balance || 0);
  });
  renderWallet();
}

/* SAVE WALLET */
async function saveWallet(){
  if(!uid) return;
  await updateDoc(doc(db,"users",uid), { balance: wallet });
}

/* 🔥 HOUSE EDGE */
async function getChance(){
  try{
    const ref = doc(db,"settings","houseEdge");
    const snap = await getDoc(ref);
    if(snap.exists()){
      return Number(snap.data().spin ?? 50);
    }
  }catch(e){}
  return 50;
}

/* UI */
const spinner = document.getElementById("spinner");
const spinBtn = document.getElementById("spinBtn");
const stopBtn = document.getElementById("stopBtn");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");
const historyBox = document.getElementById("history");

function renderWallet(){
  document.getElementById("wallet").innerText = wallet;
}

/* 🔥 GAME STATE */
let angle = 0;
let spinInt = null;
let spinning = false;
let isStopping = false;
let selectedColor = "";

/* 🎯 COLOR SELECT */
window.selectColor = (color, el)=>{
  selectedColor = color;

  document.querySelectorAll(".chooseBtn").forEach(btn=>{
    btn.classList.remove("active");
  });

  el.classList.add("active");
};

/* SPIN */
/* START */
startBtn.onclick = async ()=>{

  const bet = Number(document.getElementById("bet").value);

  if(!selectedColor) return alert("Select RED or GREEN");
  if(bet<=0 || bet>wallet) return alert("Low balance");

  wallet -= bet;
  await saveWallet();
  renderWallet();

  startBtn.disabled = true;
  stopBtn.disabled = false;

  spinning = true;
  isStopping = false;
  angle = 0;

  spinner.style.transition = "none";

  spinInt = setInterval(()=>{
    angle += 15;
    spinner.style.transform = `rotate(${angle}deg)`;
  },50);
};
/* STOP */
stopBtn.onclick = async ()=>{
  if(!spinning || isStopping) return;

  isStopping = true;

  

clearInterval(spinInt);
spinning = false;

startBtn.disabled = false;
stopBtn.disabled = true;

const bet = Number(document.getElementById("bet").value);

let chance = await getChance();
let win;

if(chance >= 100){
  win = true;
}else if(chance <= 0){
  win = false;
}else{
  win = Math.random()*100 < chance;
}

/* 🎯 EXACT COLOR CONTROL */
let resultColor;

if(win){
  resultColor = selectedColor;
}else{
  resultColor = selectedColor === "green" ? "red" : "green";
}

/* 🎯 EXACT ANGLE (POINTER FIX) */
let finalAngle;

if(resultColor === "green"){
  // green zones (top-right + bottom-left)
  finalAngle = Math.random()<0.5 
    ? 45 + Math.random()*40     // top-right
    : 225 + Math.random()*40;   // bottom-left
}else{
  // red zones (top-left + bottom-right)
  finalAngle = Math.random()<0.5
    ? 135 + Math.random()*40    // top-left
    : 315 + Math.random()*40;   // bottom-right
}

/* 🔥 FINAL SMOOTH STOP */
spinner.style.transition = "transform 1.5s cubic-bezier(.22,.61,.36,1)";
spinner.style.transform = `rotate(${angle + finalAngle}deg)`;

angle += finalAngle;

/* RESULT */
let resultText;

if(win){
  let winAmt = bet * 2;
  wallet += winAmt;
  await saveWallet();

  resultText = `🎉 ${resultColor.toUpperCase()} → YOU WIN ₹${winAmt}`;
  addHistory("WIN", winAmt);
}else{
  resultText = `❌ ${resultColor.toUpperCase()} → YOU LOST`;
  addHistory("LOSE", bet);
}

renderWallet();

setTimeout(()=>{
  popupText.innerText = resultText;
  popup.style.display="flex";
  setTimeout(()=>popup.style.display="none",1500);
},1200);
};

/* HISTORY */
function addHistory(type,amt){
  const div=document.createElement("div");
  div.className="h-row";
  div.innerHTML=`
    <span>${type}</span>
    <span class="${type==="WIN"?"win":"lose"}">
      ${type==="WIN"?`+₹${amt}`:`-₹${amt}`}
    </span>
  `;
  historyBox.prepend(div);
}

loadWallet();
  
  </script>
  
</body>
</html>
