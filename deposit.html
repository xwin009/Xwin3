<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  font-size:22px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:15px;
  border-radius:16px;
  padding:15px;
}

/* CHANNELS */
.channels{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.channel{
  background:#2a2a2a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.channel.active{
  background:#ff5f5f;
}

/* QR */
.qr-box{
  background:#fff;
  padding:10px;
  border-radius:12px;
  text-align:center;
  margin-top:12px;
}

.qr-box img{
  width:180px;
}

/* UPI */
.upi{
  background:#000;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  text-align:center;
}

.copy{
  width:100%;
  margin-top:8px;
  padding:12px;
  background:#2196f3;
  border:none;
  border-radius:10px;
  color:#fff;
}

/* AMOUNT */
.amounts{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.amounts button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
.pay{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#4caf50;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
}
  .submit{
  width:100%;
  padding:14px;
  margin-top:10px;
  background:#ff9800;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
}
  
</style>
</head>

<body>

<div class="header">💰 Deposit</div>

<div class="card">

<!-- CHANNEL SELECT -->
<div class="channels">
  <div class="channel active" onclick="selectChannel(0)">UPI QR</div>
  <div class="channel" onclick="selectChannel(1)">Innote QR</div>
  <div class="channel" onclick="selectChannel(2)">Paytm QR</div>
  <div class="channel" onclick="selectChannel(3)">PhonePe QR</div>
</div>

<!-- QR -->
<div class="qr-box">
  <img id="qrImg">
</div>

<!-- UPI -->
<div class="upi" id="upiBox"></div>
<button class="copy" onclick="copyUPI()">Copy UPI</button>

<!-- AMOUNT -->
<div class="amounts">
  <button onclick="setAmount(100)">100</button>
  <button onclick="setAmount(200)">200</button>
  <button onclick="setAmount(300)">300</button>
  <button onclick="setAmount(500)">500</button>
  <button onclick="setAmount(1000)">1000</button>
  <button onclick="setAmount(5000)">5000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount (Min ₹100)">
 
  <input type="text" id="utr" placeholder="Enter UTR Number (12 digit)">
  

<button class="pay" onclick="payNow()">PAY NOW</button>

  <button class="submit" onclick="submitUTR()">Submit UTR</button>
  
</div>

<!-- 🔥 START POPUP -->
<div id="startPopup" style="position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.85);z-index:9999;">
  
  <div style="text-align:center;">
    <img src="images/35106-removebg-preview.png" 
         style="width:260px;max-width:90%;border-radius:20px;box-shadow:0 0 25px #00ffcc;">
  </div>

</div>


<!-- 🔥 SUCCESS POPUP -->
<div id="popup" style="position:fixed;inset:0;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.7);z-index:9998;">
  <div style="background:#1c1c1c;padding:20px;border-radius:12px;text-align:center;width:80%;">
    <h3 id="popupText">Success</h3>
    <button onclick="closePopup()" style="margin-top:10px;padding:10px;width:100%;background:#4caf50;border:none;border-radius:10px;color:#fff;">OK</button>
  </div>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
/* 🔥 FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});

const db = getFirestore(app);

/* 🔥 CHANNEL DATA */
const channels = [
  { upi:"vs197053@okicici" },
  { upi:"vs197053@okicici" },
  { upi:"vs197053@okicici" },
  { upi:"vs197053@okicici" }
];

let current = 0;

/* 🔥 SELECT CHANNEL */
window.selectChannel = function(i){
  current = i;

  document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
  document.querySelectorAll(".channel")[i].classList.add("active");

  let upi = channels[i].upi;

  document.getElementById("upiBox").innerText = upi;

  generateQR(upi);
}

/* 🔥 QR */
function generateQR(upi){
  let url = `upi://pay?pa=${upi}&pn=ColourCash`;
  let qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
  document.getElementById("qrImg").src = qr;
}

/* 🔥 COPY */
window.copyUPI = function(){
  let upi = channels[current].upi;
  navigator.clipboard.writeText(upi);
  alert("UPI Copied");
}

/* 🔥 SET AMOUNT */
window.setAmount = function(a){
  document.getElementById("amount").value = a;
}

/* 🔥 PAY */
window.payNow = function(){
  let amt = document.getElementById("amount").value;

  if(amt < 100){
    showPopup("Minimum ₹100");
    return;
  }

  let upi = channels[current].upi;

  location.href = `upi://pay?pa=${upi}&pn=ColourCash&am=${amt}&cu=INR`;
}

/* 🔥 SUBMIT UTR */
window.submitUTR = async function(){

  let amt = document.getElementById("amount").value;
  let utr = document.getElementById("utr").value.trim();

  if(amt < 100){
    showPopup("Minimum ₹100");
    return;
  }

  if(utr.length < 10){
    showPopup("Enter valid UTR");
    return;
  }

  try{

    const userEmail = localStorage.getItem("userEmail");

if(!userEmail){
  alert("Login required");
  return;
}

await addDoc(collection(db,"deposits"),{
  email: userEmail,
  amount: Number(amt),
  utr: utr,
  status: "PENDING",
  time: Date.now()
});

    showPopup("Deposit Submitted ✅");
    
// 🔥 FIREBASE USER FETCH
const userSnap = await getDocs(
  query(collection(db,"users"), where("email","==",userEmail))
);

let userId = "";
let currentRequired = 0;

userSnap.forEach(d=>{
  userId = d.id;
  currentRequired = Number(d.data().wagerRequired || 0);
});

// 🔥 UPDATE WAGER REQUIRED
await updateDoc(doc(db,"users",userId),{
  wagerRequired: currentRequired + Number(amt)
});
/* 🔥 POPUP */
window.showPopup = function(msg){
  document.getElementById("popupText").innerText = msg;
  document.getElementById("popup").style.display = "flex";
}

window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
}

/* INIT */
selectChannel(0);
// 🔥 ONLY ONCE POPUP (FIRST LOAD)
window.onload = function(){

  let seen = sessionStorage.getItem("depositPopup");

  if(!seen){
    let popup = document.getElementById("startPopup");

    popup.style.display = "flex";

    setTimeout(()=>{
      popup.style.display = "none";
      sessionStorage.setItem("depositPopup","done");
    },3000);
  }

}
</script>

</body>
</html>
