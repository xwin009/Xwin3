<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

.header{
  padding:15px;
  font-size:22px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:#1c1c1c;
  margin:15px;
  border-radius:16px;
  padding:15px;
}

/* CHANNELS */
.channels{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.channel{
  background:#2a2a2a;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

.channel.active{
  background:#ff5f5f;
}

/* QR */
.qr-box{
  background:#fff;
  padding:10px;
  border-radius:12px;
  text-align:center;
  margin-top:12px;
}

.qr-box img{
  width:180px;
}

/* UPI */
.upi{
  background:#000;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  text-align:center;
}

.copy{
  width:100%;
  margin-top:8px;
  padding:12px;
  background:#2196f3;
  border:none;
  border-radius:10px;
  color:#fff;
}

/* AMOUNT */
.amounts{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:10px;
}

.amounts button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2a2a2a;
  color:#fff;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
.pay{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#4caf50;
  border:none;
  border-radius:10px;
  font-size:16px;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">💰 Deposit</div>

<div class="card">

<!-- CHANNEL SELECT -->
<div class="channels">
  <div class="channel active" onclick="selectChannel(0)">UPI QR</div>
  <div class="channel" onclick="selectChannel(1)">Innote QR</div>
  <div class="channel" onclick="selectChannel(2)">Paytm QR</div>
  <div class="channel" onclick="selectChannel(3)">PhonePe QR</div>
</div>

<!-- QR -->
<div class="qr-box">
  <img id="qrImg">
</div>

<!-- UPI -->
<div class="upi" id="upiBox"></div>
<button class="copy" onclick="copyUPI()">Copy UPI</button>

<!-- AMOUNT -->
<div class="amounts">
  <button onclick="setAmount(100)">100</button>
  <button onclick="setAmount(200)">200</button>
  <button onclick="setAmount(300)">300</button>
  <button onclick="setAmount(500)">500</button>
  <button onclick="setAmount(1000)">1000</button>
  <button onclick="setAmount(5000)">5000</button>
</div>

<input type="number" id="amount" placeholder="Enter Amount (Min ₹100)">
 
  <input type="text" id="utr" placeholder="Enter UTR Number (12 digit)">

<button class="pay" onclick="payNow()">PAY NOW</button>

</div>

<script>

/* 🔥 CHANNEL DATA */
const channels = [
  { upi:"muskan0897@ybl" },
  { upi:"rahul@upi" },
  { upi:"paytm@upi" },
  { upi:"phonepe@upi" }
];

let current = 0;

/* 🔥 SELECT CHANNEL */
function selectChannel(i){
  current = i;

  document.querySelectorAll(".channel").forEach(c=>c.classList.remove("active"));
  document.querySelectorAll(".channel")[i].classList.add("active");

  let upi = channels[i].upi;

  document.getElementById("upiBox").innerText = upi;

  generateQR(upi);
}

/* 🔥 QR GENERATE */
function generateQR(upi){
  let url = `upi://pay?pa=${upi}&pn=ColourCash`;

  let qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;

  document.getElementById("qrImg").src = qr;
}

/* 🔥 COPY */
function copyUPI(){
  let upi = channels[current].upi;
  navigator.clipboard.writeText(upi);
  alert("UPI Copied");
}

/* 🔥 SET AMOUNT */
function setAmount(a){
  document.getElementById("amount").value = a;
}

/* 🔥 PAY */
function payNow(){
  let amt = document.getElementById("amount").value;
  let utr = document.getElementById("utr").value.trim();

  if(amt < 100){
    alert("Minimum ₹100");
    return;
  }

  if(utr.length < 10){
    alert("Enter valid UTR");
    return;
  }

  let upi = channels[current].upi;

  // 🔥 SAVE LOCAL (optional)
  let deposits = JSON.parse(localStorage.getItem("deposits")) || [];

  deposits.push({
    amount: amt,
    utr: utr,
    upi: upi,
    status: "PENDING",
    time: new Date().toLocaleString()
  });

  localStorage.setItem("deposits", JSON.stringify(deposits));

  // 🔥 OPEN PAYMENT APP
  location.href = `upi://pay?pa=${upi}&pn=ColourCash&am=${amt}&cu=INR`;
}

/* INIT */
selectChannel(0);

</script>

</body>
</html>
