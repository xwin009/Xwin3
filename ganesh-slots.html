<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GANESH SLOTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;

  /* 🔥 NEW BACKGROUND */
  background:
    url("images/file_00000000d54871fabc6a8fb9a58e8ec7.png") center/cover no-repeat,
    radial-gradient(circle,#3b0a0a,#140404);

  background-attachment: fixed;

  color:#fff;
  text-align:center;
}
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px;font-weight:bold
}
.wallet{
  background:rgba(0,0,0,.5);
  padding:6px 14px;border-radius:20px
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;padding:20px
}
.cell{
  background:rgba(0,0,0,.55);
  border-radius:16px;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:center;

  /* 🔥 BLUE GLOW BORDER */
  border:2px solid #0d47a1;
  box-shadow:
    0 0 8px #0d47a1,
    0 0 15px rgba(13,71,161,0.7);
}
.cell img{max-width:70px}
.bet-box{
  display:flex;justify-content:center;align-items:center;
  gap:14px;margin-top:8px
}
.bet-box button{
  width:44px;height:44px;border-radius:50%;
  font-size:22px;cursor:pointer;border:none
}
.spin-btn{
  margin:16px auto;
  width:180px;
  padding:14px;
  border-radius:40px;
  font-size:22px;
  font-weight:bold;
  border:none;
  color:#fff;
  cursor:pointer;

  background:linear-gradient(135deg,#00c853,#00e676);

  /* 🔥 GREEN GLOW */
  box-shadow:
    0 0 10px #00e676,
    0 0 25px rgba(0,230,118,0.8);
}
.history{
  margin:16px;
  background:rgba(0,0,0,.4);
  border-radius:12px;
  padding:10px;
  font-size:13px;

  /* 🔥 BLUE BORDER */
  border:2px solid #0d47a1;
  box-shadow:
    0 0 10px #0d47a1,
    0 0 20px rgba(13,71,161,0.6);
}
.h-row{display:flex;justify-content:space-between;padding:6px 0}
.win{color:#4caf50}.lose{color:#ff5252}

/* POPUP */
.popup{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;z-index:99
}
.popup-box{
  background:#222;padding:26px 40px;
  border-radius:20px;font-size:22px;font-weight:bold
}
.popup-box.win{color:#4caf50}
.popup-box.lose{color:#ff5252}
</style>
</head>

<body>

<div class="header">
  <div>🕉️ GANESH SLOTS</div>
  <div class="wallet">₹ <span id="wallet">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="bet-box">
  <button id="minusBtn">−</button>
  Bet ₹ <span id="bet">10</span>
  <button id="plusBtn">+</button>
</div>

<button class="spin-btn" id="spinBtn">SPIN</button>

<div class="history">
  <h3>MY BETS</h3>
  <div id="history"></div>
</div>

<div class="popup" id="popup">
  <div class="popup-box" id="popupBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, getDocs, collection, query, where, doc, updateDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBx3J9aGn_98rTPgurMMKw_GR3puIMj4Ms",
  authDomain:"colourcash-ea60e.firebaseapp.com",
  projectId:"colourcash-ea60e"
});
const db=getFirestore(app);

const email=localStorage.getItem("userEmail");
let uid="", balance=0;

/* SYMBOLS */
const symbols=["diya","flower","coin","wild"];

/* STATE */
let bet=10;
let lossStreak=0;   // 🔑 IMPORTANT
let spinIndex=0;

/* ELEMENTS */
const grid=document.getElementById("grid");
const walletEl=document.getElementById("wallet");
const betEl=document.getElementById("bet");
const historyBox=document.getElementById("history");
const popup=document.getElementById("popup");
const popupBox=document.getElementById("popupBox");

/* USER REF */
function userRef(){return doc(db,"users",uid);}

/* LOAD WALLET */
async function loadWallet(){
 const q=query(collection(db,"users"),where("email","==",email));
 const snap=await getDocs(q);
 snap.forEach(d=>{
  uid=d.id;
  balance=Number(d.data().balance||0);
 });
 walletEl.innerText=balance;
}

/* GRID */
function buildGrid(arr){
 grid.innerHTML="";
 arr.forEach(n=>{
  const d=document.createElement("div");
  d.className="cell";
  const img=document.createElement("img");
  img.src="images/symbols/"+n+".png";
  d.appendChild(img);
  grid.appendChild(d);
 });
}

/* BET */
plusBtn.onclick=()=>{bet+=10;betEl.innerText=bet};
minusBtn.onclick=()=>{bet=Math.max(10,bet-10);betEl.innerText=bet};

/* POPUP */
function showPopup(text,cls){
 popupBox.className="popup-box "+cls;
 popupBox.innerText=text;
 popup.style.display="flex";
 setTimeout(()=>popup.style.display="none",1400);
}

/* HISTORY */
function addHistory(t,a,c){
 const r=document.createElement("div");
 r.className="h-row";
 r.innerHTML=`<span>${t}</span><span class="${c}">${a}</span>`;
 historyBox.prepend(r);
}

/* 🎯 GUARANTEED PAYOUT ENGINE */
function guaranteedPayout(){
 // after 2 losses → forced win
 if(lossStreak >= 2){
   lossStreak = 0;

   // mostly partial refund
   const r = Math.random();
   if(r < 0.05) return bet;              // 5% full refund
   if(r < 0.40) return Math.round(bet*0.3);
   if(r < 0.75) return Math.round(bet*0.5);
   return Math.round(bet*0.8);
 }

 // normal spin (chance based)
 const r = Math.random();
 if(r < 0.55) return 0;                  // loss
 if(r < 0.70) return Math.round(bet*0.3);
 if(r < 0.85) return Math.round(bet*0.5);
 if(r < 0.95) return Math.round(bet*0.8);
 return bet;                             // rare full refund
}

/* SPIN */
spinBtn.onclick=async ()=>{
 if(balance < bet) return alert("Low balance");

 spinIndex++;

 balance -= bet;
 await updateDoc(userRef(),{balance});

 // spin symbols (visual only)
 let res=[];
 for(let i=0;i<9;i++){
   res.push(symbols[Math.floor(Math.random()*symbols.length)]);
 }
 buildGrid(res);

 // payout decision
 const payout = guaranteedPayout();

 if(payout > 0){
   balance += payout;
   await updateDoc(userRef(),{balance});
   addHistory("WIN","+₹"+payout,"win");
   showPopup("🎉 YOU WIN ₹"+payout,"win");
 }else{
   lossStreak++;
   addHistory("LOSE","-₹"+bet,"lose");
   showPopup("❌ YOU LOSE","lose");
 }

 walletEl.innerText = balance;
};

/* START */
buildGrid(Array(9).fill("diya"));
loadWallet();
  </script>

</body>
</html>
